<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Gacha Cats</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
  --accent:#5b8cff;
  --accent2:#7cf5c8;
  --danger:#ff6b6b;
}

body{
  background:linear-gradient(180deg,
    var(--tg-theme-bg-color),
    rgba(0,0,0,0.03));
  color:var(--tg-theme-text-color);
  font-family:Inter,Arial,sans-serif;
  margin:0;
  padding:14px 14px 80px;
}

h1,h2{text-align:center;margin:10px 0;}

.balance{
  text-align:center;
  font-size:22px;
  font-weight:600;
}

.card{
  background:var(--tg-theme-secondary-bg-color,#1f1f1f);
  border-radius:18px;
  padding:14px;
  margin:12px 0;
  box-shadow:0 8px 20px rgba(0,0,0,.15);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:20px;
  font-size:16px;
  font-weight:600;
  margin-top:8px;
  cursor:pointer;
  color:#fff;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
}

button.secondary{
  background:linear-gradient(135deg,#666,#999);
}

button.danger{
  background:linear-gradient(135deg,var(--danger),#ff9a9a);
}

.small{opacity:.7;font-size:14px;}
.hidden{display:none;}

.menu{
  position:fixed;
  bottom:0;left:0;right:0;
  display:flex;
  background:var(--tg-theme-bg-color);
  border-top:1px solid rgba(255,255,255,.1);
}

.menu button{
  flex:1;
  border-radius:0;
  font-size:14px;
  padding:12px 0;
}

/* Лидерборд */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}
th,td{
  padding:10px;
  text-align:center;
}
th{
  opacity:.7;
}
tr{
  border-bottom:1px solid rgba(255,255,255,.1);
}
</style>
</head>

<body>

<h1>🐱 Gacha Cats</h1>
<div class="balance">💰 <span id="coins">0</span></div>

<!-- ЭКРАНЫ -->
<div id="screen-main"></div>

<div id="screen-gacha" class="hidden">
  <div class="card">
    <button onclick="rollGacha()">🎰 Крутить гачу (50💰)</button>
  </div>
</div>

<div id="screen-shop" class="hidden">
  <h2>🏠 Магазин клеток</h2>
  <div id="shop"></div>
</div>

<div id="screen-inventory" class="hidden">
  <h2>🎒 Инвентарь</h2>
  <div id="inventory"></div>
</div>

<div id="screen-leaderboard" class="hidden">
  <h2>🏆 Лидерборд</h2>
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Игрок</th>
          <th>💰</th>
        </tr>
      </thead>
      <tbody id="leaders"></tbody>
    </table>
  </div>
</div>

<!-- МЕНЮ -->
<div class="menu">
  <button onclick="show('main')">🏠</button>
  <button onclick="show('gacha')">🎰</button>
  <button onclick="show('shop')">🛒</button>
  <button onclick="show('inventory')">🎒</button>
  <button onclick="show('leaderboard')">🏆</button>
</div>

<script>
const tg=window.Telegram.WebApp;
tg.expand();

const cats=[
 {name:"Обычный кот",income:1,rarity:"Common"},
 {name:"Полосатый кот",income:2,rarity:"Common"},
 {name:"Чёрный кот",income:3,rarity:"Uncommon"},
 {name:"Самурай кот",income:6,rarity:"Rare"},
 {name:"Кибер кот",income:10,rarity:"Epic"},
 {name:"Дракон кот",income:18,rarity:"Legendary"},
 {name:"Божий кот",income:30,rarity:"Mythic"},
];

const cageTypes=[
 {emoji:"🪵",name:"Деревянная",slots:2,price:100,allowed:["Common"]},
 {emoji:"🔩",name:"Железная",slots:3,price:300,allowed:["Common","Uncommon"]},
 {emoji:"🔮",name:"Магическая",slots:3,price:700,allowed:["Rare","Epic"]},
 {emoji:"👑",name:"Легендарная",slots:2,price:1500,allowed:["Legendary"]},
 {emoji:"🌌",name:"Божественная",slots:1,price:3000,allowed:["Mythic"]},
];

let data=JSON.parse(localStorage.getItem("gacha"))||{
 coins:300,
 inventory:[],
 cages:[],
 leaderboard:[],
 last:Date.now()
};

function save(){localStorage.setItem("gacha",JSON.stringify(data));}

/* Пассив */
function passive(){
 const now=Date.now();
 const sec=Math.floor((now-data.last)/1000);
 let inc=0;
 data.cages.forEach(c=>c.cats.forEach(cat=>inc+=cat.income));
 data.coins+=inc*sec;
 data.last=now;
 save();
}

/* Навигация */
function show(s){
 ["main","gacha","shop","inventory","leaderboard"].forEach(x=>{
  document.getElementById("screen-"+x).classList.add("hidden");
 });
 document.getElementById("screen-"+s).classList.remove("hidden");
 render();
}

/* Гача */
function rollGacha(){
 if(data.coins<50) return;
 data.coins-=50;
 const cat=cats[Math.floor(Math.random()*cats.length)];
 data.inventory.push(cat);
 save();render();
}

/* Клетки */
function buyCage(i){
 const c=cageTypes[i];
 if(data.coins<c.price) return;
 data.coins-=c.price;
 data.cages.push({...c,cats:[]});
 save();render();
}

function placeCat(ci,ii){
 const cage=data.cages[ci];
 const cat=data.inventory[ii];
 if(!cage.allowed.includes(cat.rarity)) return;
 if(cage.cats.length>=cage.slots) return;
 cage.cats.push(cat);
 data.inventory.splice(ii,1);
 save();render();
}

/* Лидерборд (локальный) */
function updateLeaderboard(){
 const name=tg.initDataUnsafe.user?.first_name||"Player";
 let entry=data.leaderboard.find(e=>e.name===name);
 if(!entry){
  data.leaderboard.push({name,coins:Math.floor(data.coins)});
 }else{
  entry.coins=Math.max(entry.coins,Math.floor(data.coins));
 }
 data.leaderboard.sort((a,b)=>b.coins-a.coins);
 data.leaderboard=data.leaderboard.slice(0,10);
 save();
}

/* Рендер */
function render(){
 document.getElementById("coins").innerText=Math.floor(data.coins);

 /* Главная */
 const main=document.getElementById("screen-main");
 main.innerHTML="<h2>🏠 Клетки</h2>";
 data.cages.forEach(c=>{
  main.innerHTML+=`
  <div class="card">
   ${c.emoji} ${c.name}<br>
   <span class="small">
   ${c.cats.map(x=>"🐱 "+x.name).join("<br>")||"Пусто"}
   </span>
  </div>`;
 });

 /* Магазин */
 const shop=document.getElementById("shop");
 shop.innerHTML="";
 cageTypes.forEach((c,i)=>{
  shop.innerHTML+=`
  <div class="card">
   ${c.emoji} ${c.name}<br>
   Цена: ${c.price}💰
   <button onclick="buyCage(${i})">Купить</button>
  </div>`;
 });

 /* Инвентарь */
 const inv=document.getElementById("inventory");
 inv.innerHTML="";
 data.inventory.forEach((c,i)=>{
  inv.innerHTML+=`
  <div class="card">
   🐱 ${c.name}<br>
   +${c.income}/сек
   ${data.cages.map((_,ci)=>`
    <button class="secondary" onclick="placeCat(${ci},${i})">
    В клетку #${ci+1}
    </button>`).join("")}
  </div>`;
 });

 /* Лидерборд */
 updateLeaderboard();
 const l=document.getElementById("leaders");
 l.innerHTML="";
 data.leaderboard.forEach((e,i)=>{
  l.innerHTML+=`
   <tr>
    <td>${i+1}</td>
    <td>${e.name}</td>
    <td>${e.coins}</td>
   </tr>`;
 });
}

passive();
render();
setInterval(()=>{passive();render();},5000);
</script>

</body>
</html>
