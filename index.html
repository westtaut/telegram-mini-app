<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gacha Cats</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ─── RESET & BASE ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:       var(--tg-theme-bg-color,       #13131a);
  --bg2:      var(--tg-theme-secondary-bg-color, #1e1e2a);
  --txt:      var(--tg-theme-text-color,      #f0f0f0);
  --accent:   #5b8cff;
  --accent2:  #7cf5c8;
  --r-common: #9e9e9e;
  --r-rare:   #4fc3f7;
  --r-epic:   #ce93d8;
  --r-legend: #ffd54f;
  --radius:   18px;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,'SF Pro Text','Segoe UI',Arial,sans-serif;
  background:var(--bg);
  color:var(--txt);
  font-size:15px;
  line-height:1.4;
}

/* ─── HEADER ───────────────────────────────────────────────── */
.header{
  display:flex;align-items:center;justify-content:center;
  padding:12px 16px 0;gap:8px;
  position:relative;height:56px;
}
.header h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
.balance-pill{
  position:absolute;right:14px;
  background:var(--bg2);border-radius:50px;
  padding:6px 14px;font-size:15px;font-weight:700;
  display:flex;align-items:center;gap:4px;
}

/* ─── BOTTOM NAV ───────────────────────────────────────────── */
.nav{
  position:fixed;bottom:0;left:0;right:0;
  height:68px;background:var(--bg2);
  border-top:1px solid rgba(255,255,255,.06);
  display:flex;align-items:stretch;
  padding:0 8px;padding-bottom:env(safe-area-inset-bottom,0px);
  z-index:50;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;
  background:none;border:none;
  color:rgba(255,255,255,.38);
  font-size:10px;font-weight:600;
  cursor:pointer;border-radius:12px;
  transition:color .18s;width:auto;margin:0;padding:6px 0;
}
.nav-btn .icon{font-size:22px;line-height:1;transition:transform .2s}
.nav-btn.active{color:var(--accent)}
.nav-btn.active .icon{transform:scale(1.18)}

/* ─── CAROUSEL ─────────────────────────────────────────────── */
.carousel{
  display:flex;width:400%;
  height:calc(100vh - 56px - 68px);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.screen{
  width:25%;overflow-y:auto;overflow-x:hidden;
  padding:10px 14px 16px;
  -webkit-overflow-scrolling:touch;
}

/* ─── SECTION TITLE ────────────────────────────────────────── */
.section-title{
  font-size:11px;font-weight:800;
  letter-spacing:.8px;text-transform:uppercase;
  opacity:.35;margin:16px 0 8px;
}
.section-title:first-child{margin-top:4px}

/* ─── CARD ─────────────────────────────────────────────────── */
.card{
  background:var(--bg2);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:10px;
}

/* ─── RARITY ───────────────────────────────────────────────── */
.r-Common   {color:var(--r-common)}
.r-Rare     {color:var(--r-rare)}
.r-Epic     {color:var(--r-epic)}
.r-Legendary{color:var(--r-legend)}

.rarity-badge{
  display:inline-flex;align-items:center;
  font-size:10px;font-weight:800;
  letter-spacing:.4px;text-transform:uppercase;
  padding:3px 9px;border-radius:50px;
}
.rarity-badge.Common   {background:#2a2a2a;color:var(--r-common)}
.rarity-badge.Rare     {background:linear-gradient(90deg,#0277bd,#29b6f6);color:#fff}
.rarity-badge.Epic     {background:linear-gradient(90deg,#6a1b9a,#ce93d8);color:#fff}
.rarity-badge.Legendary{background:linear-gradient(90deg,#e65100,#ffd54f);color:#1a0a00}

/* ─── CAGE CARD ────────────────────────────────────────────── */
.cage-card{position:relative;padding-top:18px}
.cage-stripe{
  position:absolute;top:0;left:0;right:0;height:4px;
  border-radius:var(--radius) var(--radius) 0 0;
}
.cage-card.Common    .cage-stripe{background:var(--r-common)}
.cage-card.Rare      .cage-stripe{background:linear-gradient(90deg,#29b6f6,#0277bd)}
.cage-card.Epic      .cage-stripe{background:linear-gradient(90deg,#ce93d8,#7b1fa2)}
.cage-card.Legendary .cage-stripe{background:linear-gradient(90deg,#ffd54f,#e65100)}
.cage-card.Rare      {box-shadow:0 0 0 1px #4fc3f725}
.cage-card.Epic      {box-shadow:0 0 0 1px #ce93d825}
.cage-card.Legendary {box-shadow:0 0 0 1px #ffd54f40}

.cage-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cage-head-left{display:flex;align-items:center;gap:10px}
.cage-head-emoji{font-size:24px}
.cage-head-name{font-size:15px;font-weight:700}
.cage-head-rarity{margin-top:3px}
.cage-bonus-tag{
  font-size:12px;font-weight:700;opacity:.5;
  background:rgba(255,255,255,.07);
  padding:4px 10px;border-radius:8px;
}

.slots-bar{display:flex;gap:4px;margin:10px 0 12px}
.slot{flex:1;height:5px;border-radius:3px;background:rgba(255,255,255,.08);transition:background .25s}
.slot.filled.Common   {background:var(--r-common)}
.slot.filled.Rare     {background:var(--r-rare)}
.slot.filled.Epic     {background:var(--r-epic)}
.slot.filled.Legendary{background:var(--r-legend)}

.cat-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.cat-row:last-child{border-bottom:none}
.cat-row-emoji{font-size:24px;width:32px;text-align:center;flex-shrink:0}
.cat-row-info{flex:1;min-width:0}
.cat-row-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-row-sub{font-size:12px;opacity:.45;margin-top:1px}
.cat-row-btn{
  background:rgba(255,255,255,.07);border:none;color:rgba(255,255,255,.6);
  width:32px;height:32px;border-radius:8px;
  font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;padding:0;margin:0;transition:background .15s;
}
.cat-row-btn:active{background:rgba(255,255,255,.15)}

.cage-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:10px;padding-top:10px;
  border-top:1px solid rgba(255,255,255,.05);
}
.cage-income-label{font-size:12px;opacity:.4}
.cage-income-value{font-size:14px;font-weight:700;color:var(--accent2)}
.cage-empty-state{
  text-align:center;padding:16px 0 6px;
  font-size:13px;opacity:.3;
}

/* ─── INCOME BANNER ────────────────────────────────────────── */
.income-banner{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg2);border-radius:var(--radius);
  padding:12px 16px;margin-bottom:10px;
}
.income-banner .lbl{font-size:12px;opacity:.45}
.income-banner .val{font-size:20px;font-weight:800;color:var(--accent2)}

/* ─── BTN ──────────────────────────────────────────────────── */
.btn{
  width:100%;padding:14px;border:none;border-radius:var(--radius);
  font-size:15px;font-weight:700;color:#fff;cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  transition:transform .1s,opacity .1s;
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:6px;
}
.btn:active{transform:scale(.97);opacity:.85}
.btn.secondary{background:rgba(255,255,255,.1)}
.btn:disabled{opacity:.4;cursor:default;transform:none}

/* ─── GACHA SCREEN ─────────────────────────────────────────── */
.gacha-hero{
  background:var(--bg2);border-radius:24px;
  padding:28px 16px;text-align:center;
  margin-bottom:10px;
}
.gacha-hero .g-icon{
  font-size:68px;display:block;margin-bottom:18px;
  animation:gacha-wobble 3.5s ease-in-out infinite;
}
@keyframes gacha-wobble{0%,100%{transform:rotate(0) scale(1)}20%{transform:rotate(-4deg) scale(1.03)}50%{transform:rotate(4deg) scale(1.03)}80%{transform:rotate(-2deg)}}
.gacha-chances{
  display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-bottom:20px;
}
.chance-pill{
  font-size:11px;font-weight:700;
  padding:4px 12px;border-radius:50px;
  background:rgba(255,255,255,.06);
}

/* ─── CAT LIST ITEM ────────────────────────────────────────── */
.cat-list-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;background:var(--bg2);
  border-radius:14px;margin-bottom:6px;
  border-left:3px solid var(--c,#555);
}

/* ─── SHOP ─────────────────────────────────────────────────── */
.shop-stats{display:flex;gap:6px;margin:10px 0}
.shop-stat{
  flex:1;background:rgba(255,255,255,.05);
  border-radius:10px;padding:8px;text-align:center;
}
.shop-stat .sv{font-size:17px;font-weight:800;display:block}
.shop-stat .sl{font-size:10px;opacity:.45;margin-top:2px}
.owned-badge{
  background:#1b5e20;color:#69f0ae;
  font-size:11px;font-weight:700;
  padding:3px 10px;border-radius:50px;
}

/* ─── INVENTORY ────────────────────────────────────────────── */
.inv-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;background:var(--bg2);
  border-radius:var(--radius);margin-bottom:8px;
  border-left:3px solid var(--c,#555);
}
.inv-emoji{font-size:32px;width:44px;text-align:center;flex-shrink:0}
.inv-info{flex:1;min-width:0}
.inv-name{font-weight:700;font-size:14px}
.inv-sub{display:flex;align-items:center;gap:6px;margin-top:3px}
.inv-count{
  background:rgba(255,255,255,.1);
  border-radius:50px;padding:2px 9px;
  font-size:11px;font-weight:700;
}
.inv-place-btn{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;color:#fff;
  padding:9px 14px;border-radius:10px;
  font-size:13px;font-weight:700;
  cursor:pointer;white-space:nowrap;
  margin:0;flex-shrink:0;transition:transform .1s;
}
.inv-place-btn:active{transform:scale(.95)}

/* ─── PLACE MODAL ──────────────────────────────────────────── */
#place-modal{
  display:none;position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,.7);
  align-items:flex-end;justify-content:center;
}
#place-modal.open{display:flex;animation:mIn .22s ease}
@keyframes mIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.modal-sheet{
  background:var(--bg2);border-radius:24px 24px 0 0;
  width:100%;max-height:72vh;overflow-y:auto;
  padding:14px 16px;
  padding-bottom:calc(16px + env(safe-area-inset-bottom,0px));
}
.modal-handle{
  width:36px;height:4px;background:rgba(255,255,255,.18);
  border-radius:2px;margin:0 auto 14px;
}
.modal-title{font-size:16px;font-weight:700;margin-bottom:2px}
.modal-sub{font-size:13px;opacity:.4;margin-bottom:14px}
.cage-option{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:14px;margin-bottom:8px;
  background:rgba(255,255,255,.04);
  border:1.5px solid transparent;cursor:pointer;
  transition:background .15s;
}
.cage-option.avail:hover,.cage-option.avail:active{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15)}
.cage-option.dim{opacity:.32;cursor:not-allowed}
.cage-option-emoji{font-size:26px;width:36px;text-align:center;flex-shrink:0}
.cage-option-info{flex:1}
.cage-option-info b{font-size:14px}
.cage-option-info small{font-size:12px;opacity:.45;display:block;margin-top:2px}
.cage-slot-badge{
  font-size:12px;font-weight:700;
  padding:4px 10px;border-radius:50px;
  background:rgba(255,255,255,.08);white-space:nowrap;
}

/* ─── TOAST ────────────────────────────────────────────────── */
.toast{
  position:fixed;
  bottom:calc(76px + env(safe-area-inset-bottom,0px));
  left:50%;transform:translateX(-50%) translateY(8px);
  background:rgba(18,18,28,.95);color:#fff;
  padding:10px 20px;border-radius:50px;
  font-size:13px;font-weight:500;z-index:500;
  opacity:0;pointer-events:none;white-space:nowrap;
  transition:opacity .22s,transform .22s;
  border:1px solid rgba(255,255,255,.07);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── GACHA OVERLAY ────────────────────────────────────────── */
#gacha-overlay{
  display:none;position:fixed;inset:0;z-index:600;
  flex-direction:column;align-items:center;justify-content:center;
}
#gacha-overlay.visible{
  display:flex;background:rgba(0,0,0,.92);
  animation:fadeIn .28s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

#g-rays{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;animation:spin 14s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.ray{position:absolute;width:110vmax;height:2px;transform-origin:50% 50%;opacity:.14}

#reveal-card{
  position:relative;z-index:2;
  width:min(280px,86vw);border-radius:28px;
  padding:32px 24px 26px;text-align:center;
  animation:cardPop .48s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes cardPop{
  0%  {opacity:0;transform:scale(.25) rotate(-10deg)}
  65% {opacity:1;transform:scale(1.06) rotate(1deg)}
  100%{opacity:1;transform:scale(1) rotate(0)}
}
#reveal-card.Common   {background:linear-gradient(160deg,#242428,#18181c);border:1.5px solid #444}
#reveal-card.Rare     {background:linear-gradient(160deg,#0a2033,#0d1b2e);border:1.5px solid #4fc3f7;box-shadow:0 0 40px #4fc3f728}
#reveal-card.Epic     {background:linear-gradient(160deg,#210d38,#1a0828);border:1.5px solid #ce93d8;box-shadow:0 0 50px #ce93d838}
#reveal-card.Legendary{background:linear-gradient(160deg,#2d1800,#1a0e00);border:1.5px solid #ffd54f;box-shadow:0 0 60px #ffd54f48}

#reveal-emoji{font-size:80px;display:block;margin-bottom:14px;line-height:1}
.bounce #reveal-emoji{animation:catBounce 1.3s ease-in-out infinite .5s}
@keyframes catBounce{0%,100%{transform:translateY(0) scale(1)}45%{transform:translateY(-14px) scale(1.09)}}
#reveal-name{font-size:22px;font-weight:800;margin:10px 0 4px}
#reveal-income{font-size:14px;opacity:.55;margin-bottom:14px}

#reveal-close{
  margin-top:22px;z-index:2;
  width:min(200px,72vw);
  padding:14px;border:none;border-radius:var(--radius);
  font-size:15px;font-weight:700;color:#fff;
  background:rgba(255,255,255,.1);cursor:pointer;
  animation:fadeIn .3s ease .62s both;
  border:1px solid rgba(255,255,255,.1);
}

.particle{
  position:absolute;border-radius:2px;pointer-events:none;
  animation:pFall var(--d) ease-out var(--dl) forwards;
}
@keyframes pFall{0%{opacity:1;transform:translate(0,0) rotate(0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) rotate(var(--r)) scale(.05)}}

/* ─── EMPTY STATE ──────────────────────────────────────────── */
.empty{text-align:center;padding:32px 16px;opacity:.35;font-size:14px;line-height:1.9}
.empty-icon{font-size:40px;display:block;margin-bottom:8px}
</style>
</head>
<body>

<div class="header">
  <h1>🐱 Gacha Cats</h1>
  <div class="balance-pill">💰 <span id="coins">0</span></div>
</div>

<div class="carousel" id="carousel">
  <div class="screen" id="screen-home"></div>
  <div class="screen" id="screen-gacha"></div>
  <div class="screen" id="screen-shop"></div>
  <div class="screen" id="screen-inv"></div>
</div>

<nav class="nav">
  <button class="nav-btn active" id="nav-0" onclick="go(0)"><span class="icon">🏠</span>Клетки</button>
  <button class="nav-btn"        id="nav-1" onclick="go(1)"><span class="icon">🎰</span>Гача</button>
  <button class="nav-btn"        id="nav-2" onclick="go(2)"><span class="icon">🛒</span>Магазин</button>
  <button class="nav-btn"        id="nav-3" onclick="go(3)"><span class="icon">🎒</span>Инвентарь</button>
</nav>

<div class="toast" id="toast"></div>

<!-- PLACE MODAL -->
<div id="place-modal" onclick="closePlaceModal()">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Выбери клетку</div>
    <div class="modal-sub"   id="modal-sub"></div>
    <div id="modal-cages"></div>
    <button class="btn secondary" onclick="closePlaceModal()" style="margin-top:4px">Отмена</button>
  </div>
</div>

<!-- GACHA OVERLAY -->
<div id="gacha-overlay" onclick="closeReveal()">
  <div id="g-rays"></div>
  <div id="reveal-card" onclick="event.stopPropagation()">
    <span id="reveal-emoji">🐱</span>
    <div id="reveal-badge" class="rarity-badge Common">Common</div>
    <div id="reveal-name">Кот</div>
    <div id="reveal-income">+1💰/с</div>
  </div>
  <button id="reveal-close" onclick="closeReveal()">Забрать! 🎉</button>
</div>

<script>
/* ── TELEGRAM ──────────────────────────────────────────────── */
const tg = (typeof Telegram !== 'undefined') ? Telegram.WebApp : null;
if(tg) tg.expand();
function haptic(t='light'){ try{tg?.HapticFeedback?.impactOccurred(t)}catch(e){} }
function hapticN(t='success'){ try{tg?.HapticFeedback?.notificationOccurred(t)}catch(e){} }

/* ── DATA ──────────────────────────────────────────────────── */
const CATS = [
  {emoji:"😺", name:"Обычный кот",   income:1,  rarity:"Common"},
  {emoji:"😸", name:"Полосатый кот", income:2,  rarity:"Common"},
  {emoji:"🦁", name:"Рыжий кот",     income:5,  rarity:"Rare"},
  {emoji:"🐯", name:"Тигровый кот",  income:8,  rarity:"Rare"},
  {emoji:"🐈‍⬛",name:"Чёрный кот",  income:15, rarity:"Epic"},
  {emoji:"🦊", name:"Лисокот",       income:20, rarity:"Epic"},
  {emoji:"👾", name:"Космокот",       income:50, rarity:"Legendary"},
];

const CAGES = [
  {id:"wood",   emoji:"🪵", name:"Деревянная",  rarity:"Common",    slots:2, bonus:1.0, price:0,    allowed:["Common"],                         desc:"Стартовая. Только обычные коты."},
  {id:"iron",   emoji:"⚙️", name:"Железная",    rarity:"Rare",      slots:3, bonus:1.5, price:500,  allowed:["Common","Rare"],                   desc:"3 слота, доход ×1.5"},
  {id:"magic",  emoji:"🔮", name:"Магическая",  rarity:"Epic",      slots:4, bonus:2.0, price:2000, allowed:["Common","Rare","Epic"],             desc:"4 слота, доход ×2"},
  {id:"golden", emoji:"👑", name:"Золотая",     rarity:"Legendary", slots:5, bonus:3.0, price:8000, allowed:["Common","Rare","Epic","Legendary"], desc:"5 слотов, доход ×3"},
];

const WEIGHTS = {Common:70, Rare:25, Epic:4, Legendary:1};
const RL = {Common:"⬜ Common", Rare:"🔵 Rare", Epic:"🟣 Epic", Legendary:"🟡 Legendary"};
const RC = {Common:"#9e9e9e", Rare:"#4fc3f7", Epic:"#ce93d8", Legendary:"#ffd54f"};

/* ── STATE ─────────────────────────────────────────────────── */
let S = null;
const CK = "gacha_v2";

function fresh(){ return {coins:300, inventory:[], cages:[], lastTick:Date.now()} }

function ensure(){
  if(!S.cages.length)     S.cages.push({...CAGES[0], cats:[]});
  if(!S.inventory.length) S.inventory.push({...CATS[0]});
}

function save(){
  try{localStorage.setItem(CK, JSON.stringify(S))}catch(e){}
  if(tg?.CloudStorage) tg.CloudStorage.setItem(CK, JSON.stringify(S), ()=>{});
}

function cloudLoad(cb){
  if(!tg?.CloudStorage){cb(null);return}
  tg.CloudStorage.getItem(CK,(err,v)=>{
    if(err||!v){cb(null);return}
    try{cb(JSON.parse(v))}catch(e){cb(null)}
  });
}

function boot(loaded){
  S = loaded;
  if(!S){ try{S=JSON.parse(localStorage.getItem(CK))}catch(e){} }
  if(!S) S = fresh();
  ensure();
  render();
  setInterval(()=>{
    tick();
    document.getElementById("coins").textContent = fmt(S.coins);
    save();
  }, 4000);
}

function fmt(n){
  n = Math.floor(n);
  if(n>=1000000) return (n/1000000).toFixed(1)+"M";
  if(n>=10000)   return (n/1000).toFixed(1)+"K";
  return n.toLocaleString();
}

/* ── INCOME ────────────────────────────────────────────────── */
function tick(){
  const now = Date.now();
  const dt  = Math.min((now-(S.lastTick||now))/1000, 7200);
  S.lastTick = now;
  S.coins += totalIncome() * dt;
}

function totalIncome(){
  let t=0;
  S.cages.forEach(c=>{ const b=c.bonus||1; c.cats.forEach(cat=>t+=cat.income*b) });
  return t;
}

/* ── NAV ───────────────────────────────────────────────────── */
let cur=0;
function go(i){
  haptic('light');
  cur=i;
  document.getElementById("carousel").style.transform=`translateX(-${i*25}%)`;
  document.querySelectorAll(".nav-btn").forEach((b,j)=>b.classList.toggle("active",j===i));
  render();
}

/* ── TOAST ─────────────────────────────────────────────────── */
let toastT;
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove("show"),2200);
}

/* ── ROLL ──────────────────────────────────────────────────── */
function roll(){
  if(S.coins<50){toast("Нужно 50💰");hapticN('error');return}
  S.coins-=50; haptic('medium');
  const r=Math.random()*100; let cum=0,rarity="Common";
  for(const [k,w] of Object.entries(WEIGHTS)){cum+=w;if(r<cum){rarity=k;break}}
  const pool=CATS.filter(c=>c.rarity===rarity);
  const cat={...pool[Math.floor(Math.random()*pool.length)]};
  S.inventory.push(cat);
  save(); render(); showReveal(cat);
}

/* ── GACHA REVEAL ──────────────────────────────────────────── */
function buildRays(rarity){
  const el=document.getElementById("g-rays"); el.innerHTML="";
  const col=RC[rarity]||"#888";
  const n={Common:8,Rare:10,Epic:12,Legendary:16}[rarity]||8;
  for(let i=0;i<n;i++){
    const d=document.createElement("div"); d.className="ray";
    d.style.cssText=`background:${col};transform:rotate(${(360/n)*i}deg)`;
    el.appendChild(d);
  }
}

function spawnConfetti(rarity){
  const ov=document.getElementById("gacha-overlay");
  const palette={
    Common:["#9e9e9e","#ccc","#fff"],
    Rare:  ["#4fc3f7","#0288d1","#b3e5fc","#fff"],
    Epic:  ["#ce93d8","#7b1fa2","#e1bee7","#fff"],
    Legendary:["#ffd54f","#ff8f00","#fff","#ffcc02"],
  }[rarity]||["#fff"];
  const n={Common:10,Rare:18,Epic:28,Legendary:44}[rarity]||10;
  for(let i=0;i<n;i++){
    const p=document.createElement("div"); p.className="particle";
    const a=Math.random()*360, dist=100+Math.random()*180;
    const tx=Math.cos(a*Math.PI/180)*dist, ty=Math.sin(a*Math.PI/180)*dist-60;
    const col=palette[Math.floor(Math.random()*palette.length)];
    const sz=5+Math.random()*7;
    p.style.cssText=`background:${col};width:${sz}px;height:${sz}px;
      left:calc(50% + ${(Math.random()-.5)*30}px);
      top:calc(50% + ${(Math.random()-.5)*30}px);
      border-radius:${Math.random()>.5?'50%':'2px'};
      --tx:${tx}px;--ty:${ty}px;
      --r:${Math.random()*720-360}deg;
      --d:${.5+Math.random()*.9}s;
      --dl:${Math.random()*.25}s`;
    ov.appendChild(p);
    setTimeout(()=>p.remove(),1600);
  }
}

function showReveal(cat){
  const card  = document.getElementById("reveal-card");
  const badge = document.getElementById("reveal-badge");
  card.className = cat.rarity+(["Epic","Legendary"].includes(cat.rarity)?" bounce":"");
  document.getElementById("reveal-emoji").textContent  = cat.emoji||"🐱";
  document.getElementById("reveal-name").textContent   = cat.name;
  document.getElementById("reveal-income").textContent = `+${cat.income}💰/с`;
  badge.textContent = RL[cat.rarity]||cat.rarity;
  badge.className   = "rarity-badge "+cat.rarity;
  buildRays(cat.rarity);
  document.getElementById("gacha-overlay").classList.add("visible");
  setTimeout(()=>spawnConfetti(cat.rarity),140);
  if(cat.rarity==="Legendary"){hapticN('success');setTimeout(()=>haptic('heavy'),180);setTimeout(()=>haptic('heavy'),400)}
  else if(cat.rarity==="Epic"){hapticN('success');setTimeout(()=>haptic('medium'),280)}
  else if(cat.rarity==="Rare"){hapticN('success')}
}

function closeReveal(){
  haptic('soft');
  document.getElementById("gacha-overlay").classList.remove("visible");
}

/* ── PLACE MODAL ───────────────────────────────────────────── */
let pending=null;

function openPlaceModal(name,rarity,income){
  haptic('light');
  pending={name,rarity,income};
  document.getElementById("modal-title").textContent = `${CATS.find(c=>c.name===name)?.emoji||"🐱"} ${name}`;
  document.getElementById("modal-sub").textContent   = `Редкость: ${RL[rarity]||rarity} · +${income}💰/с`;

  const list=document.getElementById("modal-cages");
  list.innerHTML="";
  let any=false;

  S.cages.forEach((cage,ci)=>{
    const compat  = cage.allowed.includes(rarity);
    const hasRoom = cage.cats.length < cage.slots;
    const avail   = compat && hasRoom;
    if(avail) any=true;

    let hint="";
    if(!compat) hint="Не принимает эту редкость";
    else if(!hasRoom) hint="Клетка заполнена";
    else hint=`Бонус ×${cage.bonus.toFixed(1)} → +${(income*cage.bonus).toFixed(1)}💰/с`;

    const el=document.createElement("div");
    el.className="cage-option "+(avail?"avail":"dim");
    el.innerHTML=`
      <div class="cage-option-emoji">${cage.emoji}</div>
      <div class="cage-option-info">
        <b>${cage.name}</b>
        <small>${hint}</small>
      </div>
      <div class="cage-slot-badge r-${cage.rarity}">${cage.cats.length}/${cage.slots}</div>`;
    if(avail) el.onclick=()=>confirmPlace(ci);
    list.appendChild(el);
  });

  if(!any){
    list.innerHTML+=`<div class="empty" style="padding:20px 0 10px">
      <span class="empty-icon">🔒</span>Нет подходящей клетки с местом.<br>Купи новую в магазине!
    </div>`;
  }

  document.getElementById("place-modal").classList.add("open");
}

function confirmPlace(ci){
  if(!pending) return;
  const {name,rarity,income}=pending;
  const cage=S.cages[ci];
  const idx=S.inventory.findIndex(c=>c.name===name&&c.rarity===rarity&&c.income===income);
  if(idx===-1){toast("Не найден");return}
  cage.cats.push({...S.inventory[idx]});
  S.inventory.splice(idx,1);
  hapticN('success');
  toast(`${name} → ${cage.name}!`);
  save(); render(); closePlaceModal();
}

function closePlaceModal(){
  haptic('soft');
  document.getElementById("place-modal").classList.remove("open");
  pending=null;
}

/* ── REMOVE CAT ────────────────────────────────────────────── */
function removeCat(ci,xi){
  const cat=S.cages[ci].cats.splice(xi,1)[0];
  S.inventory.push({...cat});
  haptic('soft');
  toast(`${cat.name} вернулся в инвентарь`);
  save(); render();
}

/* ── BUY CAGE ──────────────────────────────────────────────── */
function buyCage(id){
  const tpl=CAGES.find(c=>c.id===id);
  if(!tpl) return;
  if(S.cages.find(c=>c.id===id)){toast("Уже куплено!");return}
  if(S.coins<tpl.price){toast(`Нужно ${tpl.price}💰`);hapticN('error');return}
  S.coins-=tpl.price;
  S.cages.push({...tpl,cats:[]});
  hapticN('success');
  toast(`${tpl.emoji} ${tpl.name} куплена!`);
  save(); render();
}

/* ── GROUP INVENTORY ───────────────────────────────────────── */
function groupInv(){
  const map={};
  S.inventory.forEach(c=>{
    const k=`${c.name}|${c.rarity}|${c.income}`;
    if(!map[k]) map[k]={...c,count:0};
    map[k].count++;
  });
  const order={Legendary:0,Epic:1,Rare:2,Common:3};
  return Object.values(map).sort((a,b)=>(order[a.rarity]||9)-(order[b.rarity]||9));
}

/* ── RENDER ────────────────────────────────────────────────── */
function render(){
  if(!S) return;
  tick();
  document.getElementById("coins").textContent = fmt(S.coins);

  /* HOME */
  const inc=totalIncome();
  let h=`<div class="section-title">Мои клетки</div>`;
  if(inc>0) h+=`
    <div class="income-banner">
      <div><div class="lbl">Пассивный доход</div><div class="val">+${inc.toFixed(1)}💰/с</div></div>
      <div style="font-size:32px">💰</div>
    </div>`;
  h+=S.cages.map((cage,ci)=>{
    const b=cage.bonus||1;
    const slotsBar=Array.from({length:cage.slots},(_,i)=>{
      const cat=cage.cats[i];
      return `<div class="slot${cat?" filled "+cat.rarity:""}"></div>`;
    }).join("");
    const catsHTML=cage.cats.length
      ? cage.cats.map((x,xi)=>`
          <div class="cat-row">
            <div class="cat-row-emoji">${x.emoji||"🐱"}</div>
            <div class="cat-row-info">
              <div class="cat-row-name">${x.name}</div>
              <div class="cat-row-sub r-${x.rarity}">${x.rarity} · +${(x.income*b).toFixed(1)}💰/с</div>
            </div>
            <button class="cat-row-btn" onclick="removeCat(${ci},${xi})" title="Вернуть в инвентарь">↩</button>
          </div>`).join("")
      : `<div class="cage-empty-state">🐾 Пусто — добавляй котов из инвентаря</div>`;
    const cageInc=cage.cats.reduce((s,x)=>s+x.income*b,0);
    return `<div class="card cage-card ${cage.rarity}">
      <div class="cage-stripe"></div>
      <div class="cage-head">
        <div class="cage-head-left">
          <div class="cage-head-emoji">${cage.emoji}</div>
          <div>
            <div class="cage-head-name">${cage.name}</div>
            <div class="cage-head-rarity"><span class="rarity-badge ${cage.rarity}">${RL[cage.rarity]}</span></div>
          </div>
        </div>
        <div class="cage-bonus-tag">×${b.toFixed(1)}</div>
      </div>
      <div class="slots-bar">${slotsBar}</div>
      ${catsHTML}
      ${cageInc>0?`<div class="cage-footer"><span class="cage-income-label">Доход с клетки</span><span class="cage-income-value">+${cageInc.toFixed(1)}💰/с</span></div>`:""}
    </div>`;
  }).join("");
  document.getElementById("screen-home").innerHTML=h;

  /* GACHA */
  document.getElementById("screen-gacha").innerHTML=`
    <div class="section-title">Прокрути барабан</div>
    <div class="gacha-hero">
      <span class="g-icon">🎰</span>
      <div class="gacha-chances">
        <span class="chance-pill r-Common">Common 70%</span>
        <span class="chance-pill r-Rare">Rare 25%</span>
        <span class="chance-pill r-Epic">Epic 4%</span>
        <span class="chance-pill r-Legendary">Legendary 1%</span>
      </div>
      <button class="btn" onclick="roll()">🎰 Крутить — 50💰</button>
    </div>
    <div class="section-title">Коты в пуле</div>
    ${CATS.map(c=>`
      <div class="cat-list-item" style="--c:${RC[c.rarity]||'#555'}">
        <span style="font-size:28px">${c.emoji}</span>
        <div style="flex:1">
          <div style="font-weight:600;font-size:14px">${c.name}</div>
          <div style="font-size:12px;opacity:.45">+${c.income}💰/с</div>
        </div>
        <span class="rarity-badge ${c.rarity}">${c.rarity}</span>
      </div>`).join("")}`;

  /* SHOP */
  const owned=new Set(S.cages.map(c=>c.id));
  document.getElementById("screen-shop").innerHTML=
    `<div class="section-title">Магазин клеток</div>`+
    CAGES.map(cage=>{
      const isOwned=owned.has(cage.id);
      const canAfford=S.coins>=cage.price;
      return `<div class="card cage-card ${cage.rarity}" style="padding-top:20px">
        <div class="cage-stripe"></div>
        <div class="cage-head">
          <div class="cage-head-left">
            <div class="cage-head-emoji">${cage.emoji}</div>
            <div>
              <div class="cage-head-name">${cage.name}</div>
              <div class="cage-head-rarity"><span class="rarity-badge ${cage.rarity}">${RL[cage.rarity]}</span></div>
            </div>
          </div>
          ${isOwned?`<span class="owned-badge">✓ Куплено</span>`:""}
        </div>
        <div class="shop-stats">
          <div class="shop-stat"><span class="sv">${cage.slots}</span><span class="sl">Слотов</span></div>
          <div class="shop-stat"><span class="sv">×${cage.bonus.toFixed(1)}</span><span class="sl">Бонус</span></div>
          <div class="shop-stat"><span class="sv" style="font-size:11px;line-height:1.3">${cage.allowed.slice(0,3).join(",")}</span><span class="sl">Коты</span></div>
        </div>
        <div style="font-size:13px;opacity:.4;margin-bottom:10px">${cage.desc}</div>
        ${isOwned
          ?`<button class="btn secondary" disabled>Уже в коллекции</button>`
          :cage.price===0
            ?`<button class="btn secondary" disabled>Стартовая клетка</button>`
            :`<button class="btn" onclick="buyCage('${cage.id}')" ${canAfford?'':'style="opacity:.55"'}>
                ${canAfford?"🛒 Купить за":"🔒"} ${cage.price}💰
              </button>`}
      </div>`;
    }).join("");

  /* INVENTORY */
  const groups=groupInv();
  let inv=`<div class="section-title">Инвентарь (${S.inventory.length} котов)</div>`;
  if(!groups.length){
    inv+=`<div class="empty"><span class="empty-icon">📦</span>Инвентарь пуст.<br>Иди крути гачу!</div>`;
  } else {
    inv+=groups.map(c=>`
      <div class="inv-item ${c.rarity}" style="--c:${RC[c.rarity]||'#555'}">
        <div class="inv-emoji">${c.emoji||"🐱"}</div>
        <div class="inv-info">
          <div class="inv-name">${c.name} ${c.count>1?`<span class="inv-count">×${c.count}</span>`:""}</div>
          <div class="inv-sub">
            <span style="font-size:12px;opacity:.5">+${c.income}💰/с</span>
            <span class="rarity-badge ${c.rarity}">${c.rarity}</span>
          </div>
        </div>
        <button class="inv-place-btn"
          onclick="openPlaceModal(${JSON.stringify(c.name)},${JSON.stringify(c.rarity)},${c.income})">
          ➕ В клетку
        </button>
      </div>`).join("");
  }
  document.getElementById("screen-inv").innerHTML=inv;
}

/* ── SWIPE ─────────────────────────────────────────────────── */
let sx=0,sy=0;
document.body.addEventListener("touchstart",e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
document.body.addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>55 && Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx<0&&cur<3) go(cur+1);
    if(dx>0&&cur>0) go(cur-1);
  }
},{passive:true});

/* ── BOOT ──────────────────────────────────────────────────── */
cloudLoad(data=>boot(data));
</script>
</body>
</html>
