<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gacha Cats</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
  --accent:#5b8cff;
  --accent2:#7cf5c8;
}
body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:var(--tg-theme-bg-color,#1a1a2e);
  color:var(--tg-theme-text-color,#fff);
  overflow:hidden;
}

/* ===== HEADER ===== */
.header{
  padding:14px;
  text-align:center;
}
.balance{
  font-size:20px;
  font-weight:600;
}

/* ===== SHOP BUTTON ===== */
#shop-btn{
  position:fixed;
  top:14px;
  left:14px;
  width:44px;
  height:44px;
  border-radius:50%;
  border:none;
  font-size:22px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#fff;
  z-index:10;
  cursor:pointer;
}

/* ===== CAROUSEL ===== */
.carousel{
  display:flex;
  width:400%;
  height:calc(100vh - 170px);
  transition:transform .35s cubic-bezier(.25,.8,.25,1);
}
.screen{
  width:25%; /* FIX: было 100vw, но внутри flex-контейнера шириной 400% нужно 25% */
  padding:12px;
  box-sizing:border-box;
  overflow-y:auto;
  overflow-x:hidden;
}

/* ===== CARDS ===== */
.card{
  background:var(--tg-theme-secondary-bg-color,#1f1f1f);
  border-radius:20px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 10px 25px rgba(0,0,0,.18);
}

/* ===== BUTTONS ===== */
button{
  width:100%;
  margin-top:8px;
  padding:14px;
  border:none;
  border-radius:18px;
  font-size:16px;
  font-weight:600;
  color:#fff;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  cursor:pointer;
}
button.secondary{
  background:#666;
}

/* ===== BOTTOM MENU ===== */
.menu{
  position:fixed;
  bottom:12px;
  left:0;
  right:0;
  display:flex;
  justify-content:center;
  gap:12px;
}
.menu button{
  width:64px;
  height:64px;
  border-radius:20px;
  font-size:26px;
  padding:0;
  box-shadow:0 6px 18px rgba(0,0,0,.3);
}

/* ===== SMALL ===== */
.small{opacity:.7;font-size:14px}

/* ===== TOAST ===== */
.toast{
  position:fixed;
  top:80px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.8);
  color:#fff;
  padding:10px 20px;
  border-radius:14px;
  font-size:14px;
  z-index:100;
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;
}
.toast.show{opacity:1;}
</style>
</head>

<body>

<button id="shop-btn" onclick="go(2)">🛒</button>

<div class="header">
  <h1>🐱 Gacha Cats</h1>
  <div class="balance">💰 <span id="coins">0</span></div>
</div>

<!-- ===== SCREENS ===== -->
<div class="carousel" id="carousel">
  <div class="screen" id="screen-main"></div>
  <div class="screen" id="screen-gacha"></div>
  <div class="screen" id="screen-shop"></div>
  <div class="screen" id="screen-inventory"></div>
</div>

<!-- ===== MENU ===== -->
<div class="menu">
  <button onclick="go(0)">🏠</button>
  <button onclick="go(1)">🎰</button>
  <button onclick="go(3)">🎒</button>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script>
// Безопасная инициализация Telegram WebApp
const tg = (typeof Telegram !== 'undefined') ? Telegram.WebApp : null;
if (tg) tg.expand();

/* ===== DATA ===== */
const CAT_TEMPLATES = [
  {name:"Обычный кот",   income:1, rarity:"Common"},
  {name:"Полосатый кот", income:2, rarity:"Common"},
  {name:"Рыжий кот",     income:3, rarity:"Rare"},
  {name:"Чёрный кот",    income:5, rarity:"Epic"},
];

const CAGE_TYPES = [
  {emoji:"🪵", name:"Деревянная", slots:2, allowed:["Common","Rare","Epic"]},
];

/* ===== STATE ===== */
let state;
try {
  state = JSON.parse(localStorage.getItem("gacha_safe")) || null;
} catch(e) {
  state = null;
}

if (!state) {
  state = {
    coins: 300,
    inventory: [],
    cages: [],
    lastTick: Date.now()
  };
}

// Гарантируем наличие клетки
if (!state.cages.length) {
  state.cages.push({ ...CAGE_TYPES[0], cats: [] });
}

// Гарантируем наличие котика
if (!state.inventory.length) {
  state.inventory.push({ ...CAT_TEMPLATES[0] });
}

function save() {
  try {
    localStorage.setItem("gacha_safe", JSON.stringify(state));
  } catch(e) {
    showToast("Ошибка сохранения!");
  }
}

/* ===== TOAST ===== */
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

/* ===== PASSIVE INCOME ===== */
function calcPassiveIncome() {
  const now = Date.now();
  const elapsed = (now - (state.lastTick || now)) / 1000; // секунды
  state.lastTick = now;
  let totalIncome = 0;
  state.cages.forEach(cage => {
    cage.cats.forEach(cat => {
      totalIncome += cat.income;
    });
  });
  state.coins += totalIncome * elapsed;
}

// Тик каждые 5 секунд
setInterval(() => {
  calcPassiveIncome();
  save();
  // Обновляем только баланс без перерисовки всего
  document.getElementById("coins").textContent = Math.floor(state.coins);
}, 5000);

/* ===== NAV ===== */
let currentIndex = 0;
function go(i) {
  currentIndex = i;
  document.getElementById("carousel").style.transform = `translateX(-${i * 25}%)`; // FIX: было 100vw, теперь 25% от 400%
  render();
}

/* ===== LOGIC ===== */
function roll() {
  if (state.coins < 50) {
    showToast("Недостаточно монет!");
    return;
  }
  state.coins -= 50;

  // Взвешенный рандом по редкости
  const weights = {Common: 70, Rare: 25, Epic: 5};
  const roll = Math.random() * 100;
  let cumulative = 0;
  let rarity = "Common";
  for (const [r, w] of Object.entries(weights)) {
    cumulative += w;
    if (roll < cumulative) { rarity = r; break; }
  }

  const pool = CAT_TEMPLATES.filter(c => c.rarity === rarity);
  const tpl = pool[Math.floor(Math.random() * pool.length)];
  state.inventory.push({ ...tpl });

  showToast(`Получен: ${tpl.name} (${tpl.rarity})!`);
  save();
  render();
}

function place(catName, catRarity, catIncome) {
  // FIX: принимаем примитивы вместо объекта с count, чтобы точно найти нужный кот
  const cage = state.cages[0];
  if (cage.cats.length >= cage.slots) {
    showToast("Клетка заполнена!");
    return;
  }

  const idx = state.inventory.findIndex(c =>
    c.name === catName && c.rarity === catRarity && c.income === catIncome
  );
  if (idx === -1) return;

  const cat = state.inventory[idx];
  cage.cats.push({ ...cat });
  state.inventory.splice(idx, 1);

  showToast(`${cat.name} помещён в клетку!`);
  save();
  render();
}

function removeCat(cageIdx, catIdx) {
  const cat = state.cages[cageIdx].cats[catIdx];
  state.inventory.push({ ...cat });
  state.cages[cageIdx].cats.splice(catIdx, 1);
  save();
  render();
}

/* ===== INVENTORY GROUPING ===== */
function groupedInventory() {
  const map = {};
  state.inventory.forEach(c => {
    const k = c.name + "|" + c.rarity + "|" + c.income;
    if (!map[k]) map[k] = { ...c, count: 0 };
    map[k].count++;
  });
  return Object.values(map);
}

/* ===== RENDER ===== */
// FIX: используем getElementById вместо обращения по id как глобальной переменной
function render() {
  calcPassiveIncome();
  document.getElementById("coins").textContent = Math.floor(state.coins);

  // === MAIN (клетки) ===
  document.getElementById("screen-main").innerHTML =
    "<h2>🏠 Клетки</h2>" +
    state.cages.map((c, ci) => `
      <div class="card">
        <b>${c.emoji} ${c.name}</b>
        <span class="small"> (${c.cats.length}/${c.slots})</span><br><br>
        ${c.cats.length
          ? c.cats.map((x, xi) => `
              🐱 ${x.name} <span class="small">+${x.income}💰/с</span>
              <button class="secondary" style="margin-top:6px" onclick="removeCat(${ci},${xi})">⬅️ Забрать</button>
            `).join("<hr style='border-color:#333'>")
          : "<span class='small'>Пусто — добавь кота из инвентаря</span>"}
      </div>
    `).join("");

  // === GACHA ===
  document.getElementById("screen-gacha").innerHTML = `
    <h2>🎰 Гача</h2>
    <div class="card">
      <p>Шансы: Common 70% · Rare 25% · Epic 5%</p>
      <button onclick="roll()">🎰 Крутить (50💰)</button>
    </div>
    <div class="card">
      <b>Все коты:</b><br>
      ${CAT_TEMPLATES.map(c =>
        `🐱 ${c.name} — +${c.income}💰/с <span class="small">[${c.rarity}]</span>`
      ).join("<br>")}
    </div>`;

  // === SHOP ===
  document.getElementById("screen-shop").innerHTML =
    "<h2>🛒 Магазин</h2><div class='card'>Скоро здесь появятся товары!</div>";

  // === INVENTORY ===
  const groups = groupedInventory();
  document.getElementById("screen-inventory").innerHTML =
    "<h2>🎒 Инвентарь</h2>" +
    (groups.length === 0
      ? "<div class='card'><span class='small'>Инвентарь пуст — крути гачу!</span></div>"
      : groups.map(c => `
          <div class="card">
            🐱 <b>${c.name}</b> ×${c.count}<br>
            💰 +${c.income}/с &nbsp; <span class="small">[${c.rarity}]</span>
            <button class="secondary"
              onclick="place(${JSON.stringify(c.name)}, ${JSON.stringify(c.rarity)}, ${c.income})">
              ➕ В клетку
            </button>
          </div>
        `).join(""));
}

/* ===== SWIPE ===== */
// FIX: добавлена проверка, чтобы вертикальный скролл не вызывал переключение экранов
let swipeStartX = 0;
let swipeStartY = 0;

document.body.addEventListener("touchstart", e => {
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
}, { passive: true });

document.body.addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - swipeStartX;
  const dy = e.changedTouches[0].clientY - swipeStartY;
  // Горизонтальный свайп должен быть преобладающим
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
    if (dx < 0 && currentIndex < 3) go(currentIndex + 1);
    if (dx > 0 && currentIndex > 0) go(currentIndex - 1);
  }
}, { passive: true });

/* ===== START ===== */
render();
</script>
</body>
</html>
