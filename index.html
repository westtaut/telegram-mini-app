<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Gacha Cats</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body {
  background: var(--tg-theme-bg-color);
  color: var(--tg-theme-text-color);
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 16px;
}
h1, h2 { text-align: center; }
button {
  padding: 10px;
  margin: 5px;
  width: 100%;
  font-size: 16px;
}
.card {
  border: 1px solid #555;
  border-radius: 8px;
  padding: 10px;
  margin: 8px 0;
}
.small { opacity: 0.7; font-size: 14px; }
</style>
</head>

<body>

<h1>🐱 Gacha Cats</h1>
<h2>💰 Монеты: <span id="coins">0</span></h2>

<button onclick="rollGacha()">🎰 Крутить гачу (50 монет)</button>

<h2>🏠 Клетки</h2>
<div id="cages"></div>

<h2>🎒 Инвентарь</h2>
<div id="inventory"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

/* === ДАННЫЕ === */

const cats = [
  {name:"Обычный кот", income:1, rarity:"Common"},
  {name:"Полосатый кот", income:2, rarity:"Common"},
  {name:"Чёрный кот", income:3, rarity:"Uncommon"},
  {name:"Белый кот", income:4, rarity:"Uncommon"},
  {name:"Самурай кот", income:6, rarity:"Rare"},
  {name:"Пират кот", income:7, rarity:"Rare"},
  {name:"Кибер кот", income:9, rarity:"Epic"},
  {name:"Маг кот", income:12, rarity:"Epic"},
  {name:"Дракон кот", income:16, rarity:"Legendary"},
  {name:"Божий кот", income:25, rarity:"Mythic"},
];

const cageTypes = [
  {name:"Деревянная клетка", slots:1, price:100},
  {name:"Железная клетка", slots:3, price:300},
  {name:"Золотая клетка", slots:5, price:700},
];

/* === СОХРАНЕНИЕ === */

let data = JSON.parse(localStorage.getItem("gacha")) || {
  coins: 200,
  inventory: [],
  cages: [],
  lastTime: Date.now()
};

function save() {
  localStorage.setItem("gacha", JSON.stringify(data));
}

/* === ПАССИВНЫЙ ДОХОД === */

function passiveIncome() {
  const now = Date.now();
  const seconds = Math.floor((now - data.lastTime) / 1000);
  let incomePerSec = 0;

  data.cages.forEach(cage => {
    cage.cats.forEach(c => incomePerSec += c.income);
  });

  data.coins += incomePerSec * seconds;
  data.lastTime = now;
  save();
}

/* === ГАЧА === */

function rollGacha() {
  if (data.coins < 50) return alert("Не хватает монет");
  data.coins -= 50;

  const rand = Math.random();
  let pool = cats;

  if (rand > 0.98) pool = cats.slice(8);
  else if (rand > 0.9) pool = cats.slice(6);
  else if (rand > 0.75) pool = cats.slice(4);

  const cat = pool[Math.floor(Math.random() * pool.length)];
  data.inventory.push(cat);

  save();
  render();
  alert(`Ты получил: ${cat.name} 🐱`);
}

/* === ПОКУПКА КЛЕТКИ === */

function buyCage(i) {
  const c = cageTypes[i];
  if (data.coins < c.price) return alert("Недостаточно монет");

  data.coins -= c.price;
  data.cages.push({type: c.name, slots: c.slots, cats: []});
  save();
  render();
}

/* === РАЗМЕСТИТЬ КОТА === */

function placeCat(cageIndex, catIndex) {
  const cage = data.cages[cageIndex];
  if (cage.cats.length >= cage.slots) return;

  cage.cats.push(data.inventory[catIndex]);
  data.inventory.splice(catIndex,1);
  save();
  render();
}

/* === РЕНДЕР === */

function render() {
  document.getElementById("coins").innerText = Math.floor(data.coins);

  const inv = document.getElementById("inventory");
  inv.innerHTML = "";
  data.inventory.forEach((c,i)=>{
    inv.innerHTML += `
      <div class="card">
        🐱 ${c.name} (${c.rarity})<br>
        💰 +${c.income}/сек
        ${data.cages.length ? `<button onclick="placeCat(0,${i})">В клетку</button>`:""}
      </div>`;
  });

  const cages = document.getElementById("cages");
  cages.innerHTML = "";
  data.cages.forEach(c=>{
    cages.innerHTML += `
      <div class="card">
        ${c.type}<br>
        Котов: ${c.cats.length}/${c.slots}
      </div>`;
  });

  cageTypes.forEach((c,i)=>{
    cages.innerHTML += `
      <button onclick="buyCage(${i})">
        Купить ${c.name} (${c.price}💰)
      </button>`;
  });
}

/* === ЗАПУСК === */

passiveIncome();
render();
setInterval(()=>{ passiveIncome(); render(); }, 5000);
</script>

</body>
</html>
