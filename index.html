<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gacha Cats</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
  --accent:#5b8cff;
  --accent2:#7cf5c8;
}
body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:var(--tg-theme-bg-color);
  color:var(--tg-theme-text-color);
  overflow:hidden;
}

/* ===== HEADER ===== */
.header{
  padding:14px;
  text-align:center;
}
.balance{
  font-size:20px;
  font-weight:600;
}

/* ===== SHOP BUTTON ===== */
#shop-btn{
  position:fixed;
  top:14px;
  left:14px;
  width:44px;
  height:44px;
  border-radius:50%;
  border:none;
  font-size:22px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#fff;
  z-index:10;
}

/* ===== CAROUSEL ===== */
.carousel{
  display:flex;
  width:400%;
  height:calc(100vh - 170px);
  transition:transform .35s cubic-bezier(.25,.8,.25,1);
}
.screen{
  width:100vw;
  padding:12px;
  overflow-y:auto;
}

/* ===== CARDS ===== */
.card{
  background:var(--tg-theme-secondary-bg-color,#1f1f1f);
  border-radius:20px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 10px 25px rgba(0,0,0,.18);
}

/* ===== BUTTONS ===== */
button{
  width:100%;
  margin-top:8px;
  padding:14px;
  border:none;
  border-radius:18px;
  font-size:16px;
  font-weight:600;
  color:#fff;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
}
button.secondary{
  background:#666;
}

/* ===== BOTTOM MENU ===== */
.menu{
  position:fixed;
  bottom:12px;
  left:0;
  right:0;
  display:flex;
  justify-content:center;
  gap:12px;
}
.menu button{
  width:64px;
  height:64px;
  border-radius:20px;
  font-size:26px;
  padding:0;
  box-shadow:0 6px 18px rgba(0,0,0,.3);
}

/* ===== SMALL ===== */
.small{opacity:.7;font-size:14px}
</style>
</head>

<body>

<button id="shop-btn" onclick="go(2)">🛒</button>

<div class="header">
  <h1>🐱 Gacha Cats</h1>
  <div class="balance">💰 <span id="coins">0</span></div>
</div>

<!-- ===== SCREENS ===== -->
<div class="carousel" id="carousel">

  <div class="screen" id="screen-main"></div>
  <div class="screen" id="screen-gacha"></div>
  <div class="screen" id="screen-shop"></div>
  <div class="screen" id="screen-inventory"></div>

</div>

<!-- ===== MENU ===== -->
<div class="menu">
  <button onclick="go(0)">🏠</button>
  <button onclick="go(1)">🎰</button>
  <button onclick="go(3)">🎒</button>
</div>

<script>
const tg = Telegram.WebApp;
tg.expand();

/* ===== DATA ===== */
const CAT_TEMPLATES = [
 {name:"Обычный кот",income:1,rarity:"Common"},
 {name:"Полосатый кот",income:2,rarity:"Common"},
];

const CAGE_TYPES = [
 {emoji:"🪵",name:"Деревянная",slots:2,allowed:["Common"]},
];

/* ===== STATE ===== */
let state = JSON.parse(localStorage.getItem("gacha_safe")) || {
  coins:300,
  inventory:[],
  cages:[],
  lastTick:Date.now()
};

if(!state.cages.length){
  state.cages.push({...CAGE_TYPES[0],cats:[]});
}
if(!state.inventory.length){
  state.inventory.push({...CAT_TEMPLATES[0]});
}

function save(){localStorage.setItem("gacha_safe",JSON.stringify(state));}

/* ===== NAV ===== */
let index=0;
function go(i){
  index=i;
  document.getElementById("carousel").style.transform=`translateX(-${i*100}vw)`;
  render();
}

/* ===== LOGIC ===== */
function roll(){
  if(state.coins<50)return;
  state.coins-=50;
  const tpl=CAT_TEMPLATES[Math.floor(Math.random()*CAT_TEMPLATES.length)];
  state.inventory.push({...tpl});
  save();render();
}

function place(cat){
  const cage=state.cages[0];
  if(cage.cats.length>=cage.slots)return;
  cage.cats.push(cat);
  const idx=state.inventory.findIndex(c=>c.name===cat.name);
  state.inventory.splice(idx,1);
  save();render();
}

/* ===== INVENTORY GROUPING ===== */
function groupedInventory(){
  const map={};
  state.inventory.forEach(c=>{
    const k=c.name+c.rarity+c.income;
    map[k]=map[k]||{...c,count:0};
    map[k].count++;
  });
  return Object.values(map);
}

/* ===== RENDER ===== */
function render(){
  coins.textContent=Math.floor(state.coins);

  screen-main.innerHTML="<h2>🏠 Клетка</h2>"+state.cages.map(c=>`
    <div class="card">
      ${c.emoji} ${c.name}<br>
      ${c.cats.map(x=>`🐱 ${x.name}`).join("<br>")||"<span class='small'>Пусто</span>"}
    </div>`).join("");

  screen-gacha.innerHTML=`
    <div class="card">
      <button onclick="roll()">🎰 Крутить (50💰)</button>
    </div>`;

  screen-shop.innerHTML="<h2>🛒 Магазин</h2><div class='card'>Пока пусто</div>";

  screen-inventory.innerHTML="<h2>🎒 Инвентарь</h2>"+groupedInventory().map(c=>`
    <div class="card">
      🐱 ${c.name} ×${c.count}<br>
      💰 +${c.income}
      <button class="secondary" onclick='place(${JSON.stringify(c)})'>➕ В клетку</button>
    </div>`).join("");
}

/* ===== SWIPE ===== */
let sx=0;
document.body.addEventListener("touchstart",e=>sx=e.touches[0].clientX);
document.body.addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-sx;
  if(Math.abs(dx)>50){
    if(dx<0&&index<3)go(index+1);
    if(dx>0&&index>0)go(index-1);
  }
});

/* ===== START ===== */
render();
</script>
</body>
</html>
