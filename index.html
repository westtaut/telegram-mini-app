<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Gacha Cats</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a12;
  --bg1:#12121f;
  --bg2:#1a1a2e;
  --bg3:#252540;
  --sep:rgba(255,255,255,.08);
  --txt:#f0f0ff;
  --txt2:#9090b8;
  --txt3:#505080;
  --gold:#f5c842;
  --gold2:#ffad1f;
  --purple:#a855f7;
  --blue:#60a5fa;
  --teal:#34d399;
  --red:#f87171;
  --pink:#f472b6;
  --orange:#fb923c;
  --indigo:#818cf8;
  --font:'Nunito',sans-serif;
  --r:16px;
  --hdr:56px;
  --nav:64px;
  --safe-bot:env(safe-area-inset-bottom,0px);
  /* Rarity colors */
  --c-common:#9ca3af;
  --c-rare:#60a5fa;
  --c-epic:#c084fc;
  --c-legendary:#f59e0b;
  --c-mythic:#ef4444;
  --c-limited:#f472b6;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--font);overflow:hidden}

/* ── HEADER ── */
.hdr{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:var(--hdr);
  background:rgba(10,10,18,.9);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--sep);
  display:flex;align-items:center;padding:0 14px;gap:10px;
  padding-top:env(safe-area-inset-top,0);
}
.hdr-brand{display:flex;align-items:center;gap:8px;flex:1}
.hdr-ico{font-size:22px}
.hdr-title{font-size:17px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-status{font-size:10px;font-weight:700;color:var(--txt3);display:flex;align-items:center;gap:4px}
.hdr-status-dot{width:6px;height:6px;border-radius:50%;background:var(--txt3)}
.hdr-status.on .hdr-status-dot{background:var(--teal);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hdr-res{display:flex;gap:6px;align-items:center}
.res-chip{display:flex;align-items:center;gap:3px;background:var(--bg2);border-radius:20px;padding:4px 9px;font-size:12px;font-weight:800}
.res-chip.gold{color:var(--gold)}
.res-chip.prism{color:var(--purple);background:rgba(168,85,247,.15)}
.hdr-av{width:34px;height:34px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;border:2px solid var(--gold);flex-shrink:0}

/* ── NAV ── */
.nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:calc(var(--nav) + var(--safe-bot));
  background:rgba(10,10,18,.95);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--sep);
  display:flex;align-items:flex-start;padding-top:6px;
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  border:none;background:none;color:var(--txt3);cursor:pointer;
  font-family:var(--font);font-size:10px;font-weight:700;
  padding:6px 0;position:relative;transition:color .15s;
}
.nb-ico{font-size:22px;line-height:1;transition:transform .15s}
.nb.on{color:var(--gold)}
.nb.on .nb-ico{transform:scale(1.15)}
.nb-dot{position:absolute;top:2px;right:calc(50% - 18px);width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--bg);display:none}
.nb-dot.show{display:block}

/* ── SCREENS ── */
.car{
  display:flex;width:500%;
  height:calc(100dvh - var(--hdr) - var(--nav) - var(--safe-bot));
  margin-top:var(--hdr);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
.scr{
  width:20%;overflow-y:auto;overflow-x:hidden;
  padding:14px 14px calc(20px + var(--safe-bot));
  -webkit-overflow-scrolling:touch;
}

/* ── COMMON ── */
.section-title{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);margin:18px 0 10px}
.section-title:first-child{margin-top:0}
.pill{display:inline-flex;align-items:center;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;letter-spacing:.4px}
.pill.Common{background:rgba(156,163,175,.15);color:var(--c-common)}
.pill.Rare{background:rgba(96,165,250,.12);color:var(--c-rare)}
.pill.Epic{background:rgba(192,132,252,.12);color:var(--c-epic)}
.pill.Legendary{background:rgba(245,158,11,.12);color:var(--c-legendary)}
.pill.Mythic{background:rgba(239,68,68,.12);color:var(--c-mythic)}
.pill.Limited{background:rgba(244,114,182,.15);color:var(--c-limited)}

.btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;padding:14px;border:none;border-radius:var(--r);
  font-size:15px;font-weight:800;color:#fff;cursor:pointer;
  font-family:var(--font);transition:opacity .12s,transform .1s;
}
.btn:active{opacity:.8;transform:scale(.98)}
.btn.gold{background:linear-gradient(135deg,#f5c842,#fb923c);color:#1a0a00}
.btn.purple{background:linear-gradient(135deg,#a855f7,#6366f1)}
.btn.teal{background:linear-gradient(135deg,#34d399,#059669)}
.btn.red{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.btn.gray{background:var(--bg2);color:var(--txt2)}
.btn.pink{background:linear-gradient(135deg,#f472b6,#a855f7)}
.btn:disabled{opacity:.3;transform:none;cursor:default}

/* ── CARD ── */
.card{background:var(--bg1);border-radius:var(--r);border:1px solid var(--sep)}

/* ── STAT GRID ── */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.scard{background:var(--bg2);border-radius:12px;padding:12px 8px;text-align:center}
.sval{font-size:18px;font-weight:900;display:block;line-height:1}
.slbl{font-size:9px;color:var(--txt2);margin-top:3px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}

/* ── INNER TABS ── */
.itabs{display:flex;background:var(--bg2);border-radius:12px;padding:3px;margin-bottom:16px;gap:2px}
.itab{
  flex:1;padding:8px 4px;border:none;border-radius:9px;
  font-size:12px;font-weight:800;cursor:pointer;
  background:none;color:var(--txt3);font-family:var(--font);
  transition:all .15s;position:relative;
}
.itab.on{background:var(--bg1);color:var(--txt);box-shadow:0 2px 8px rgba(0,0,0,.5)}
.itab-dot{position:absolute;top:3px;right:4px;width:6px;height:6px;background:var(--red);border-radius:50%;display:none}
.itab-dot.show{display:block}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(var(--nav) + var(--safe-bot) + 12px);left:50%;
  transform:translateX(-50%) translateY(6px);
  background:rgba(20,20,35,.97);color:var(--txt);
  padding:10px 22px;border-radius:24px;font-size:13px;font-weight:700;
  z-index:900;opacity:0;pointer-events:none;white-space:nowrap;
  transition:opacity .2s,transform .2s;
  border:1px solid var(--sep);backdrop-filter:blur(12px);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── CONN BANNER ── */
.conn-banner{
  display:none;position:fixed;top:calc(var(--hdr) + env(safe-area-inset-top,0) + 6px);left:50%;
  transform:translateX(-50%);
  background:rgba(20,20,35,.97);border:1px solid var(--sep);
  color:var(--txt2);font-size:11px;font-weight:700;
  padding:6px 16px;border-radius:20px;z-index:110;white-space:nowrap;
  backdrop-filter:blur(12px);
}
.conn-banner.show{display:block}
.conn-banner.online{color:var(--teal)}

/* ── LEVEL FLASH ── */
.lvl-flash{
  position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);
  z-index:800;pointer-events:none;font-size:52px;
  animation:lv-flash .9s ease forwards;
}
@keyframes lv-flash{
  0%{opacity:1;transform:translate(-50%,-50%) scale(.3)}
  50%{opacity:1;transform:translate(-50%,-65%) scale(1.2)}
  100%{opacity:0;transform:translate(-50%,-80%) scale(1.1)}
}

/* ══════════════════════════════════════
   SCREEN 0 — HOME (Клан / Коты)
══════════════════════════════════════ */
.home-hero{
  background:linear-gradient(135deg,rgba(168,85,247,.15),rgba(245,200,66,.08));
  border:1px solid rgba(168,85,247,.2);
  border-radius:20px;padding:18px 16px;margin-bottom:16px;
}
.income-banner{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--bg2);border-radius:12px;padding:12px 14px;margin-bottom:12px;
}
.income-val{font-size:22px;font-weight:900;color:var(--gold)}
.income-sub{font-size:11px;color:var(--txt2);margin-top:1px}

/* cage cards */
.cage-card{background:var(--bg1);border-radius:var(--r);overflow:hidden;margin-bottom:10px;border:1px solid var(--sep)}
.cage-accent{height:3px}
.cage-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px}
.cage-name{font-size:15px;font-weight:800;display:flex;align-items:center;gap:7px}
.cage-cats{display:flex;gap:4px;padding:0 14px 6px;flex-wrap:wrap}
.cage-cat-chip{
  display:flex;align-items:center;gap:5px;background:var(--bg2);
  border-radius:10px;padding:6px 10px;cursor:pointer;transition:background .1s;
  border:1px solid var(--sep);
}
.cage-cat-chip:active{background:var(--bg3)}
.cage-empty-slot{
  display:flex;align-items:center;justify-content:center;
  width:44px;height:44px;border-radius:10px;
  border:1.5px dashed rgba(255,255,255,.1);cursor:pointer;
  font-size:20px;color:var(--txt3);transition:all .1s;
}
.cage-empty-slot:active{background:var(--bg2)}
.cage-footer{display:flex;justify-content:space-between;padding:8px 14px;border-top:1px solid var(--sep);background:rgba(0,0,0,.2)}

/* ══════════════════════════════════════
   SCREEN 1 — КОЛЛЕКЦИЯ котов (карточки)
══════════════════════════════════════ */
.coll-search{
  width:100%;background:var(--bg2);border:1px solid var(--sep);
  border-radius:12px;padding:11px 14px;font-size:14px;font-weight:700;
  color:var(--txt);outline:none;margin-bottom:14px;font-family:var(--font);
}
.coll-search:focus{border-color:var(--purple)}
.coll-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
/* Cat card */
.cat-card{
  background:var(--bg1);border-radius:14px;
  border:1.5px solid var(--c-sep,var(--sep));
  padding:10px 8px 10px;text-align:center;
  cursor:pointer;transition:all .12s;position:relative;overflow:hidden;
}
.cat-card:active{transform:scale(.96)}
.cat-card.locked{opacity:.35}
.cat-card-shine{
  position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 40%,var(--c-glow,transparent) 60%,transparent 80%);
  pointer-events:none;
}
.cat-em{font-size:34px;display:block;line-height:1;margin-bottom:5px}
.cat-nm{font-size:10px;font-weight:800;color:var(--txt2);line-height:1.3}
.cat-tier{font-size:9px;font-weight:900;margin-top:3px}
.cat-card-count{
  position:absolute;top:5px;right:5px;
  background:rgba(0,0,0,.7);border-radius:8px;
  font-size:9px;font-weight:900;padding:2px 5px;color:var(--gold);
}
/* Tier badge */
.tier-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:18px;height:18px;border-radius:5px;
  font-size:9px;font-weight:900;
}
.tier-1{background:rgba(156,163,175,.2);color:var(--c-common)}
.tier-2{background:rgba(96,165,250,.2);color:var(--c-rare)}
.tier-3{background:rgba(192,132,252,.2);color:var(--c-epic)}
.tier-4{background:rgba(245,158,11,.2);color:var(--c-legendary)}
.tier-5{background:rgba(239,68,68,.2);color:var(--c-mythic)}

/* ══════════════════════════════════════
   SCREEN 2 — ГАЧА
══════════════════════════════════════ */
.gacha-banner{
  border-radius:20px;padding:20px 16px;margin-bottom:14px;
  position:relative;overflow:hidden;text-align:center;
}
.gacha-banner.standard{
  background:linear-gradient(135deg,#1e1b4b,#312e81);
  border:1px solid rgba(99,102,241,.3);
}
.gacha-banner.limited{
  background:linear-gradient(135deg,#450a0a,#7f1d1d,#450a0a);
  border:1px solid rgba(244,114,182,.4);
}
.gacha-banner-stars{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.star-p{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;animation:star-twinkle var(--d,3s) var(--dl,0s) ease-in-out infinite}
@keyframes star-twinkle{0%,100%{opacity:.2}50%{opacity:.9}}
.gacha-title{font-size:20px;font-weight:900;margin-bottom:4px;position:relative}
.gacha-subtitle{font-size:12px;color:rgba(255,255,255,.6);position:relative}
.gacha-pity{
  display:flex;justify-content:center;gap:8px;margin-top:10px;position:relative;
}
.pity-chip{background:rgba(0,0,0,.4);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700}
.gacha-rates-row{display:flex;justify-content:center;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.rate-chip{font-size:10px;font-weight:700;padding:3px 9px;border-radius:16px;background:var(--bg2)}

/* Currency info */
.currency-info{
  background:var(--bg2);border-radius:14px;padding:12px 14px;
  margin-bottom:12px;display:flex;align-items:center;gap:10px;
}
.currency-ico{font-size:28px}
.currency-name{font-size:14px;font-weight:800}
.currency-desc{font-size:11px;color:var(--txt2);margin-top:1px}
.currency-bal{font-size:18px;font-weight:900;color:var(--purple);margin-left:auto}

/* Gacha result overlay */
#gov{
  display:none;position:fixed;inset:0;z-index:600;
  flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.95);
}
#gov.vis{display:flex;animation:gov-in .28s ease}
@keyframes gov-in{from{opacity:0}to{opacity:1}}
.gov-stars{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.gov-rays{position:absolute;inset:0;overflow:hidden;pointer-events:none;animation:rays-spin 12s linear infinite}
@keyframes rays-spin{to{transform:rotate(360deg)}}
.ray{position:absolute;width:120vmax;height:2px;transform-origin:50% 50%;opacity:.06}
#rcrd{
  position:relative;z-index:2;width:min(300px,90vw);
  border-radius:24px;padding:28px 22px 22px;text-align:center;
  animation:card-pop .55s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes card-pop{
  0%{opacity:0;transform:scale(.1) rotate(-12deg)}
  65%{opacity:1;transform:scale(1.06) rotate(.5deg)}
  100%{opacity:1;transform:scale(1) rotate(0)}
}
#rcrd.Common{background:var(--bg1);border:2px solid rgba(156,163,175,.3)}
#rcrd.Rare{background:linear-gradient(160deg,#071c3a,#0a1a30);border:2px solid var(--c-rare);box-shadow:0 0 50px rgba(96,165,250,.25)}
#rcrd.Epic{background:linear-gradient(160deg,#1c0835,#130622);border:2px solid var(--c-epic);box-shadow:0 0 60px rgba(192,132,252,.3)}
#rcrd.Legendary{background:linear-gradient(160deg,#281200,#180800);border:2px solid var(--c-legendary);box-shadow:0 0 70px rgba(245,158,11,.35)}
#rcrd.Mythic{background:linear-gradient(160deg,#200015,#1a0008);border:2px solid var(--c-mythic);box-shadow:0 0 80px rgba(239,68,68,.4)}
#rcrd.Limited{background:linear-gradient(160deg,#220020,#1a001a);border:2px solid var(--c-limited);box-shadow:0 0 80px rgba(244,114,182,.4)}
#grem{font-size:88px;display:block;margin-bottom:8px;line-height:1;position:relative}
.bnc #grem{animation:em-bounce 1.2s ease-in-out infinite .5s}
@keyframes em-bounce{0%,100%{transform:translateY(0)}45%{transform:translateY(-18px) scale(1.08)}}
#grnm{font-size:22px;font-weight:900;margin:8px 0 4px}
#grinc{font-size:13px;color:var(--txt2);margin-bottom:6px}
#gr-cards{font-size:12px;font-weight:800;color:var(--gold);margin-bottom:14px}
#grcl{
  margin-top:16px;z-index:2;width:min(200px,75vw);
  padding:14px;border:none;border-radius:16px;font-size:15px;font-weight:800;
  color:#fff;background:rgba(255,255,255,.1);cursor:pointer;
  animation:gov-in .3s ease .6s both;font-family:var(--font);
}
/* Multi-pull grid */
.multi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:14px;background:var(--bg1);border-radius:16px;padding:12px}
.mini-pull{background:var(--bg2);border-radius:9px;padding:6px 4px;text-align:center;font-size:20px;line-height:1}
.mini-pull.new{animation:pop-in .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop-in{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.mini-pull.Rare{border-top:2px solid var(--c-rare)}
.mini-pull.Epic{border-top:2px solid var(--c-epic)}
.mini-pull.Legendary{border-top:2px solid var(--c-legendary)}
.mini-pull.Mythic{border-top:2px solid var(--c-mythic)}
.mini-pull.Limited{border-top:2px solid var(--c-limited)}

/* ══════════════════════════════════════
   SCREEN 3 — БОЙ (Рейды + PvP)
══════════════════════════════════════ */
.raid-hero{
  background:linear-gradient(135deg,rgba(239,68,68,.1),rgba(251,146,60,.06));
  border:1px solid rgba(239,68,68,.2);border-radius:20px;
  padding:16px;margin-bottom:14px;
}
.raid-zones-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.raid-zone{
  background:var(--bg1);border-radius:14px;padding:14px 12px;
  border:1px solid var(--sep);cursor:pointer;transition:all .12s;
  position:relative;overflow:hidden;
}
.raid-zone::before{content:"";position:absolute;inset:0;background:var(--zb,transparent);pointer-events:none}
.raid-zone:active{transform:scale(.97)}
.raid-zone.locked{opacity:.35;cursor:default}
.rz-ico{font-size:30px;display:block;margin-bottom:6px}
.rz-name{font-size:12px;font-weight:800;margin-bottom:2px}
.rz-meta{font-size:10px;color:var(--txt3)}
.rz-rwd{font-size:10px;color:var(--teal);font-weight:700;margin-top:4px}
.active-raid{background:var(--bg1);border-radius:14px;padding:12px;margin-bottom:8px;border:1px solid rgba(251,146,60,.2)}
.active-raid-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.raid-prog{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden}
.raid-prog-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--orange));border-radius:2px;transition:width 2s linear}

.pvp-hero{
  background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(244,114,182,.07));
  border:1px solid rgba(99,102,241,.2);border-radius:20px;
  padding:16px;margin-bottom:14px;
}
.pvp-status-row{display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:12px;padding:10px 14px;margin-bottom:10px}
.pvp-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);flex-shrink:0}
.pvp-dot.searching{background:var(--orange);animation:pulse 1.2s infinite}
.pvp-dot.idle{background:var(--bg3);animation:none}
.pvp-queue-anim{text-align:center;padding:20px 0}
.pvp-dots{display:inline-flex;gap:6px;margin-top:10px}
.pvp-dots span{width:7px;height:7px;border-radius:50%;background:var(--indigo);animation:pvp-da 1s ease-in-out infinite}
.pvp-dots span:nth-child(2){animation-delay:.15s}
.pvp-dots span:nth-child(3){animation-delay:.3s}
@keyframes pvp-da{0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(-6px);opacity:1}}
.fighter-card{background:var(--bg2);border-radius:14px;padding:12px;text-align:center}
.fighter-em{font-size:38px;display:block;margin-bottom:4px}
.fighter-nm{font-size:11px;font-weight:800;margin-bottom:2px}
.fighter-pw{font-size:10px;color:var(--txt2)}

/* ══════════════════════════════════════
   SCREEN 4 — ЗАДАНИЯ
══════════════════════════════════════ */
.quest-card{background:var(--bg1);border-radius:14px;padding:14px;margin-bottom:8px;border:1px solid var(--sep)}

function fmtN(n){if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.floor(n).toString();}

function totalCards(catId){

  return (S.cards[catId]||0);
}
function tierProgress(catId){
  const t=catTier(catId);if(t>=5)return{tier:5,needed:0,have:(S.cards[catId]||0)};
  const needed=TIER_CARDS[t+1]-TIER_CARDS[t];
  const have=S.cards[catId]||0;
  return{tier:t,needed,have:Math.min(have,needed)};
}

function catPower(catId){
  const t=catTier(catId);if(!t)return 0;
  const def=CAT_BY_ID[catId];if(!def)return 0;
  return Math.floor(def.basePower*TIER_POWER_MULT[t]);
}
function catIncome(catId){
  const t=catTier(catId);if(!t)return 0;
  const def=CAT_BY_ID[catId];if(!def)return 0;
  return def.baseIncome*TIER_INCOME_MULT[t];
}
function catFishRate(catId){
  const t=catTier(catId);if(!t)return 0;

  const tryServerLoad=(localData)=>{
    if(!MY_UID||MY_UID.startsWith('local_')){cb(localData);return;}
    fetch(`${SERVER_URL}/api/player/${MY_UID}/load`,{signal:AbortSignal.timeout(8000)})
      .then(r=>r.json())
      .then(d=>{
        if(!d.ok||!d.state){cb(localData);return;}
        try{
          const serverState=JSON.parse(d.state);
          const localTs=localData?.lastTick||0;
          const serverTs=d.savedAt||0;
          if(serverTs>localTs+5000){cb(serverState);}
          else{cb(localData);}
        }catch(e){cb(localData);}
      }).catch(()=>cb(localData));
  };
  if(!tg?.CloudStorage){
    let local=null;try{local=JSON.parse(localStorage.getItem(CK));}catch(e){}
    tryServerLoad(local);return;
  }
  tg.CloudStorage.getItem(CK,(err,v)=>{
    let cloudData=null;
    if(!err&&v){try{cloudData=JSON.parse(v);}catch(e){}}
    tryServerLoad(cloudData);
  });
};

/* ════ GACHA SYSTEM ════ */
function weightedRoll(weights){
  const total=Object.values(weights).reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(const [k,v] of Object.entries(weights)){r-=v;if(r<=0)return k;}
  return Object.keys(weights)[Object.keys(weights).length-1];
}

function getBannerPulls(bannerId){
  if(!S.bannerPulls[bannerId])S.bannerPulls[bannerId]={pulls:0,guaranteedAt:0};
  return S.bannerPulls[bannerId];
}

function doGachaPull(bannerId){
  const banner=BANNERS[bannerId];
  if(!banner)return null;
  const cost=banner.cost;
  if(cost.currency==='prism'&&S.prism<cost.amount){toast('Нужно 🔮 призм!');return null;}
  S.prism-=cost.amount;
  const bp=getBannerPulls(bannerId);
  bp.pulls++;
  // Pity: guarantee Legendary/Mythic/Limited at 90
  let rarity;
  if(bp.pulls>=90){
    rarity=bannerId==='limited'?'Limited':'Legendary';
    bp.pulls=0;
  } else if(bp.pulls>=75){
    // Soft pity: increasing chance
    const softChance=(bp.pulls-74)*0.06;
    rarity=Math.random()<softChance?(bannerId==='limited'?'Limited':'Legendary'):weightedRoll(banner.rates);
  } else {
    rarity=weightedRoll(banner.rates);
  }
  // Pick cat from pool
  const pool=banner.catIds.filter(id=>CAT_BY_ID[id].rarity===rarity);
  let catId;
  if(pool.length===0){
    // Fallback to closest rarity
    const fallPool=banner.catIds;
    catId=fallPool[Math.floor(Math.random()*fallPool.length)];
  } else {
    catId=pool[Math.floor(Math.random()*pool.length)];
  }
  // Give card
  if(!S.cards[catId])S.cards[catId]=0;
  S.cards[catId]++;
  // If first time, set tier 1
  if(!S.owned[catId])S.owned[catId]={tier:1};
  const cat=CAT_BY_ID[catId];
  // Quest tracking
  progressQuest('d_gacha',1);
  progressQuest('d_collect',1);
  progressQuest('s_first',1);
  if(cat.rarity==='Rare')progressQuest('s_rare',1);
  if(cat.rarity==='Epic')progressQuest('s_epic',1);
  if(cat.rarity==='Legendary')progressQuest('s_legend',1);
  const uniqOwned=Object.keys(S.owned).length;
  S.quests['s_coll3']={progress:Math.min(3,uniqOwned),claimed:S.quests['s_coll3']?.claimed||false};
  S.quests['s_coll10']={progress:Math.min(10,uniqOwned),claimed:S.quests['s_coll10']?.claimed||false};
  return {catId,cat,rarity:cat.rarity,isNew:S.cards[catId]===1};
}

function doGacha10(bannerId){
  const banner=BANNERS[bannerId];
  if(!banner)return null;
  const cost=banner.cost10;
  if(cost.currency==='prism'&&S.prism<cost.amount){toast('Нужно 🔮 призм!');return null;}
  S.prism-=cost.amount;
  const results=[];
  // Guarantee at least 1 Rare+
  let hasRarePlus=false;
  for(let i=0;i<10;i++){
    const bp=getBannerPulls(bannerId);
    bp.pulls++;
    let rarity;
    if(bp.pulls>=90){rarity=bannerId==='limited'?'Limited':'Legendary';bp.pulls=0;}
    else if(bp.pulls>=75){const sc=(bp.pulls-74)*.06;rarity=Math.random()<sc?(bannerId==='limited'?'Limited':'Legendary'):weightedRoll(banner.rates);}
    else rarity=weightedRoll(banner.rates);
    if(!['Common'].includes(rarity))hasRarePlus=true;
    const pool=banner.catIds.filter(id=>CAT_BY_ID[id].rarity===rarity);
    let catId;
    if(pool.length===0){const fp=banner.catIds;catId=fp[Math.floor(Math.random()*fp.length)];}
    else catId=pool[Math.floor(Math.random()*pool.length)];
    if(!S.cards[catId])S.cards[catId]=0;
    S.cards[catId]++;
    if(!S.owned[catId])S.owned[catId]={tier:1};
    results.push({catId,cat:CAT_BY_ID[catId],rarity:CAT_BY_ID[catId].rarity});
  }
  // If no rare+, upgrade last to Rare
  if(!hasRarePlus){
    const last=results[results.length-1];
    const pool=banner.catIds.filter(id=>CAT_BY_ID[id].rarity==='Rare');
    if(pool.length){
      const catId=pool[Math.floor(Math.random()*pool.length)];
      S.cards[catId]=(S.cards[catId]||0)+1;
      if(!S.owned[catId])S.owned[catId]={tier:1};
      last.catId=catId;last.cat=CAT_BY_ID[catId];last.rarity='Rare';
    }
  }
  progressQuest('d_gacha',10);
  progressQuest('d_collect',10);
  progressQuest('s_first',1);
  const uniqOwned=Object.keys(S.owned).length;
  S.quests['s_coll3']={progress:Math.min(3,uniqOwned),claimed:S.quests['s_coll3']?.claimed||false};
  S.quests['s_coll10']={progress:Math.min(10,uniqOwned),claimed:S.quests['s_coll10']?.claimed||false};
  return results;
}

/* ════ TIER UPGRADE ════ */
function upgradeTier(catId){
  if(!catOwned(catId)){toast('Сначала получи кота!');return;}
  const t=catTier(catId);
  if(t>=5){toast('Максимальный тир!');return;}
  const needed=TIER_CARDS[t+1]-TIER_CARDS[t];
  const have=S.cards[catId]||0;
  if(have<needed){toast(`Нужно ${needed} карточек (есть ${have})`);return;}
  S.cards[catId]-=needed;
  S.owned[catId].tier=t+1;
  H('heavy');HN('success');

}

function removeCatFromCage(ci,xi){
  const catId=S.cages[ci].cats[xi];
  S.cages[ci].cats.splice(xi,1);
  H('soft');toast(`${CAT_BY_ID[catId]?.emoji||'🐱'} убран из клетки`);
  save();renderHome();
}
function buyCage(id){
  const tpl=CAGES.find(c=>c.id===id);
  if(!tpl||S.coins<tpl.price){toast('Недостаточно монет!');return;}
  S.coins-=tpl.price;
  S.cages.push({...tpl,cats:[]});
  HN('success');toast(`${tpl.emoji} ${tpl.name} куплена!`);
  save();render();
}

let cageModalCI=-1;
function openCageModal(ci){
  cageModalCI=ci;
  const cage=S.cages[ci];
  document.getElementById('cage-modal-sub').textContent=`${cage.name} — слот ${cage.cats.filter(id=>catOwned(id)).length+1}/${cage.slots}`;
  const list=document.getElementById('cage-modal-list');

  const available=Object.keys(S.owned).filter(catId=>{

        <span style="font-size:24px">${def.emoji}</span>

function closeCageM(){document.getElementById('cage-modal').classList.remove('open');cageModalCI=-1;}

/* ── COLLECTION ── */
let collFilter='all';
let collSearch='';
function renderCollection(){
  const rarityOrder={Limited:0,Mythic:1,Legendary:2,Epic:3,Rare:4,Common:5};
  const rarities=['all','Limited','Mythic','Legendary','Epic','Rare','Common'];
  let h=`<input class="coll-search" placeholder="🔍 Поиск кота..." id="coll-search-inp" value="${collSearch}" oninput="collSearch=this.value;renderCollection()" />`;
  // Filter tabs
  h+=`<div style="display:flex;gap:4px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px">
    ${rarities.map(r=>`<button onclick="collFilter='${r}';renderCollection()" style="flex-shrink:0;padding:5px 12px;border:none;border-radius:20px;font-size:11px;font-weight:800;cursor:pointer;font-family:var(--font);background:${collFilter===r?'var(--purple)':'var(--bg2)'};color:${collFilter===r?'#fff':'var(--txt2)'}">
      ${r==='all'?'Все':r}
    </button>`).join('')}
  </div>`;
  // Stats
  const ownedCount=Object.keys(S.owned).length;
  const totalCount=CATS.length;
  h+=`<div class="sgrid" style="margin-bottom:14px">
    <div class="scard"><span class="sval" style="color:var(--purple)">${ownedCount}/${totalCount}</span><div class="slbl">Открыто</div></div>
    <div class="scard"><span class="sval" style="color:var(--gold)">${Object.values(S.cards).reduce((a,b)=>a+b,0)}</span><div class="slbl">Карточек</div></div>
    <div class="scard"><span class="sval" style="color:var(--teal)">${Math.max(0,...Object.keys(S.owned).map(id=>catTier(id)))}</span><div class="slbl">Макс тир</div></div>
  </div>`;
  let cats=CATS.filter(cat=>{
    if(collFilter!=='all'&&cat.rarity!==collFilter)return false;
    if(collSearch&&!cat.name.toLowerCase().includes(collSearch.toLowerCase())&&!cat.emoji.includes(collSearch))return false;
    return true;
  });
  cats.sort((a,b)=>{
    const aOwned=catOwned(a.id)?0:1;const bOwned=catOwned(b.id)?0:1;
    if(aOwned!==bOwned)return aOwned-bOwned;
    return(rarityOrder[a.rarity]||9)-(rarityOrder[b.rarity]||9);
  });
  h+=`<div class="coll-grid">`;
  cats.forEach(cat=>{
    const owned=catOwned(cat.id);
    const t=catTier(cat.id);
    const cards=catCards(cat.id);
    const gc=RC[cat.rarity]||'#fff';
    const gl=GLOW[cat.rarity]||'transparent';
    h+=`<div class="cat-card ${owned?'':'locked'}" 
      style="--c-sep:${owned?gc+'44':'rgba(255,255,255,.05)'};--c-glow:${gl}"
      onclick="${owned?`openCatDetail('${cat.id}')`:''}">
      <div class="cat-card-shine"></div>
      ${cards>0?`<div class="cat-card-count">🃏${cards}</div>`:''}
      <span class="cat-em">${cat.emoji}</span>
      <div class="cat-nm">${cat.name}</div>
      <div style="margin-top:4px">
        ${owned?`<span style="font-size:10px;font-weight:900;color:${TIER_COLORS[t]||'#fff'}">T${t} ${TIER_NAMES[t]}</span>`:
        `<span style="font-size:9px;color:var(--txt3)">🔒 Не открыт</span>`}
      </div>
      <div style="margin-top:2px"><span class="pill ${cat.rarity}" style="font-size:8px">${cat.rarity}</span></div>
    </div>`;
  });
  h+=`</div>`;
  document.getElementById('s1').innerHTML=h;
}

function renderCatDetail(catId){
  const def=CAT_BY_ID[catId];if(!def)return;
  const owned=catOwned(catId);
  const t=catTier(catId);
  const cards=catCards(catId);
  const gc=RC[def.rarity]||'#fff';
  const gl=GLOW[def.rarity]||'transparent';
  document.getElementById('cd-title').textContent=def.name;
  document.getElementById('cd-rarity-pill').innerHTML=`<span class="pill ${def.rarity}">${def.rarity}</span>`;
  const prog=tierProgress(catId);
  let body=`
  <div class="cat-portrait" style="--pglow:${gl}">
    <span class="cat-big-em">${def.emoji}</span>
    <div class="cat-big-nm">${def.name}</div>
    <div class="cat-tier-row">
      ${owned?`<span style="font-size:16px;font-weight:900;color:${TIER_COLORS[t]}">${TIER_NAMES[t]} (T${t})</span>`:
      `<span style="font-size:13px;color:var(--txt3)">🔒 Не получен</span>`}
    </div>
  </div>`;
  // Cards & tier upgrade
  body+=`<div class="tier-upgrade-section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:14px;font-weight:900">Прокачка тира</div>
      <div style="font-size:12px;color:var(--txt2)">🃏 ${cards} карточек</div>
    </div>`;
  // Tier segments
  body+=`<div class="tier-bar">`;
  for(let i=1;i<=5;i++){
    const filled=owned&&t>=i;
    body+=`<div class="tier-segment ${filled?'filled':''}" style="--tc:${TIER_COLORS[i]}"></div>`;
  }
  body+=`</div>`;
  // Upgrade path
  body+=`<div class="upgrade-path">`;
  for(let i=1;i<=5;i++){
    const done=owned&&t>=i;
    const isCurrent=owned&&t===i-1;
    const needTotal=TIER_CARDS[i]-TIER_CARDS[i>0?i-1:0];
    body+=`<div class="up-step ${isCurrent?'current':''} ${done?'done':''}">
      <div class="up-step-num">T${i}</div>
      <div class="up-step-cost" style="color:${done?'var(--teal)':isCurrent?'var(--gold)':'var(--txt3)'}">
        ${done?'✓':isCurrent?`${Math.min(cards,needTotal)}/${needTotal}`:`${needTotal}🃏`}
      </div>
    </div>`;
  }
  body+=`</div>`;
  if(owned&&t<5){
    const needed=prog.needed;const have=Math.min(cards,needed);const canUpgrade=cards>=needed;
    body+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div>
        <div style="font-size:12px;font-weight:800;color:var(--txt2)">До T${t+1}</div>
        <div style="font-size:11px;color:var(--txt3);margin-top:2px">Нужно: ${needed} карточек</div>
      </div>
      <div class="tier-cost" style="color:${canUpgrade?'var(--gold)':'var(--txt3)'}">
        <span style="font-size:22px">🃏</span> ${have}/${needed}
      </div>
    </div>
    <button class="btn ${canUpgrade?'gold':'gray'}" onclick="upgradeTier('${catId}')" ${canUpgrade?'':'disabled'}>
      ⭐ Повысить до T${t+1} ${canUpgrade?'':'(недостаточно карточек)'}
    </button>`;
  } else if(owned&&t===5){
    body+=`<div style="text-align:center;padding:10px;color:var(--gold);font-weight:900;font-size:14px">✨ Максимальный тир!</div>`;
  } else if(!owned){
    body+=`<div style="text-align:center;padding:10px;color:var(--txt3);font-size:12px;font-weight:700">Крути гачу, чтобы получить карточки</div>
    <button class="btn purple" onclick="go(2);closeCatDetail()">🎰 Перейти к гаче</button>`;
  }
  body+=`</div>`;
  // Stats
  if(owned){
    body+=`<div class="section-title">Характеристики (T${t})</div>
    <div class="stats-grid">
      <div class="stat-item"><div class="stat-label">Доход</div><div class="stat-value" style="color:var(--gold)">+${catIncome(catId).toFixed(1)}/с 💰</div></div>
      <div class="stat-item"><div class="stat-label">Сила</div><div class="stat-value" style="color:var(--red)">⚔️${catPower(catId)}</div></div>
      <div class="stat-item"><div class="stat-label">Рыба</div><div class="stat-value" style="color:var(--blue)">+${catFishRate(catId).toFixed(2)}/с 🐟</div></div>
      <div class="stat-item"><div class="stat-label">Редкость</div><div class="stat-value"><span class="pill ${def.rarity}">${def.rarity}</span></div></div>
    </div>`;
    // Tier preview
    if(t<5){
      const nextT=t+1;
      const nextInc=def.baseIncome*TIER_INCOME_MULT[nextT];
      const nextPow=Math.floor(def.basePower*TIER_POWER_MULT[nextT]);
      body+=`<div class="card" style="padding:12px;margin-bottom:12px">
        <div style="font-size:11px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">T${nextT} preview</div>
        <div style="display:flex;gap:12px">
          <div><div style="font-size:9px;color:var(--txt3)">Доход</div><div style="font-size:14px;font-weight:900;color:var(--gold)">+${nextInc.toFixed(1)}/с</div></div>
          <div><div style="font-size:9px;color:var(--txt3)">Сила</div><div style="font-size:14px;font-weight:900;color:var(--red)">⚔️${nextPow}</div></div>
        </div>
      </div>`;
    }
    // Place in cage button
    const inCage=S.cages.some(c=>c.cats.includes(catId));
    if(!inCage){
      body+=`<button class="btn teal" onclick="closeCatDetail();openCageModal(0)" style="margin-bottom:8px">🏠 Поместить в клетку</button>`;
    } else {
      body+=`<div style="background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);border-radius:12px;padding:10px 14px;text-align:center;font-size:13px;font-weight:700;color:var(--teal);margin-bottom:8px">✅ Уже в клетке</div>`;
    }
  }
  document.getElementById('cd-body').innerHTML=body;
}

function confirmRaid(catId){
  const raid=RAIDS.find(r=>r.id===selRaidId);if(!raid)return;
  const now=Date.now();
  S.raids.push({uid:now+Math.random(),raidId:selRaidId,catId,startTime:now,endTime:now+raid.dur*1000,done:false,claimed:false});
  progressQuest('d_raid',0);// track on claim
  HN('success');toast(`${CAT_BY_ID[catId].emoji} → ${raid.name}!`);
  closeRaidM();save();renderBattle();
}
function checkRaids(){
  const now=Date.now();let changed=false;
  S.raids.forEach(r=>{if(!r.done&&now>=r.endTime){r.done=true;changed=true;}});
  const done=S.raids.filter(r=>r.done&&!r.claimed);
  document.getElementById('raid-dot').classList.toggle('show',done.length>0);
  if(changed){save();if(cur===3)renderBattle();}
}
function claimRaid(uid){
  const r=S.raids.find(x=>x.uid==uid);if(!r||!r.done||r.claimed)return;
  const d=RAIDS.find(x=>x.id===r.raidId);if(!d)return;
  const fish=Math.floor(d.fishR[0]+Math.random()*(d.fishR[1]-d.fishR[0]));
  const coins=Math.floor(d.coinsR[0]+Math.random()*(d.coinsR[1]-d.coinsR[0]));
  S.fish=(S.fish||0)+fish;S.coins+=coins;
  r.claimed=true;
  progressQuest('d_raid',1);
  HN('success');toast(`🎉 +${fish}🐟 +${fmtN(coins)}💰`);
  save();updHdr();renderBattle();
}

function simBattle(p1,u1,p2,u2){
  let h1=p1*3+50,h2=p2*3+50;const log=[];let r=0;
  while(h1>0&&h2>0&&r<30){r++;const d1=Math.floor(p1*(.6+Math.random()*.8)),d2=Math.floor(p2*(.6+Math.random()*.8));h2-=d1;h1-=d2;if(r<=5)log.push({round:r,atk1:d1,atk2:d2,hp1:Math.max(0,h1),hp2:Math.max(0,h2)});}
  return{winner:h1>0?u1:u2,log,hp1Final:Math.max(0,h1),hp2Final:Math.max(0,h2),rounds:r};
}

      <div class="scard"><span class="sval">T${p.maxLevel||p.level||1}</span><div class="slbl">Макс тир</div></div>
      <div class="scard"><span class="sval"><span class="pill ${p.topRarity||'Common'}" style="font-size:9px">${p.topRarity||'Common'}</span></span><div class="slbl">Редкость</div></div>
      <div class="scard"><span class="sval">⚔️${p.maxPower||0}</span><div class="slbl">Сила</div></div>
    </div>`;
  document.getElementById('player-modal').style.display='flex';
}
function closePlayerModal(){document.getElementById('player-modal').style.display='none';}

/* ── QUESTS SCREEN ── */
function renderQuests(){
  const daily=QUEST_TEMPLATES.filter(q=>q.type==='daily');
  const story=QUEST_TEMPLATES.filter(q=>q.type==='story');
  let h=`<div style="background:linear-gradient(135deg,rgba(168,85,247,.12),rgba(96,165,250,.07));border:1px solid rgba(168,85,247,.2);border-radius:20px;padding:16px;margin-bottom:16px">
    <div style="font-size:14px;font-weight:900">📋 Задания</div>
    <div style="font-size:11px;color:var(--txt2);margin-top:4px">Выполняй задания → получай 🔮 призмы → крути гачу</div>
    <div style="margin-top:10px;background:rgba(168,85,247,.15);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px">
      <span style="font-size:20px">🔮</span>
      <div>
        <div style="font-size:16px;font-weight:900;color:var(--purple)">${S.prism} призм</div>
        <div style="font-size:10px;color:var(--txt2)">1 прокрутка = 1 призма · 10 прокруток = 9 призм</div>
      </div>
    </div>
  </div>`;
  // Daily
  h+=`<div class="section-title">Ежедневные заданиия <span style="color:var(--txt3);font-size:10px">— обновляются каждый день</span></div>`;
  daily.forEach(qt=>{
    const qs=S.quests[qt.id]||{progress:0,claimed:false};
    const prog=qs.progress||0;const done=prog>=qt.target;const claimed=qs.claimed;
    const pct=Math.min(100,Math.round(prog/qt.target*100));
    h+=`<div class="quest-card ${claimed?'quest-done':''}">
      <div class="quest-top">
        <div class="quest-ico">${qt.emoji}</div>
        <div class="quest-body">
          <div class="quest-name">${qt.name}</div>
          <div class="quest-desc">${qt.desc}</div>
        </div>
      </div>
      ${!claimed?`<div class="quest-prog-bar"><div class="quest-prog-fill" style="width:${pct}%"></div></div>`:'' }
      <div class="quest-footer">
        <div class="quest-reward">🔮${qt.reward.prism||0} призм${qt.reward.coins?` · 💰${fmtN(qt.reward.coins)}`:''}${!claimed?` · ${prog}/${qt.target}`:''}</div>
        ${claimed?`<span class="quest-claimed">✅ Получено</span>`:
        done?`<button class="quest-btn" onclick="claimQuest('${qt.id}')">Забрать!</button>`:
        `<span style="font-size:10px;color:var(--txt3);font-weight:700">${prog}/${qt.target}</span>`}
      </div>
    </div>`;
  });
  // Story
  h+=`<div class="section-title">Сюжетные задания <span style="color:var(--txt3);font-size:10px">— выполняются один раз</span></div>`;
  story.forEach(qt=>{
    const qs=S.quests[qt.id]||{progress:0,claimed:false};
    const prog=qs.progress||0;const done=prog>=qt.target;const claimed=qs.claimed;
    const pct=Math.min(100,Math.round(prog/qt.target*100));
    h+=`<div class="quest-card ${claimed?'quest-done':''}">
      <div class="quest-top">
        <div class="quest-ico">${qt.emoji}</div>
        <div class="quest-body">
          <div class="quest-name">${qt.name}</div>
          <div class="quest-desc">${qt.desc}</div>
        </div>
      </div>
      ${!claimed&&qt.target>1?`<div class="quest-prog-bar"><div class="quest-prog-fill" style="width:${pct}%"></div></div>`:'' }
      <div class="quest-footer">
        <div class="quest-reward">🔮${qt.reward.prism||0} призм${qt.reward.coins?` · 💰${fmtN(qt.reward.coins)}`:''}${!claimed&&qt.target>1?` · ${prog}/${qt.target}`:''}</div>
        ${claimed?`<span class="quest-claimed">✅ Получено</span>`:
        done?`<button class="quest-btn" onclick="claimQuest('${qt.id}')">Забрать!</button>`:
        `<span style="font-size:10px;color:var(--txt3);font-weight:700">${prog}/${qt.target}</span>`}
      </div>
    </div>`;
  });
  document.getElementById('s4').innerHTML=h;
}

/* ── PROFILE ── */
const AVATARS=['😺','😸','😼','🙀','😿','🦁','🐯','🐆','🦝','🐈‍⬛','🦊','🐉','🦄','👾','🌙','☀️','💀','🌌','🔥','❄️','⚡','🐱','🐻','🐼','🦋','🌟','💎','🎭'];
function openProfile(){
  H('light');
  const av=S.profile?.avatar||'😺';
  const nick=S.profile?.nick||MY_NAME;
  document.getElementById('prof-av').textContent=av;
  document.getElementById('prof-name-disp').textContent=nick;
  document.getElementById('prof-uid-disp').textContent='ID: '+MY_UID.slice(0,14)+'...';
  document.getElementById('nick-input').value=nick;
  document.getElementById('prof-wins').textContent=S.pvpWins||0;
  document.getElementById('prof-score').textContent=S.pvpScore||0;
  document.getElementById('prof-cats').textContent=Object.keys(S.owned).length;
  const ag=document.getElementById('avatar-grid');
  ag.innerHTML=AVATARS.map(a=>`<div class="av-opt ${a===av?'sel':''}" onclick="selectAvatar('${a}')">${a}</div>`).join('');
  document.getElementById('avatar-picker').style.display='none';
  document.getElementById('profile-modal').classList.add('open');
}
function closeProfile(){document.getElementById('profile-modal').classList.remove('open');}
function toggleAvatarPicker(){const p=document.getElementById('avatar-picker');p.style.display=p.style.display==='none'?'block':'none';}
function selectAvatar(a){
  H('light');if(!S.profile)S.profile={};S.profile.avatar=a;
  document.getElementById('prof-av').textContent=a;
  document.getElementById('hdr-avatar').textContent=a;
  document.querySelectorAll('.av-opt').forEach(el=>el.classList.toggle('sel',el.textContent===a));
  save();toast('✅ Аватарка сохранена!');
}
function saveNick(){
  const v=document.getElementById('nick-input').value.trim();
  if(!v||v.length<2){toast('Минимум 2 символа!');return;}
  if(!S.profile)S.profile={};S.profile.nick=v;
  document.getElementById('prof-name-disp').textContent=v;
  H('medium');save();syncToServer();toast('✅ Никнейм сохранён!');
}

/* ── NAV ── */

/* ── TOAST ── */
let tT;
function toast(m){const el=document.getElementById('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('show'),2600);}

/* ── SWIPE ── */
let sx=0,sy=0;
document.body.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
document.body.addEventListener('touchend',e=>{
  if(document.getElementById('cat-detail').classList.contains('open'))return;
  const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>54&&Math.abs(dx)>Math.abs(dy)*1.4){if(dx<0&&cur<4)go(cur+1);if(dx>0&&cur>0)go(cur-1);}
},{passive:true});

/* ── START ── */
document.addEventListener('DOMContentLoaded',()=>cloudLoad(d=>boot(d)));
</script>
