<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cat Survival RPG</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  background:#0f131a;
  color:#fff;
  font-family:system-ui,Arial;
}
#map{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
  padding:10px;
}
.tile{
  aspect-ratio:1;
  border-radius:10px;
  background:#1b2230;
  display:flex;
  align-items:center;
  justify-content:center;
}
.tile.hidden{background:#080b10}
.tile.base{background:#2e8b57}
.tile.wood{background:#5c3b1e}
.tile.enemy{background:#4b1e1e}
#ui{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#0b0e14;
  padding:10px;
}
button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:14px;
  background:#4e7cff;
  color:white;
  font-weight:600;
}
.card{
  background:#1b2230;
  border-radius:14px;
  padding:10px;
  margin-top:8px;
}
</style>
</head>

<body>
<div id="map"></div>
<div id="ui"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const MAP_SIZE = 7;
let state = JSON.parse(localStorage.getItem("cat_survival")) || {
  wood: 0,
  map: Array(MAP_SIZE*MAP_SIZE).fill(null).map((_,i)=>({
    id:i,
    revealed: i === Math.floor(MAP_SIZE*MAP_SIZE/2),
    type: i === Math.floor(MAP_SIZE*MAP_SIZE/2) ? "base" : randomTile()
  })),
  cats: [],
  base: { buildings: [] },
  battle: null,
  expedition: null,
  lastTick: Date.now()
};

function save(){
  localStorage.setItem("cat_survival", JSON.stringify(state));
}
function randomTile(){
  const r = Math.random();
  if(r < 0.6) return "wood";
  if(r < 0.85) return "empty";
  return "enemy";
}

function exploreTile(){
  const hidden = state.map.filter(t=>!t.revealed);
  if(!hidden.length) return;
  const t = hidden[Math.floor(Math.random()*hidden.length)];
  t.revealed = true;

  if(t.type === "wood") state.wood += 5;
  if(t.type === "enemy") startBattle();

  save();
  render();
}
function createCat(role){
  return {
    id: crypto.randomUUID(),
    name: ["Мур","Рыжик","Тень","Лапа"][Math.floor(Math.random()*4)],
    role,
    hp:100,
    energy:100,
    status:"idle",
    equipment:{ weapon:null, armor:null, trinket:null }
  };
}

if(state.cats.length === 0){
  state.cats.push(createCat("worker"));
  state.cats.push(createCat("scout"));
  save();
}
const BUILDINGS = {
  lumber:{ name:"Лесопилка", cost:30 }
};

function build(type){
  if(state.wood < BUILDINGS[type].cost) return;
  state.wood -= BUILDINGS[type].cost;
  state.base.buildings.push({ id:crypto.randomUUID(), type, level:1 });
  save(); render();
}
const ITEMS = [
  { name:"Деревянный меч", slot:"weapon", power:3 }
];

function equip(catId,item){
  const cat = state.cats.find(c=>c.id===catId);
  if(!cat) return;
  cat.equipment[item.slot] = item;
  save(); render();
}
function startBattle(){
  if(state.battle) return;
  state.battle = { enemyHp:40 };
}

function battleTick(){
  if(!state.battle) return;
  state.battle.enemyHp -= 10;
  if(state.battle.enemyHp <= 0){
    state.battle = null;
    state.wood += 10;
  }
  save();
}
function startExpedition(){
  if(state.expedition) return;
  state.expedition = { start:Date.now(), duration:30000 };
}

function updateExpedition(){
  if(!state.expedition) return;
  if(Date.now() - state.expedition.start >= state.expedition.duration){
    state.wood += 20;
    state.expedition = null;
    save();
  }
}
setInterval(()=>{
  const now = Date.now();
  const sec = Math.floor((now - state.lastTick)/1000);
  if(sec > 0){
    state.wood += sec;
    battleTick();
    updateExpedition();
    state.lastTick = now;
    save();
    render();
  }
},3000);
function render(){
  const map = document.getElementById("map");
  map.innerHTML = "";
  state.map.forEach(t=>{
    const d = document.createElement("div");
    d.className = "tile " + (t.revealed ? t.type : "hidden");
    d.textContent = t.revealed ? (
      t.type==="base"?"🏕":
      t.type==="wood"?"🪵":
      t.type==="enemy"?"⚠":""
    ):"";
    map.appendChild(d);
  });

  document.getElementById("ui").innerHTML = `
    🪵 ${state.wood}
    <button onclick="exploreTile()">🔍 Исследовать</button>
    <button onclick="build('lumber')">🏗 Лесопилка</button>
    <button onclick="startExpedition()">🧭 Экспедиция</button>
  `;
}
render();
</script>
</body>
</html>
