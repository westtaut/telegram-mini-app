<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gacha Cats</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080812;--bg2:#111120;--bg3:#0d0d1a;--bg4:#161628;
  --txt:#eef0fc;--acc:#6c7fff;--acc2:#5effd4;--acc3:#ff6b9d;
  --rc:#8a8a9e;--rr:#4fc3f7;--re:#d085f5;--rl:#ffcf5c;--rm:#ff6b6b;
  --fish:#38d9f5;--star:#ffcf5c;--gem:#e040fb;--coin:#ffe082;
  --rad:15px;
  --font:'Nunito',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--txt);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}

/* === HEADER === */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:8px 12px 5px;flex-shrink:0;background:linear-gradient(180deg,rgba(8,8,18,1) 0%,rgba(8,8,18,0) 100%);position:relative;z-index:10}
.hdr-left{display:flex;flex-direction:column;gap:1px}
.hdr-title{font-size:17px;font-weight:900;letter-spacing:-.5px;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-online{font-size:10px;font-weight:700;color:var(--acc2);opacity:.6}
.res-block{display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.res-row{display:flex;gap:4px}
.rp{display:flex;align-items:center;gap:3px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.05);border-radius:50px;padding:3px 8px;font-size:11px;font-weight:800}
.rp.coin{color:var(--coin)}.rp.fish{color:var(--fish)}.rp.star{color:var(--star)}.rp.gem{color:var(--gem)}

/* === NAV === */
.nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:rgba(13,13,26,.96);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:stretch;padding:0 2px;padding-bottom:env(safe-area-inset-bottom,0);z-index:50}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:rgba(255,255,255,.3);font-size:8px;font-weight:800;cursor:pointer;border-radius:10px;transition:color .15s;padding:4px 0;position:relative}
.nb .ic{font-size:18px;line-height:1;transition:transform .2s}
.nb.on{color:var(--acc)}.nb.on .ic{transform:scale(1.2)}
.nb-dot{position:absolute;top:5px;right:calc(50% - 14px);width:7px;height:7px;background:var(--acc3);border-radius:50%;border:2px solid var(--bg);display:none}
.nb-dot.show{display:block}

/* === CAROUSEL === */
.car{display:flex;width:700%;height:calc(100dvh - 60px - 56px);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.scr{width:calc(100%/7);overflow-y:auto;overflow-x:hidden;padding:6px 11px 24px;-webkit-overflow-scrolling:touch}

/* === COMMON === */
.st{font-size:9px;font-weight:900;letter-spacing:1px;text-transform:uppercase;opacity:.25;margin:13px 0 6px;display:flex;align-items:center;gap:6px}
.st:first-child{margin-top:0}
.st::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.06)}
.card{background:var(--bg2);border-radius:var(--rad);padding:12px 13px;margin-bottom:8px;border:1px solid rgba(255,255,255,.04)}
.btn{width:100%;padding:11px;border:none;border-radius:var(--rad);font-size:13px;font-weight:800;color:#fff;cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--acc2));transition:transform .1s,opacity .1s;display:flex;align-items:center;justify-content:center;gap:5px;margin-top:5px;font-family:var(--font)}
.btn:active{transform:scale(.97);opacity:.85}
.btn.sec{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7)}
.btn.red{background:rgba(255,80,80,.12);color:#ff8888}
.btn.gold{background:linear-gradient(135deg,#bf360c,#ffcf5c);color:#1a0800}
.btn.fish-btn{background:linear-gradient(135deg,#006994,var(--fish))}
.btn.gear-btn{background:linear-gradient(135deg,#4a0080,var(--re))}
.btn.raid-btn{background:linear-gradient(135deg,#7f0000,#ff5722)}
.btn.pvp-btn{background:linear-gradient(135deg,#1a237e,var(--acc3))}
.btn:disabled{opacity:.3;cursor:default;transform:none!important}
.empty{text-align:center;padding:22px 12px;opacity:.28;font-size:13px;line-height:2}
.empty-ic{font-size:32px;display:block;margin-bottom:6px}

/* === RARITY === */
.rb{display:inline-flex;align-items:center;font-size:8px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:50px}
.rb.Common{background:rgba(138,138,158,.15);color:var(--rc)}
.rb.Rare{background:linear-gradient(90deg,#01579b55,#29b6f622);color:var(--rr);border:1px solid #29b6f633}
.rb.Epic{background:linear-gradient(90deg,#6a1b9a44,#d085f522);color:var(--re);border:1px solid #d085f533}
.rb.Legendary{background:linear-gradient(90deg,#bf360c44,#ffcf5c22);color:var(--rl);border:1px solid #ffcf5c44}
.rb.Mythic{background:linear-gradient(90deg,#ff6b6b55,#ff6b9d44);color:var(--rm);border:1px solid #ff6b9d55}

/* === CAGE === */
.cc{position:relative;padding-top:15px;overflow:hidden}
.cstr{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--rad) var(--rad) 0 0}
.cc.Common .cstr{background:var(--rc)}.cc.Rare .cstr{background:linear-gradient(90deg,var(--rr),#0288d1)}
.cc.Epic .cstr{background:linear-gradient(90deg,var(--re),#7b1fa2)}.cc.Legendary .cstr{background:linear-gradient(90deg,var(--rl),#bf360c)}
.cc.Mythic .cstr{background:linear-gradient(90deg,var(--rm),var(--acc3))}
.cc.Rare{box-shadow:0 0 0 1px rgba(79,195,247,.1)}.cc.Epic{box-shadow:0 0 0 1px rgba(208,133,245,.1)}
.cc.Legendary{box-shadow:0 0 0 1px rgba(255,207,92,.15)}.cc.Mythic{box-shadow:0 0 0 1px rgba(255,107,157,.2)}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.chl{display:flex;align-items:center;gap:8px}
.sbar{display:flex;gap:3px;margin:5px 0 8px}
.sl{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.06)}
.sl.f.Common{background:var(--rc)}.sl.f.Rare{background:var(--rr)}.sl.f.Epic{background:var(--re)}
.sl.f.Legendary{background:var(--rl)}.sl.f.Mythic{background:var(--rm)}
.crow{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:opacity .1s}
.crow:last-child{border-bottom:none}.crow:active{opacity:.65}
.crow-em{font-size:20px;width:26px;text-align:center;flex-shrink:0}
.crow-info{flex:1;min-width:0}
.crow-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crow-sub{font-size:10px;opacity:.35;margin-top:1px}
.crow-lv{font-size:10px;font-weight:800;background:rgba(108,127,255,.2);color:var(--acc);padding:2px 6px;border-radius:5px;flex-shrink:0}
.crow-btn{background:rgba(255,255,255,.05);border:none;color:rgba(255,255,255,.4);width:26px;height:26px;border-radius:7px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;font-family:var(--font)}
.cage-foot{display:flex;justify-content:space-between;align-items:center;margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,255,255,.04)}
.incb{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,rgba(108,127,255,.08),rgba(94,255,212,.05));border:1px solid rgba(108,127,255,.12);border-radius:var(--rad);padding:10px 13px;margin-bottom:9px}

/* === PET PAGE === */
#pet-page{display:none;position:fixed;inset:0;z-index:200;background:var(--bg);overflow-y:auto}
#pet-page.open{display:block;animation:ppIn .22s ease}
@keyframes ppIn{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
.pp-hdr{display:flex;align-items:center;gap:9px;padding:12px 12px 5px;position:sticky;top:0;background:rgba(8,8,18,.9);backdrop-filter:blur(10px);z-index:5}
.pp-back{background:rgba(255,255,255,.07);border:none;color:#fff;width:34px;height:34px;border-radius:10px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;font-family:var(--font)}
.pp-ttl{font-size:15px;font-weight:800;flex:1}
.pp-fav{background:none;border:none;font-size:20px;cursor:pointer;padding:0;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:9px}
.pp-body{padding:8px 12px 90px}
.pet-hero{background:var(--bg2);border-radius:20px;padding:16px;text-align:center;margin-bottom:8px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.05)}
.pet-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,var(--glow,rgba(108,127,255,.12)),transparent 65%);pointer-events:none}
.pet-hero-em{font-size:64px;display:block;margin-bottom:6px;line-height:1}
.pet-hero-name{font-size:18px;font-weight:900;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.edit-ico{font-size:13px;opacity:.3}
.pet-lv-row{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:6px}
.pet-lv-badge{background:var(--acc);color:#fff;font-size:10px;font-weight:900;padding:2px 10px;border-radius:50px}
.xp-bar{flex:1;max-width:120px;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:2px;transition:width .4s}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px}
.sb{background:var(--bg2);border-radius:12px;padding:9px 6px;text-align:center;border:1px solid rgba(255,255,255,.04)}
.sb .sv{font-size:14px;font-weight:900;display:block}.sb .sl2{font-size:9px;opacity:.35;margin-top:2px}
.eq-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px}
.eq-slot{background:var(--bg2);border-radius:12px;padding:9px 5px;text-align:center;cursor:pointer;border:1.5px dashed rgba(255,255,255,.08);transition:all .12s;position:relative}
.eq-slot.filled{border-style:solid;border-color:rgba(255,255,255,.15)}
.eq-slot:active{background:rgba(255,255,255,.06)}
.eq-em{font-size:22px;display:block;margin-bottom:3px}
.eq-name{font-size:9px;opacity:.4;line-height:1.3}
.eq-bonus{font-size:9px;color:var(--acc2);font-weight:800;margin-top:2px}
.eq-rm{position:absolute;top:3px;right:3px;background:rgba(255,80,80,.2);border:none;color:#ff8888;width:16px;height:16px;border-radius:4px;font-size:9px;cursor:pointer;display:none;align-items:center;justify-content:center;padding:0;font-family:var(--font)}
.eq-slot.filled .eq-rm{display:flex}
.lvc{background:var(--bg2);border-radius:var(--rad);padding:12px 13px;margin-bottom:8px;border:1px solid rgba(255,255,255,.04)}
.res-cost-grid{display:flex;gap:7px;margin:9px 0}
.rci{flex:1;background:rgba(255,255,255,.04);border-radius:10px;padding:7px;text-align:center}
.rci .rv{font-size:14px;font-weight:900;display:block}
.rci .rl2{font-size:9px;opacity:.38;margin-top:1px}
.rci.ok .rv{color:var(--acc2)}.rci.nok .rv{color:#ff7070}
.xp-track{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin:5px 0}
.xp-t-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:3px;transition:width .35s}

/* === SKILLS === */
.skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.skill-card{background:var(--bg2);border-radius:12px;padding:10px;border:1px solid rgba(255,255,255,.04);position:relative;overflow:hidden}
.skill-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--sc,rgba(255,255,255,.1))}
.skill-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.skill-ico{font-size:18px}
.skill-lv{font-size:10px;font-weight:900;color:var(--acc);background:rgba(108,127,255,.15);padding:1px 7px;border-radius:50px}
.skill-name{font-size:12px;font-weight:800;margin-bottom:2px}
.skill-desc{font-size:10px;opacity:.38;line-height:1.4}
.skill-effect{font-size:10px;color:var(--acc2);font-weight:700;margin-top:4px}
.skill-btn{width:100%;padding:6px;border:none;border-radius:8px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);font-size:10px;font-weight:800;cursor:pointer;margin-top:6px;font-family:var(--font);transition:all .1s}
.skill-btn:active{transform:scale(.96)}
.skill-btn.can{background:linear-gradient(135deg,rgba(108,127,255,.3),rgba(94,255,212,.2));color:#fff}
.skill-btn:disabled{opacity:.25;cursor:default;transform:none}

/* === GACHA === */
.gacha-hero{background:var(--bg2);border-radius:20px;padding:18px 13px;text-align:center;margin-bottom:8px;border:1px solid rgba(255,255,255,.05);position:relative;overflow:hidden}
.gacha-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% -20%,rgba(108,127,255,.1),transparent 60%)}
.gacha-ico{font-size:48px;display:block;margin-bottom:10px;animation:gwob 4s ease-in-out infinite}
@keyframes gwob{0%,100%{transform:rotate(0) scale(1)}25%{transform:rotate(-5deg) scale(1.05)}75%{transform:rotate(5deg) scale(1.05)}}
.gtabs{display:flex;gap:5px;margin-bottom:10px}
.gtab{flex:1;padding:8px 5px;border:none;border-radius:11px;font-size:11px;font-weight:800;cursor:pointer;background:rgba(255,255,255,.05);color:rgba(255,255,255,.45);transition:all .15s;font-family:var(--font)}
.gtab.on{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}
.ginfo{background:rgba(255,255,255,.03);border-radius:11px;padding:9px;margin-bottom:9px}
.grates{display:flex;flex-wrap:wrap;justify-content:center;gap:4px;margin-bottom:5px}
.grates span{font-size:9px;font-weight:800;padding:2px 8px;border-radius:50px;background:rgba(255,255,255,.05)}
.pull-multi{display:flex;gap:5px;margin-top:5px}
.cli{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--bg2);border-radius:12px;margin-bottom:5px;border-left:3px solid var(--c,#555);border:1px solid rgba(255,255,255,.04);border-left:3px solid var(--c,#444)}

/* === RAIDS === */
.raid-hero{background:linear-gradient(160deg,rgba(127,0,0,.3),rgba(30,10,0,.5));border-radius:20px;padding:14px;margin-bottom:8px;border:1px solid rgba(255,87,34,.15)}
.raid-zones{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.rzone{background:var(--bg2);border-radius:14px;padding:10px;border:1px solid rgba(255,255,255,.05);position:relative;overflow:hidden;cursor:pointer;transition:all .15s}
.rzone::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,var(--zc,rgba(255,255,255,.05)),transparent 60%);pointer-events:none}
.rzone:active{transform:scale(.97)}
.rzone.locked{opacity:.4;cursor:not-allowed}
.rzone-ico{font-size:28px;display:block;margin-bottom:5px}
.rzone-name{font-size:12px;font-weight:800;margin-bottom:2px}
.rzone-meta{font-size:9px;opacity:.4}
.rzone-reward{font-size:9px;color:var(--acc2);margin-top:3px;font-weight:700}
.rzone-btn{font-size:9px;font-weight:800;padding:3px 10px;border:none;border-radius:50px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);cursor:pointer;margin-top:6px;font-family:var(--font)}
.rzone-btn.active-raid{background:rgba(255,150,50,.2);color:#ff9800}
.active-raid-card{background:rgba(255,150,50,.06);border:1px solid rgba(255,150,50,.2);border-radius:13px;padding:10px;margin-bottom:7px}
.raid-prog{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:7px;overflow:hidden}
.raid-prog-fill{height:100%;background:linear-gradient(90deg,#ff6f00,var(--rl));border-radius:2px;transition:width 2s linear}

/* === PvP === */
.pvp-arena{background:linear-gradient(160deg,rgba(10,10,60,.6),rgba(50,0,30,.4));border-radius:20px;padding:14px;margin-bottom:8px;border:1px solid rgba(108,127,255,.15)}
.pvp-status{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border-radius:11px;padding:9px 11px;margin-bottom:8px}
.pvp-dot{width:8px;height:8px;border-radius:50%;background:#4caf50;animation:pulse 1.5s ease-in-out infinite;flex-shrink:0}
.pvp-dot.searching{background:#ff9800}
.pvp-dot.idle{background:rgba(255,255,255,.2);animation:none}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.7}}
.pvp-queue-anim{text-align:center;padding:20px;font-size:13px;opacity:.5}
.pvp-queue-dots{display:inline-flex;gap:5px;margin-top:8px}
.pvp-queue-dots span{width:6px;height:6px;border-radius:50%;background:var(--acc);animation:qd 1.2s ease-in-out infinite}
.pvp-queue-dots span:nth-child(2){animation-delay:.2s}
.pvp-queue-dots span:nth-child(3){animation-delay:.4s}
@keyframes qd{0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(-5px);opacity:1}}
.pvp-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:9px}
.pvp-stat{background:rgba(255,255,255,.04);border-radius:10px;padding:8px;text-align:center}
.pvp-stat .v{font-size:15px;font-weight:900;display:block}
.pvp-stat .l{font-size:9px;opacity:.35;margin-top:1px}

/* === LEADERBOARD === */
.lb-header{background:linear-gradient(160deg,rgba(30,20,0,.8),rgba(60,40,0,.4));border-radius:20px;padding:14px;margin-bottom:8px;text-align:center;border:1px solid rgba(255,207,92,.15)}
.lb-row{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--bg2);border-radius:12px;margin-bottom:5px;border-left:3px solid var(--lc,#444);border:1px solid rgba(255,255,255,.04);border-left:3px solid var(--lc,#444)}
.lb-row.you{background:rgba(108,127,255,.06);border-color:rgba(108,127,255,.2)!important}
.lb-rank{font-size:14px;font-weight:900;width:26px;text-align:center;flex-shrink:0}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-sub{font-size:10px;opacity:.35;margin-top:1px}
.lb-score{font-size:14px;font-weight:900;color:var(--rl);flex-shrink:0}
.lb-loading{text-align:center;padding:20px;opacity:.4;font-size:13px}

/* === INVENTORY === */
.ii{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--bg2);border-radius:var(--rad);margin-bottom:6px;border-left:3px solid var(--c,#444);border:1px solid rgba(255,255,255,.04);border-left:3px solid var(--c,#444);cursor:pointer;transition:opacity .1s}
.ii:active{opacity:.7}
.ii-em{font-size:25px;width:35px;text-align:center;flex-shrink:0}
.ii-info{flex:1;min-width:0}
.ii-name{font-weight:800;font-size:13px}
.ii-sub{display:flex;align-items:center;gap:4px;margin-top:3px;flex-wrap:wrap}
.iac{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.ipb{background:linear-gradient(135deg,rgba(108,127,255,.3),rgba(94,255,212,.2));border:none;color:#fff;padding:5px 8px;border-radius:8px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap;margin:0;font-family:var(--font);transition:transform .1s}
.ipb:active{transform:scale(.93)}
.isb{background:rgba(255,100,100,.1);border:none;color:#ff8888;padding:5px 8px;border-radius:8px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap;margin:0;font-family:var(--font);transition:transform .1s}
.isb:active{transform:scale(.93)}

/* === SHOP === */
.ss{display:flex;gap:5px;margin:7px 0}
.sv2{flex:1;background:rgba(255,255,255,.04);border-radius:9px;padding:6px;text-align:center}
.sv2 .v{font-size:13px;font-weight:900;display:block}.sv2 .l{font-size:9px;opacity:.38;margin-top:1px}
.obadge{background:rgba(76,175,80,.2);color:#69f0ae;font-size:9px;font-weight:800;padding:2px 8px;border-radius:50px}

/* === MODALS === */

  return {
    fish: Math.floor((LV_FISH[pet.rarity]||6) * Math.pow(1.5, lv-1)),

}

}

function ensure() {
  if (!S.cages.length) S.cages.push({...CAGES[0], cats: []});
  if (!S.inventory.length) S.inventory.push(makePet(CATS[0]));
  if (!S.gearInv) S.gearInv = [];
  if (S.fish == null) S.fish = 0;
  if (S.stars == null) S.stars = 0;
  if (S.gems == null) S.gems = 0;
  if (!S.raids) S.raids = [];
  if (S.pvpWins == null) { S.pvpWins = 0; S.pvpLosses = 0; S.pvpScore = 0; }
}

function makePet(tpl) {
  return {
    uid: Date.now() + Math.random(),
    baseName: tpl.name, customName: null,
    emoji: tpl.emoji, rarity: tpl.rarity,
    baseIncome: tpl.income, fishRate: tpl.fishRate || 0.15,
    sell: tpl.sell || 10, level: 1, xp: 0,
    gear: {collar:null,hat:null,toy:null,armor:null,wing:null,amulet:null},
    skills: {},
    favorite: false, power: tpl.power || 10, inRaid: false,
  };
}
function petName(p) { return p.customName || p.baseName; }

function petSkillMult(p, key) {
  let lv = 0;
  for (const sk of SKILLS) {
    if (sk.applyKey === key) lv = p.skills?.[sk.id] || 0;
  }
  if (!lv) return 1;
  if (key === 'incomeBonus') return 1 + lv * 0.05;
  if (key === 'fishBonus')   return 1 + lv * 0.05;
  if (key === 'powerBonus')  return 1 + lv * 0.08;
  if (key === 'xpBonus')     return 1 + lv * 0.10;
  return 1;
}

function petPower(p) {
  let gp = 0;
  Object.values(p.gear || {}).forEach(gid => { if(gid){const g=GEAR.find(x=>x.id===gid);if(g)gp+=g.power||0;} });
  const lv = p.level || 1;
  const lvM = 1 + (lv-1) * 0.15;
  const skillM = petSkillMult(p, 'powerBonus');
  return Math.floor((p.power || 10) * lvM * skillM + gp);
}

function petIncome(p, cageBonus = 1) {
  const lv = p.level || 1;
  const lvM = 1 + (lv-1) * 0.18;
  let gb = 0;
  Object.values(p.gear || {}).forEach(gid => { if(gid){const g=GEAR.find(x=>x.id===gid);if(g)gb+=g.bonus||0;} });
  const skillM = petSkillMult(p, 'incomeBonus');
  return p.baseIncome * lvM * (1 + gb) * cageBonus * skillM;
}

function petFish(p, cageBonus = 1) {
  const lv = p.level || 1;
  const lvM = 1 + (lv-1) * 0.12;
  const skillM = petSkillMult(p, 'fishBonus');
  return (p.fishRate || 0.15) * lvM * cageBonus * skillM;
}

function migPet(p) {
  if (p.uid && p.gear) {
    if (!p.gear.armor) p.gear = {...p.gear, armor:null, wing:null, amulet:null};
    if (!p.skills) p.skills = {};
    return p;
  }
  const t = CATS.find(c => c.name === (p.baseName || p.name)) || CATS[0];
  return { ...makePet(t), ...p, uid: p.uid || (Date.now() + Math.random()), gear: p.gear || {collar:null,hat:null,toy:null,armor:null,wing:null,amulet:null}, skills: p.skills || {} };
}

const fmt = n => { n = Math.floor(n); if(n>=1e6)return(n/1e6).toFixed(1)+"M"; if(n>=1e4)return(n/1e3).toFixed(1)+"K"; return n.toLocaleString(); };
const fmtTime = s => { if(s<60)return s+"с"; if(s<3600)return Math.floor(s/60)+"м"; return Math.floor(s/3600)+"ч " + Math.floor((s%3600)/60)+"м"; };
const fmtLeft = ms => fmtTime(Math.max(0, Math.floor(ms/1000)));

function tick() {
  const now = Date.now();
  const dt = Math.min((now - (S.lastTick||now)) / 1000, 7200);
  S.lastTick = now;
  S.coins += totalCoins() * dt;
  S.fish  += totalFish()  * dt;
}
function totalCoins() { let t=0; S.cages.forEach(c => c.cats.forEach(p => t += petIncome(p, c.bonus||1))); return t; }
function totalFish()  { let t=0; S.cages.forEach(c => c.cats.forEach(p => t += petFish(p, c.bonus||1)));  return t; }

function closeRaidM() { H('soft'); document.getElementById("raid-m").classList.remove("open"); }
function confirmRaid() {
  if (!selectedRaidId || !selectedRaidPetUid) return;
  const raid = RAIDS.find(r => r.id === selectedRaidId); if (!raid) return;
  let pet = S.inventory.find(p => p.uid === selectedRaidPetUid) || null;
  if (!pet) { for (const c of S.cages) { const xi = c.cats.findIndex(p => p.uid === selectedRaidPetUid); if (xi !== -1) { pet = c.cats[xi]; break; } } }
  if (!pet) return;
  pet.inRaid = true;
  const now = Date.now();
  S.raids.push({ uid: now + Math.random(), raidId: selectedRaidId, petUid: selectedRaidPetUid, petEmoji: pet.emoji, petName: petName(pet), startTime: now, endTime: now + raid.dur * 1000, done: false, claimed: false });
  HN('success'); toast(`${pet.emoji} отправлен в ${raid.name}!`);
  closeRaidM(); save(); renderRaids();
}
function claimRaid(raidUid) {
  const r = S.raids.find(x => x.uid === raidUid); if (!r || !r.done || r.claimed) return;
  const d = RAIDS.find(x => x.id === r.raidId); if (!d) return;
  const luckLv = getPetLuckLv(r.petUid);
  const luckMult = (luckLv > 0 && Math.random() < luckLv * 0.04) ? 2 : 1;
  const fish = Math.floor((d.fishR[0] + Math.random() * (d.fishR[1]-d.fishR[0])) * luckMult);
  const coins = Math.floor((d.coinsR[0] + Math.random() * (d.coinsR[1]-d.coinsR[0])) * luckMult);
  const gems = d.gem * (luckMult > 1 ? 2 : 1);
  S.fish += fish; S.coins += coins; S.gems += gems;
  let pet = findPet(r.petUid);
  if (pet) {
    pet.inRaid = false;
    const xpM = petSkillMult(pet, 'xpBonus');
    pet.xp = (pet.xp || 0) + Math.floor(d.xp * xpM);
    autoLevelUp(pet);
  }
  r.claimed = true;
  HN('success');
  toast(`🎉 +${fish}🐟 +${fmt(coins)}💰${gems ? ` +${gems}💎` : ''}${luckMult > 1 ? ' ✨УДАЧА x2!' : ''}`);
  save(); updHdr(); renderRaids();
}
function getPetLuckLv(uid) {
  const p = findPet(uid); if (!p) return 0;
  return p.skills?.['s_luck'] || 0;
}
function findPet(uid) {
  return S.inventory.find(p => p.uid === uid) || S.cages.flatMap(c => c.cats).find(p => p.uid === uid) || null;
}
function autoLevelUp(pet) {
  const lv = pet.level || 1; if (lv >= MAX_LEVEL) return;
  const xpNeed = lv * 80;
  if ((pet.xp || 0) >= xpNeed) {
    pet.level = lv + 1;
    toast(`🎉 ${petName(pet)} → Ур.${pet.level}!`);
  }
}

function offlinePvP(myPet) {
  const BOTS = [
    {name:"КотоБот 🤖",emoji:"🤖",power:Math.floor(petPower(myPet)*(0.7+Math.random()*0.6))},
    {name:"МегаМурка 😈",emoji:"😈",power:Math.floor(petPower(myPet)*(0.8+Math.random()*0.5))},
    {name:"ЗлойТигр 🐯",emoji:"🐯",power:Math.floor(petPower(myPet)*(0.9+Math.random()*0.4))},
  ];
  const opp = BOTS[Math.floor(Math.random()*BOTS.length)];
  const botUid = 'bot_'+Date.now();
  processBattleResult({
    isBot: true,
    matchId: 'local_'+Date.now(),
    result: simulateBattleLocal(petPower(myPet), MY_UID, opp.power, botUid),
    you: {uid: MY_UID, fighter: {emoji: myPet.emoji, name: petName(myPet), power: petPower(myPet)}, name: MY_NAME},
    opponent: {uid: botUid, fighter: opp, name: opp.name},
  });
}

function simulateBattleLocal(pow1, uid1, pow2, uid2) {
  let hp1 = pow1*3+50, hp2 = pow2*3+50;
  const log = []; let round = 0;
  while (hp1 > 0 && hp2 > 0 && round < 30) {
    round++;
    const d1 = Math.floor(pow1*(0.6+Math.random()*.8)); const d2 = Math.floor(pow2*(0.6+Math.random()*.8));
    hp2 -= d1; hp1 -= d2;
    if (round <= 5) log.push({round, atk1:d1, atk2:d2, hp1:Math.max(0,hp1), hp2:Math.max(0,hp2), crit1:false, crit2:false});
  }
  return {winner: hp1 > 0 ? uid1 : uid2, log, hp1Final: Math.max(0,hp1), hp2Final: Math.max(0,hp2), rounds: round};
}

function processBattleResult(data) {
  const {result, you, opponent, isBot} = data;
  const won = result.winner === you.uid;
  const armorLv = (() => { const p = findPet(you.fighter?.uid); return p?.skills?.['s_armor'] || 0; })();

  if (won) {
    const bonus = Math.floor(opponent.fighter?.power * 2 + 10);
    S.coins += bonus; S.pvpWins++; S.pvpScore += isBot ? 8 : (15 + Math.floor(Math.random()*12));
    HN('success');
  } else {

function setGachaMode(m) {
  gachaMode = m;

}
function updateGachaInfo() {
  const box = document.getElementById("ginfo"); if (!box) return;
  if (gachaMode === "cat") {
    box.innerHTML = `<div class="grates"><span style="color:var(--rc)">Common 65%</span><span style="color:var(--rr)">Rare 24%</span><span style="color:var(--re)">Epic 8%</span><span style="color:var(--rl)">Legendary 2.5%</span><span style="color:var(--rm)">Mythic 0.5%</span></div><div style="font-size:10px;opacity:.35">Цена: 50💰 · Mythic = +5⭐</div>`;
  } else {

  }
}

function weightedRoll(wgt) {
  const total = Object.values(wgt).reduce((a,b) => a+b, 0);
  let r = Math.random() * total, cum = 0;
  for (const [k,w] of Object.entries(wgt)) { cum += w; if (r < cum) return k; }
  return Object.keys(wgt)[0];
}

function roll() {
  if (gachaMode === "gear") { rollGear(); return; }
  if (S.coins < 50) { toast("Нужно 50💰"); HN('error'); return; }
  S.coins -= 50; H('medium');
  const rar = weightedRoll(CAT_WGT);
  const pool = CATS.filter(c => c.rarity === rar);
  const pet = makePet(pool[Math.floor(Math.random()*pool.length)]);
  if (rar === "Mythic")     { S.stars += 5; toast("🌟 +5 звёзд за Mythic!"); }
  else if (rar === "Legendary") { S.stars += 3; }
  else if (rar === "Epic" && Math.random() < .4) { S.stars += 1; }
  S.inventory.push(pet); save(); showGov(pet);
}

function rollGear() {
  if (S.fish < 25) { toast("Нужно 25🐟"); HN('error'); return; }
  S.fish -= 25; H('medium');
  const rar = weightedRoll(GEAR_WGT);
  const pool = GEAR.filter(g => g.rarity === rar);
  const item = {...pool[Math.floor(Math.random()*pool.length)], iid: Date.now()+Math.random()};
  if (rar === "Mythic")     S.gems += 2;
  else if (rar === "Legendary") S.gems += 1;
  S.gearInv.push(item); save(); showGovItem(item);
}

  if(S.fish<cost.fish||S.stars<cost.stars){toast("Не хватает ресурсов!");HN('error');return;}

  pet.xp=(pet.xp||0)+lv*80; pet.level=lv+1;
  H('heavy'); HN('success');
  const fl=document.createElement("div"); fl.className="lvl-flash"; fl.textContent="⬆️"; document.body.appendChild(fl); setTimeout(()=>fl.remove(),900);

}

function upgradeSkill(skId) {
  const pet=getPet(); if(!pet)return;
  const sk=SKILLS.find(s=>s.id===skId); if(!sk)return;
  const curLv=pet.skills?.[skId]||0;
  if(curLv>=sk.maxLv){toast("Навык на максимуме!");return;}
  const cost=skillCost(sk,curLv);
  if(S.fish<cost.fish){toast(`Нужно 🐟${cost.fish}`);HN('error');return;}
  if(cost.stars&&S.stars<cost.stars){toast(`Нужно ⭐${cost.stars}`);HN('error');return;}
  S.fish-=cost.fish; if(cost.stars)S.stars-=cost.stars;
  if(!pet.skills)pet.skills={};
  pet.skills[skId]=(pet.skills[skId]||0)+1;
  H('medium'); HN('success');
  toast(`${sk.emoji} ${sk.name} → Ур.${pet.skills[skId]}!`);
  save(); renderPP(pet); updHdr();
}

let placePet=null;
function openPlaceFromPP(){const pet=getPet();if(!pet)return;openPM(pet);}
function openPM(pet){
  H();placePet=pet;document.getElementById("pm-t").textContent=`${pet.emoji} ${petName(pet)}`;document.getElementById("pm-s").textContent=`${pet.rarity} · ⚔️${petPower(pet)}`;
  const list=document.getElementById("pm-l");list.innerHTML="";let any=false;
  S.cages.forEach((cage,ci)=>{
    const ok=cage.allowed.includes(pet.rarity)&&cage.cats.length<cage.slots;if(ok)any=true;
    const el=document.createElement("div");el.className="cop "+(ok?"av":"dim");
    const hint=!cage.allowed.includes(pet.rarity)?"Не принимает эту редкость":cage.cats.length>=cage.slots?"Клетка заполнена":`×${cage.bonus} → +${petIncome(pet,cage.bonus).toFixed(2)}💰/с`;
    el.innerHTML=`<div class="cop-em">${cage.emoji}</div><div class="cop-info"><b>${cage.name}</b><small>${hint}</small></div><div class="cob">${cage.cats.length}/${cage.slots}</div>`;
    if(ok)el.onclick=()=>confirmPM(ci);list.appendChild(el);
  });
  if(!any)list.innerHTML+=`<div class="empty"><span class="empty-ic">🔒</span>Нет подходящей клетки</div>`;
  document.getElementById("pm").classList.add("open");
}
function confirmPM(ci){
  if(!placePet)return;const cage=S.cages[ci];
  const idx=S.inventory.findIndex(p=>p.uid===placePet.uid);if(idx===-1){toast("Кот не найден");return;}
  cage.cats.push({...S.inventory[idx]});S.inventory.splice(idx,1);
  HN('success');toast(`${petName(placePet)} → ${cage.name}!`);save();closePM();if(PPR)closePet();else render();
}
function closePM(){H('soft');document.getElementById("pm").classList.remove("open");placePet=null;}
function removeCat(ci,xi){const cat=S.cages[ci].cats.splice(xi,1)[0];cat.inRaid=false;S.inventory.push({...cat});H('soft');toast(`${petName(cat)} → инвентарь`);save();render();}
function removeCatFromPP(){if(!PPR||PPR.where!=="cage")return;const cat=S.cages[PPR.ci].cats.splice(PPR.xi,1)[0];cat.inRaid=false;S.inventory.push({...cat});H('soft');save();closePet();}
function sellPet(uid){const idx=S.inventory.findIndex(p=>p.uid==uid);if(idx===-1)return;const p=S.inventory.splice(idx,1)[0];S.coins+=p.sell||10;H('medium');toast(`${p.emoji} ${petName(p)} продан за ${p.sell}💰`);save();render();}
function sellFromPP(){if(!PPR||PPR.where!=="inventory")return;const p=S.inventory[PPR.ci];S.coins+=p.sell||10;S.inventory.splice(PPR.ci,1);H('medium');save();closePet();}
function sellGear(iid){const idx=S.gearInv.findIndex(g=>g.iid==iid);if(idx===-1)return;const g=S.gearInv.splice(idx,1)[0];S.coins+=g.sell||5;H('medium');toast(`${g.emoji} ${g.name} продан за ${g.sell}💰`);save();render();}
function buyCage(id){
  const tpl=CAGES.find(c=>c.id===id);if(!tpl)return;
  if(S.coins<tpl.price){toast(`Нужно ${fmt(tpl.price)}💰`);HN('error');return;}
  S.coins-=tpl.price;S.cages.push({...tpl,cats:[]});HN('success');toast(`${tpl.emoji} ${tpl.name} куплена!`);save();render();
}

/* ══════════════════════════════════════

function render() {
  if (!S) return;
  tick(); updHdr();
  renderHome(); renderGacha(); renderRaids(); renderPvP(); renderLB(); renderShop(); renderInventory();
}

function renderHome() {
  const co=totalCoins(), fi=totalFish();
  let h=`<div class="st">Мои клетки</div>`;
  if(co>0||fi>0) h+=`<div class="incb"><div><div style="font-size:10px;opacity:.4">Пассивный доход</div><div style="font-size:15px;font-weight:900;color:var(--acc2);margin-top:2px">+${co.toFixed(2)}💰/с</div></div><div style="text-align:right"><div style="font-size:11px;font-weight:700;color:var(--fish)">🐟+${fi.toFixed(2)}/с</div></div></div>`;
  h += S.cages.map((cage,ci) => {
    const b=cage.bonus||1;
    const sbar=Array.from({length:cage.slots},(_,i)=>{const c=cage.cats[i];return`<div class="sl${c?" f "+c.rarity:""}"></div>`;}).join("");
    const catsH=cage.cats.length?cage.cats.map((p,xi)=>`<div class="crow" onclick="openPet('cage',${ci},${xi})">
      <div class="crow-em">${p.emoji}</div>
      <div class="crow-info"><div class="crow-name">${p.inRaid?'⚔️ ':p.favorite?'❤️ ':''} ${petName(p)}</div>
      <div class="crow-sub">+${petIncome(p,b).toFixed(2)}💰 🐟${petFish(p,b).toFixed(2)}/с · ⚔️${petPower(p)}</div></div>
      <div class="crow-lv">Ур.${p.level||1}</div>
      <button class="crow-btn" onclick="event.stopPropagation();removeCat(${ci},${xi})">↩</button>
    </div>`).join(""):`<div style="text-align:center;padding:10px 0;font-size:12px;opacity:.25">🐾 Пусто</div>`;
    const cInc=cage.cats.reduce((s,p)=>s+petIncome(p,b),0);
    const cFish=cage.cats.reduce((s,p)=>s+petFish(p,b),0);
    return `<div class="card cc ${cage.rarity}">
      <div class="cstr"></div>
      <div class="ch"><div class="chl"><span style="font-size:19px">${cage.emoji}</span>
        <div><div style="font-size:13px;font-weight:800">${cage.name}</div><div style="margin-top:2px"><span class="rb ${cage.rarity}">${RL[cage.rarity]||cage.rarity}</span></div></div>
      </div><div style="font-size:10px;font-weight:800;opacity:.4;background:rgba(255,255,255,.05);padding:3px 8px;border-radius:6px">×${b.toFixed(1)}</div></div>
      <div class="sbar">${sbar}</div>${catsH}
      ${cInc>0?`<div class="cage-foot"><span style="font-size:10px;opacity:.35">Доход</span><span style="font-size:12px;font-weight:800;color:var(--acc2)">+${cInc.toFixed(2)}💰 +${cFish.toFixed(2)}🐟/с</span></div>`:""}
    </div>`;
  }).join("");
  document.getElementById("s0").innerHTML = h;
}

  `;

function renderRaids() {
  const now = Date.now();
  const allPets = [...S.inventory, ...S.cages.flatMap(c=>c.cats)];
  const maxPow = allPets.reduce((m,p)=>Math.max(m,petPower(p)),0);
  const active = S.raids.filter(r=>!r.claimed);
  let h = `<div class="raid-hero"><div style="font-size:15px;font-weight:900">⚔️ Зоны рейдов</div><div style="font-size:11px;opacity:.4;margin-top:3px">Отправляй котов за ресурсами</div><div style="font-size:12px;font-weight:700;color:var(--acc2);margin-top:6px">Твоя макс. сила: ⚔️${maxPow}</div></div>`;

  if (active.length) {
    h += `<div class="st">Активные (${active.length})</div>`;
    active.forEach(r => {
      const d=RAIDS.find(x=>x.id===r.raidId)||{}; const left=r.endTime-now; const total=r.endTime-r.startTime;
      const pct=Math.min(100,Math.max(0,Math.round((1-left/total)*100)));
      h += `<div class="active-raid-card">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div><div style="font-size:13px;font-weight:800">${d.emoji||"⚔️"} ${d.name||r.raidId}</div>
          <div style="font-size:10px;opacity:.38;margin-top:2px">${r.petEmoji} ${r.petName}</div></div>
          ${r.done?`<button class="btn" style="width:auto;padding:5px 13px;font-size:12px;margin:0" onclick="claimRaid(${r.uid})">Забрать!</button>`:`<div style="font-size:12px;font-weight:800;color:#ff9800">${fmtLeft(left)}</div>`}
        </div>
        <div class="raid-prog"><div class="raid-prog-fill" style="width:${pct}%"></div></div>
        ${r.done?`<div style="font-size:10px;color:var(--acc2);margin-top:5px">✅ Рейд завершён!</div>`:''}
      </div>`;
    });
  }

  h += `<div class="st">Зоны</div><div class="raid-zones">`;
  RAIDS.forEach(raid => {
    const locked = maxPow < raid.minPow;
    const inProg = S.raids.some(r=>r.raidId===raid.id&&!r.claimed&&!r.done);
    h += `<div class="rzone ${locked?'locked':''}" style="--zc:${raid.zc}" onclick="${locked?'':'openRaidModal(\''+raid.id+'\')'}">
      <span class="rzone-ico">${raid.emoji}</span>
      <div class="rzone-name">${raid.name}</div>
      <div class="rzone-meta">⚔️${raid.minPow} · ⏱${fmtTime(raid.dur)}</div>
      <div class="rzone-reward">🐟${raid.fishR[0]}-${raid.fishR[1]}${raid.gem?` · 💎${raid.gem}`:''}</div>
      <button class="rzone-btn ${inProg?'active-raid':''}" onclick="event.stopPropagation();${locked?'':inProg?'':'openRaidModal(\''+raid.id+'\')'}">${locked?'🔒 Нужно '+raid.minPow:inProg?'⏳ В процессе':'⚔️ Начать'}</button>
    </div>`;
  });
  h += `</div>`;
  document.getElementById("s2").innerHTML = h;
}

function renderPvP() {
  const allPets = [...S.inventory, ...S.cages.flatMap(c=>c.cats)].filter(p=>!p.inRaid);
  const best = allPets.sort((a,b)=>petPower(b)-petPower(a))[0];
  let h = `<div class="pvp-arena"><div style="font-size:15px;font-weight:900;margin-bottom:3px">🥊 PvP Арена</div>
    <div class="pvp-status"><div class="pvp-dot ${pvpQueueStatus}"></div>
      <div><div style="font-size:12px;font-weight:700">${pvpQueueStatus==='searching'?'Поиск соперника...':pvpQueueStatus==='idle'?'Готово к бою':'Матч найден'}</div>
      <div style="font-size:10px;opacity:.38">${serverOnline?'🟢 Реальные игроки':'⚪ Только боты'}</div></div>
    </div>`;

  if (pvpQueueStatus === 'searching') {
    h += `<div class="pvp-queue-anim">Ищем соперника<div class="pvp-queue-dots"><span></span><span></span><span></span></div></div>
    <button class="btn red" onclick="leavePvPQueue()">Отменить поиск</button>`;
  } else {
    h += `<div class="pvp-stats">
      <div class="pvp-stat"><span class="v" style="color:var(--acc2)">${S.pvpWins}</span><span class="l">Победы</span></div>
      <div class="pvp-stat"><span class="v" style="color:#ff7070">${S.pvpLosses}</span><span class="l">Поражения</span></div>
      <div class="pvp-stat"><span class="v" style="color:var(--rl)">${S.pvpScore}</span><span class="l">Рейтинг</span></div>
    </div>
    ${best?`<div style="background:rgba(255,255,255,.04);border-radius:11px;padding:9px 11px;margin-bottom:8px;display:flex;align-items:center;gap:8px">
      <span style="font-size:24px">${best.emoji}</span>
      <div style="flex:1"><div style="font-size:13px;font-weight:700">${petName(best)}</div>
      <div style="font-size:10px;opacity:.38">⚔️${petPower(best)} · Ур.${best.level||1}</div></div>
      <span class="rb ${best.rarity}">${best.rarity}</span>
    </div>
    <button class="btn pvp-btn" onclick="joinPvPQueue()">⚔️ ${serverOnline?'Найти соперника':'Бой с ботом'}</button>`:`<div class="empty"><span class="empty-ic">😿</span>Нет котов для боя</div>`}
    </div>`;
  }
  h += `</div>`;

  h += `<div class="st">История боёв</div>`;
  const ratio = S.pvpWins + S.pvpLosses > 0 ? Math.round(S.pvpWins / (S.pvpWins + S.pvpLosses) * 100) : 0;
  h += `<div class="card"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <div style="text-align:center"><div style="font-size:24px;font-weight:900;color:var(--acc2)">${ratio}%</div><div style="font-size:10px;opacity:.38">Винрейт</div></div>
    <div style="text-align:center"><div style="font-size:24px;font-weight:900;color:var(--rl)">${S.pvpScore}</div><div style="font-size:10px;opacity:.38">Рейтинг</div></div>
  </div></div>`;

  document.getElementById("s3").innerHTML = h;
}

function renderLB() {
  const medals = ["🥇","🥈","🥉"];
  const lbColors = ["#ffcf5c","#b0bec5","#cd7f32","#4fc3f7","#d085f5"];
  let h = `<div class="lb-header">
    <div style="font-size:24px">🏆</div>
    <div style="font-size:15px;font-weight:900;margin-top:4px">Таблица лидеров</div>
    <div style="font-size:11px;opacity:.4;margin-top:2px">${serverOnline?'🟢 Обновляется в реальном времени':'Офлайн режим'}</div>
  </div>`;

  // Player's row
  const playerIdx = lbData.findIndex(p => p.uid === MY_UID);
  const playerRank = playerIdx !== -1 ? playerIdx + 1 : lbData.length + 1;
  if (playerIdx === -1 || playerIdx > 9) {
    h += `<div class="lb-row you" style="--lc:var(--acc)">
      <div class="lb-rank">#${playerRank}</div>
      <div class="lb-info"><div class="lb-name">😺 ${MY_NAME} (Вы)</div><div class="lb-sub">Побед: ${S.pvpWins} · Рейтинг: ${S.pvpScore}</div></div>
      <div class="lb-score">${S.pvpScore}</div>
    </div>`;
  }

  if (!lbData.length) {
    h += `<div class="lb-loading">⏳ Загрузка таблицы...<br><small>Подключитесь к интернету</small></div>`;
  } else {
    h += `<div class="st">Топ-${Math.min(lbData.length,50)}</div>`;
    lbData.slice(0, 50).forEach((p, i) => {
      const isYou = p.uid === MY_UID;
      const lc = lbColors[Math.min(i,lbColors.length-1)];
      h += `<div class="lb-row ${isYou?'you':''}" style="--lc:${lc}">
        <div class="lb-rank">${medals[i] || '#'+(i+1)}</div>
        <div class="lb-info">
          <div class="lb-name">${p.emoji||'😺'} ${p.name||'Игрок'}${isYou?' (Вы)':''}</div>
          <div class="lb-sub">🏆 ${p.pvpWins||0} победы · Ур.${p.level||1} · ${p.topRarity||'Common'}</div>
        </div>
        <div class="lb-score">${p.pvpScore||0}</div>
      </div>`;
    });
  }

  if (!serverOnline) {
    h += `<div style="text-align:center;padding:12px;font-size:11px;opacity:.3">Для отображения реальных игроков нужен сервер.<br>Задеплой server.js и измени SERVER_URL в коде.</div>`;
  }

  document.getElementById("s4").innerHTML = h;
}

function renderInventory() {
  const hasPets=S.inventory.length>0, hasGear=S.gearInv.length>0;
  let inv = "";
  if (!hasPets && !hasGear) { inv = `<div class="empty"><span class="empty-ic">📦</span>Инвентарь пуст</div>`; }
  else {
    if (hasPets) {
      inv += `<div class="st">Коты (${S.inventory.length})</div>`;
      const ord={Mythic:0,Legendary:1,Epic:2,Rare:3,Common:4};
      const sorted=[...S.inventory].sort((a,b)=>{
        if(a.favorite&&!b.favorite)return -1;if(!a.favorite&&b.favorite)return 1;
        return (ord[a.rarity]||9)-(ord[b.rarity]||9);
      });
      inv += sorted.map(p=>`<div class="ii ${p.rarity}" style="--c:${RC[p.rarity]}" onclick="openPet('inventory',S.inventory.indexOf(p),-1)">
        <div class="ii-em">${p.emoji}</div>
        <div class="ii-info"><div class="ii-name">${p.inRaid?'⚔️ ':p.favorite?'❤️ ':''} ${petName(p)}</div>
        <div class="ii-sub"><span style="font-size:10px;opacity:.38">+${petIncome(p).toFixed(2)}💰 · ⚔️${petPower(p)}</span><span class="rb ${p.rarity}">${p.rarity}</span><span style="font-size:9px;opacity:.3">Ур.${p.level||1}</span></div></div>
        <div class="iac" onclick="event.stopPropagation()">
          <button class="ipb" data-uid="${p.uid}" onclick="openPM(S.inventory.find(x=>x.uid==this.dataset.uid))">➕</button>
          <button class="isb" data-uid="${p.uid}" onclick="sellPet(this.dataset.uid)">💰${p.sell}</button>
        </div>
      </div>`).join("");
    }
    if (hasGear) {
      inv += `<div class="st">Снаряжение (${S.gearInv.length})</div>`;
      inv += S.gearInv.map(g=>`<div class="ii ${g.rarity}" style="--c:${RC[g.rarity]}">
        <div class="ii-em">${g.emoji}</div>
        <div class="ii-info"><div class="ii-name">${g.name}</div>
        <div class="ii-sub"><span style="font-size:10px;color:var(--acc2)">+${Math.round(g.bonus*100)}%</span><span class="rb ${g.rarity}">${g.rarity}</span>
        <span style="font-size:9px;opacity:.35">⚔️+${g.power||0}</span></div></div>
        <div class="iac"><button class="isb" data-iid="${g.iid}" onclick="sellGear(this.dataset.iid)">💰${g.sell}</button></div>
      </div>`).join("");
    }
  }
  document.getElementById("s6").innerHTML = inv;
}

let sx=0, sy=0;
document.body.addEventListener("touchstart", e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
document.body.addEventListener("touchend", e=>{
  if(document.getElementById("pet-page").classList.contains("open"))return;
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>54&&Math.abs(dx)>Math.abs(dy)*1.4){if(dx<0&&cur<6)go(cur+1);if(dx>0&&cur>0)go(cur-1);}
},{passive:true});
