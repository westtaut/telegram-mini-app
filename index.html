<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Gacha Cats</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
  --accent:#5b8cff;
  --accent2:#7cf5c8;
  --danger:#ff6b6b;
}
body{
  background:linear-gradient(180deg,
    var(--tg-theme-bg-color),
    rgba(0,0,0,0.04));
  color:var(--tg-theme-text-color);
  font-family:Inter,Arial,sans-serif;
  margin:0;
  padding:14px 14px 90px;
}
h1,h2{text-align:center}
.balance{text-align:center;font-size:22px;font-weight:600}
.card{
  background:var(--tg-theme-secondary-bg-color,#1f1f1f);
  border-radius:20px;
  padding:14px;
  margin:12px 0;
  box-shadow:0 8px 20px rgba(0,0,0,.15);
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:22px;
  font-size:16px;
  font-weight:600;
  margin-top:8px;
  cursor:pointer;
  color:#fff;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
}
button.secondary{
  background:linear-gradient(135deg,#666,#999);
}
.small{opacity:.7;font-size:14px}
.hidden{display:none}
.menu{
  position:fixed;
  bottom:0;left:0;right:0;
  display:flex;
  background:var(--tg-theme-bg-color);
  border-top:1px solid rgba(255,255,255,.1);
}
.menu button{
  flex:1;
  border-radius:0;
  font-size:14px;
  padding:12px 0;
}
</style>
</head>

<body>

<h1>🐱 Gacha Cats</h1>
<div class="balance">💰 <span id="coins">0</span></div>

<div id="screen-main"></div>
<div id="screen-gacha" class="hidden"></div>
<div id="screen-shop" class="hidden"></div>
<div id="screen-inventory" class="hidden"></div>

<div class="menu">
  <button onclick="showScreen('main')">🏠</button>
  <button onclick="showScreen('gacha')">🎰</button>
  <button onclick="showScreen('shop')">🛒</button>
  <button onclick="showScreen('inventory')">🎒</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

/* ===== КОНСТАНТЫ ===== */

const CAT_TEMPLATES = [
 {name:"Обычный кот",income:1,rarity:"Common"},
 {name:"Полосатый кот",income:2,rarity:"Common"},
 {name:"Чёрный кот",income:3,rarity:"Uncommon"},
 {name:"Белый кот",income:4,rarity:"Uncommon"},
 {name:"Самурай кот",income:6,rarity:"Rare"},
 {name:"Пират кот",income:7,rarity:"Rare"},
 {name:"Кибер кот",income:10,rarity:"Epic"},
 {name:"Маг кот",income:14,rarity:"Epic"},
 {name:"Дракон кот",income:20,rarity:"Legendary"},
 {name:"Божий кот",income:35,rarity:"Mythic"},
];

const CAGE_TYPES = [
 {emoji:"🪵",name:"Деревянная",slots:2,price:100,allowed:["Common"]},
 {emoji:"🔩",name:"Железная",slots:3,price:300,allowed:["Common","Uncommon"]},
 {emoji:"🔮",name:"Магическая",slots:3,price:700,allowed:["Rare","Epic"]},
 {emoji:"👑",name:"Легендарная",slots:2,price:1500,allowed:["Legendary"]},
 {emoji:"🌌",name:"Божественная",slots:1,price:3000,allowed:["Mythic"]},
];

/* ===== СОСТОЯНИЕ ===== */

let state = JSON.parse(localStorage.getItem("gacha_safe")) || {
  coins: 300,
  inventory: [],     // {id, name, income, rarity}
  cages: [],         // {emoji, name, slots, allowed, cats:[]}
  lastTick: Date.now()
};

function save(){
  localStorage.setItem("gacha_safe", JSON.stringify(state));
}

/* ===== УТИЛИТЫ ===== */

function uid(){
  return Math.random().toString(36).slice(2)+Date.now();
}

/* ===== ЛОГИКА ===== */

function rollGacha(){
  if(state.coins < 50) return;
  state.coins -= 50;

  const tpl = CAT_TEMPLATES[Math.floor(Math.random()*CAT_TEMPLATES.length)];
  state.inventory.push({ ...tpl, id: uid() });

  save(); render();
}

function buyCage(i){
  const t = CAGE_TYPES[i];
  if(state.coins < t.price) return;
  state.coins -= t.price;
  state.cages.push({ ...t, cats: [] });
  save(); render();
}

function placeCat(catId, cageIndex){
  const cage = state.cages[cageIndex];
  if(!cage) return;

  const idx = state.inventory.findIndex(c=>c.id===catId);
  if(idx === -1) return;

  const cat = state.inventory[idx];
  if(!cage.allowed.includes(cat.rarity)) return;
  if(cage.cats.length >= cage.slots) return;

  cage.cats.push(cat);
  state.inventory.splice(idx,1);

  save(); render();
}

function passiveIncome(){
  const now = Date.now();
  const sec = Math.floor((now - state.lastTick)/1000);
  if(sec > 0){
    let income = 0;
    state.cages.forEach(c=>c.cats.forEach(cat=>income+=cat.income));
    state.coins += income * sec;
    state.lastTick = now;
    save();
  }
}

/* ===== НАВИГАЦИЯ ===== */

function showScreen(name){
  ["main","gacha","shop","inventory"].forEach(s=>{
    document.getElementById("screen-"+s).classList.add("hidden");
  });
  document.getElementById("screen-"+name).classList.remove("hidden");
  render();
}

/* ===== RENDER ===== */

function render(){
  document.getElementById("coins").innerText = Math.floor(state.coins);

  /* MAIN */
  const main = document.getElementById("screen-main");
  main.innerHTML = "<h2>🏠 Клетки</h2>";
  state.cages.forEach(c=>{
    main.innerHTML += `
      <div class="card">
        ${c.emoji} ${c.name}<br>
        ${c.cats.length
          ? c.cats.map(x=>`🐱 ${x.name} (+${x.income})`).join("<br>")
          : "<span class='small'>Пусто</span>"
        }
      </div>`;
  });

  /* GACHA */
  document.getElementById("screen-gacha").innerHTML = `
    <div class="card">
      <button onclick="rollGacha()">🎰 Крутить гачу (50💰)</button>
    </div>`;

  /* SHOP */
  const shop = document.getElementById("screen-shop");
  shop.innerHTML = "<h2>🛒 Магазин</h2>";
  CAGE_TYPES.forEach((c,i)=>{
    shop.innerHTML += `
      <div class="card">
        ${c.emoji} ${c.name}<br>
        Цена: ${c.price}💰
        <button onclick="buyCage(${i})">Купить</button>
      </div>`;
  });

  /* INVENTORY */
  const inv = document.getElementById("screen-inventory");
  inv.innerHTML = "<h2>🎒 Инвентарь</h2>";
  state.inventory.forEach(cat=>{
    const valid = state.cages
      .map((c,i)=>({c,i}))
      .filter(x=>x.c.allowed.includes(cat.rarity)&&x.c.cats.length<x.c.slots);

    inv.innerHTML += `
      <div class="card">
        🐱 ${cat.name}<br>
        ⭐ ${cat.rarity} | 💰 +${cat.income}
        ${
          valid.length
          ? valid.map(x=>`
              <button class="secondary"
                onclick="placeCat('${cat.id}',${x.i})">
                ➕ В ${x.c.emoji} ${x.c.name}
              </button>`).join("")
          : `<div class="small">❌ Подходящая клетка отсутствует</div>`
        }
      </div>`;
  });
}

/* ===== ЗАПУСК ===== */

passiveIncome();
render();
setInterval(()=>{ passiveIncome(); render(); }, 5000);
</script>

</body>
</html>
