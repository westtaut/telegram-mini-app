<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Gacha Cats</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body {
  background: var(--tg-theme-bg-color);
  color: var(--tg-theme-text-color);
  font-family: Arial, sans-serif;
  padding: 16px;
}
h1,h2 { text-align:center; }
button { width:100%; padding:10px; margin-top:6px; }
.card {
  border:1px solid #555;
  border-radius:8px;
  padding:10px;
  margin:8px 0;
}
.small { opacity:.7; font-size:14px; }
</style>
</head>
<body>

<h1>🐱 Gacha Cats</h1>
<h2>💰 Монеты: <span id="coins">0</span></h2>

<button onclick="rollGacha()">🎰 Гача (50💰)</button>

<h2>🏠 Клетки</h2>
<div id="cages"></div>

<h2>🎒 Инвентарь</h2>
<div id="inventory"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

/* === КОТЫ === */
const cats = [
 {name:"Обычный кот",income:1,rarity:"Common"},
 {name:"Полосатый кот",income:2,rarity:"Common"},
 {name:"Чёрный кот",income:3,rarity:"Uncommon"},
 {name:"Белый кот",income:4,rarity:"Uncommon"},
 {name:"Самурай кот",income:6,rarity:"Rare"},
 {name:"Пират кот",income:7,rarity:"Rare"},
 {name:"Кибер кот",income:9,rarity:"Epic"},
 {name:"Маг кот",income:12,rarity:"Epic"},
 {name:"Дракон кот",income:18,rarity:"Legendary"},
 {name:"Божий кот",income:30,rarity:"Mythic"},
];

/* === КЛЕТКИ === */
const cageTypes = [
 {name:"🪵 Деревянная",slots:2,price:100,allowed:["Common"]},
 {name:"🔩 Железная",slots:3,price:300,allowed:["Common","Uncommon"]},
 {name:"🔮 Магическая",slots:3,price:700,allowed:["Rare","Epic"]},
 {name:"👑 Легендарная",slots:2,price:1500,allowed:["Legendary"]},
 {name:"🌌 Божественная",slots:1,price:3000,allowed:["Mythic"]},
];

/* === СОХРАНЕНИЕ === */
let data = JSON.parse(localStorage.getItem("gacha")) || {
 coins:300,
 inventory:[],
 cages:[],
 last:Date.now()
};

function save(){localStorage.setItem("gacha",JSON.stringify(data));}

/* === ПАССИВНЫЙ ДОХОД === */
function passive(){
 const now=Date.now();
 const sec=Math.floor((now-data.last)/1000);
 let inc=0;
 data.cages.forEach(c=>c.cats.forEach(cat=>inc+=cat.income));
 data.coins+=inc*sec;
 data.last=now;
 save();
}

/* === ГАЧА === */
function rollGacha(){
 if(data.coins<50) return alert("Нет монет");
 data.coins-=50;
 let r=Math.random();
 let pool=cats;
 if(r>0.97) pool=cats.filter(c=>c.rarity=="Mythic");
 else if(r>0.93) pool=cats.filter(c=>c.rarity=="Legendary");
 else if(r>0.85) pool=cats.filter(c=>["Epic","Rare"].includes(c.rarity));
 const cat=pool[Math.floor(Math.random()*pool.length)];
 data.inventory.push(cat);
 save(); render();
 alert("Выпал: "+cat.name+" 🐱");
}

/* === КУПИТЬ КЛЕТКУ === */
function buyCage(i){
 const t=cageTypes[i];
 if(data.coins<t.price) return alert("Не хватает монет");
 data.coins-=t.price;
 data.cages.push({...t,cats:[]});
 save(); render();
}

/* === ПОСАДИТЬ КОТА === */
function placeCat(ci,ii){
 const cage=data.cages[ci];
 const cat=data.inventory[ii];
 if(!cage.allowed.includes(cat.rarity))
   return alert("Эта клетка не подходит для редкости!");
 if(cage.cats.length>=cage.slots)
   return alert("Клетка заполнена");
 cage.cats.push(cat);
 data.inventory.splice(ii,1);
 save(); render();
}

/* === РЕНДЕР === */
function render(){
 document.getElementById("coins").innerText=Math.floor(data.coins);

 const inv=document.getElementById("inventory");
 inv.innerHTML="";
 data.inventory.forEach((c,i)=>{
   inv.innerHTML+=`
   <div class="card">
   🐱 ${c.name}<br>
   ⭐ ${c.rarity} | 💰 +${c.income}/сек
   ${data.cages.map((_,ci)=>`
     <button onclick="placeCat(${ci},${i})">В клетку #${ci+1}</button>
   `).join("")}
   </div>`;
 });

 const cages=document.getElementById("cages");
 cages.innerHTML="";
 data.cages.forEach((c,i)=>{
   cages.innerHTML+=`
   <div class="card">
   ${c.name}<br>
   Коты: ${c.cats.length}/${c.slots}<br>
   <span class="small">Допустимо: ${c.allowed.join(", ")}</span>
   </div>`;
 });

 cageTypes.forEach((c,i)=>{
   cages.innerHTML+=`
   <button onclick="buyCage(${i})">
   Купить ${c.name} (${c.price}💰)
   </button>`;
 });
}

passive();
render();
setInterval(()=>{passive();render();},5000);
</script>

</body>
</html>
