<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Gacha Cats</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  /* iOS Dark palette */
  --bg:       #000000;
  --bg1:      #1C1C1E;
  --bg2:      #2C2C2E;
  --bg3:      #3A3A3C;
  --bg4:      #48484A;
  --sep:      rgba(255,255,255,.1);
  --txt:      #FFFFFF;
  --txt2:     rgba(255,255,255,.55);
  --txt3:     rgba(255,255,255,.3);
  /* Accents */
  --blue:     #0A84FF;
  --teal:     #30D158;
  --orange:   #FF9F0A;
  --red:      #FF453A;
  --purple:   #BF5AF2;
  --pink:     #FF2D55;
  --indigo:   #5E5CE6;
  --cyan:     #32D2F3;
  /* Rarity */
  --rc:#8E8E93;--rr:#32D2F3;--re:#BF5AF2;--rl:#FF9F0A;--rm:#FF453A;
  /* Resources */
  --coin:#FFD60A;--fish:#32D2F3;--star:#FF9F0A;--gem:#BF5AF2;
  /* Layout */
  --nav-h:   80px;
  --hdr-h:   56px;
  --safe-bot: env(safe-area-inset-bottom, 0px);
  --r-card:  16px;
  --r-sm:    10px;
  --font: -apple-system,'SF Pro Display','Inter',sans-serif;
}

html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);color:var(--txt);font-size:15px;line-height:1.4;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

/* ═══ HEADER ═══ */
.hdr{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:var(--hdr-h);
  padding:env(safe-area-inset-top,0) 16px 0;
  display:flex;align-items:flex-end;justify-content:space-between;
  padding-bottom:10px;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:0.5px solid var(--sep);
}
.hdr-brand{display:flex;align-items:center;gap:7px}
.hdr-icon{font-size:22px;line-height:1}
.hdr-title{font-size:17px;font-weight:700;letter-spacing:-.3px}
.hdr-status{font-size:10px;font-weight:600;color:var(--teal);margin-top:1px;display:flex;align-items:center;gap:4px}
.hdr-status.off{color:var(--txt3)}
.hdr-status-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.resources{display:flex;gap:5px}
.res-chip{display:flex;align-items:center;gap:4px;background:var(--bg2);border-radius:20px;padding:5px 10px;font-size:12px;font-weight:600;transition:transform .1s}
.res-chip:active{transform:scale(.93)}
.res-chip.c{color:var(--coin)}.res-chip.f{color:var(--fish)}.res-chip.s{color:var(--star)}.res-chip.g{color:var(--gem)}
.res-ico{font-size:13px}

/* ═══ NAV BAR ═══ */
.nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:calc(var(--nav-h) + var(--safe-bot));
  padding-bottom:var(--safe-bot);
  display:flex;align-items:flex-start;padding-top:8px;
  background:rgba(28,28,30,.92);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-top:0.5px solid var(--sep);
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  border:none;background:none;color:var(--txt3);cursor:pointer;
  padding:4px 2px;border-radius:12px;position:relative;
  transition:color .15s;
}
.nb-ico{
  width:48px;height:32px;display:flex;align-items:center;justify-content:center;
  border-radius:12px;font-size:22px;line-height:1;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1),background .15s;
}
.nb-lbl{font-size:9px;font-weight:600;letter-spacing:.1px;transition:color .15s}
.nb.on{color:var(--blue)}
.nb.on .nb-ico{background:rgba(10,132,255,.15);transform:scale(1.08)}
.nb-dot{position:absolute;top:2px;right:calc(50% - 20px);width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--bg1);display:none}
.nb-dot.show{display:block}

/* ═══ SCREENS ═══ */
.car{
  display:flex;
  width:700%;
  height:calc(100dvh - var(--hdr-h) - var(--nav-h) - var(--safe-bot));
  margin-top:var(--hdr-h);
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
.scr{
  width:calc(100%/7);
  overflow-y:auto;overflow-x:hidden;
  padding:12px 14px calc(20px + var(--safe-bot));
  -webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
}

/* ═══ COMMON COMPONENTS ═══ */
.section-title{
  font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--txt3);margin:18px 0 8px;padding-left:2px;
}
.section-title:first-child{margin-top:2px}

/* iOS-style grouped card */
.grp{background:var(--bg1);border-radius:var(--r-card);overflow:hidden;margin-bottom:12px}
.grp-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-bottom:.5px solid var(--sep);
  cursor:pointer;transition:background .08s;min-height:52px;
}
.grp-row:last-child{border-bottom:none}
.grp-row:active{background:rgba(255,255,255,.06)}
.grp-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.grp-body{flex:1;min-width:0}
.grp-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.grp-sub{font-size:12px;color:var(--txt2);margin-top:1px}
.grp-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.chevron{color:var(--txt3);font-size:13px}

/* Pill badge */
.pill{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.3px}
.pill.Common{background:rgba(142,142,147,.2);color:var(--rc)}
.pill.Rare{background:rgba(50,210,243,.12);color:var(--rr);border:1px solid rgba(50,210,243,.25)}
.pill.Epic{background:rgba(191,90,242,.12);color:var(--re);border:1px solid rgba(191,90,242,.25)}
.pill.Legendary{background:rgba(255,159,10,.12);color:var(--rl);border:1px solid rgba(255,159,10,.25)}
.pill.Mythic{background:rgba(255,69,58,.12);color:var(--rm);border:1px solid rgba(255,69,58,.25)}

/* iOS-style button */
.ios-btn{
  width:100%;padding:14px;border:none;border-radius:var(--r-card);
  font-size:15px;font-weight:600;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;
  font-family:var(--font);letter-spacing:-.1px;
  transition:opacity .1s,transform .1s;
  background:var(--blue);
}
.ios-btn:active{opacity:.75;transform:scale(.98)}
.ios-btn.teal{background:var(--teal);color:#000}
.ios-btn.orange{background:var(--orange);color:#000}
.ios-btn.red{background:rgba(255,69,58,.15);color:var(--red)}
.ios-btn.gray{background:var(--bg2);color:var(--txt2)}
.ios-btn.purple{background:var(--purple)}
.ios-btn.pink{background:var(--pink)}
.ios-btn:disabled{opacity:.3;transform:none!important;cursor:default}

/* Stat grid */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-card{background:var(--bg1);border-radius:var(--r-card);padding:12px 10px;text-align:center}
.stat-val{font-size:18px;font-weight:700;display:block;line-height:1.1}
.stat-lbl{font-size:10px;color:var(--txt2);margin-top:3px;font-weight:500}

/* Income banner */
.income-banner{
  background:linear-gradient(135deg,rgba(10,132,255,.12),rgba(50,209,88,.08));
  border:0.5px solid rgba(10,132,255,.2);
  border-radius:var(--r-card);padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.income-main{font-size:22px;font-weight:700;color:var(--coin)}
.income-sub{font-size:12px;color:var(--txt2);margin-top:2px}
.income-fish{font-size:14px;font-weight:600;color:var(--fish)}

/* ═══ CAGE ═══ */
.cage-card{background:var(--bg1);border-radius:var(--r-card);overflow:hidden;margin-bottom:12px;position:relative}
.cage-accent{height:3px;background:var(--ac,var(--rc))}
.cage-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px}
.cage-name{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.cage-mult{background:var(--bg2);border-radius:7px;padding:3px 8px;font-size:11px;font-weight:600;color:var(--txt2)}
.cage-slots{display:flex;gap:4px;padding:0 14px 8px}
.cage-slot-pip{height:3px;border-radius:2px;flex:1;background:var(--bg3)}
.cage-slot-pip.filled.Common{background:var(--rc)}.cage-slot-pip.filled.Rare{background:var(--rr)}
.cage-slot-pip.filled.Epic{background:var(--re)}.cage-slot-pip.filled.Legendary{background:var(--rl)}
.cage-slot-pip.filled.Mythic{background:var(--rm)}
.cage-cat-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-top:.5px solid var(--sep);
  cursor:pointer;transition:background .08s;
}
.cage-cat-row:active{background:rgba(255,255,255,.05)}
.cat-emoji{font-size:26px;width:36px;text-align:center;flex-shrink:0;line-height:1}
.cat-info{flex:1;min-width:0}
.cat-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-stats{font-size:11px;color:var(--txt2);margin-top:2px}
.cat-lv{background:rgba(10,132,255,.2);color:var(--blue);font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;flex-shrink:0}
.cat-eject{background:var(--bg2);border:none;color:var(--txt3);width:30px;height:30px;border-radius:8px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;font-family:var(--font)}
.cage-empty{padding:14px;text-align:center;font-size:13px;color:var(--txt3)}
.cage-income{display:flex;justify-content:space-between;padding:9px 14px;border-top:.5px solid var(--sep);background:rgba(0,0,0,.15)}
.cage-income-val{font-size:12px;font-weight:600;color:var(--teal)}

/* ═══ GACHA ═══ */
.gacha-hero{
  background:var(--bg1);border-radius:22px;padding:24px 16px 18px;
  text-align:center;margin-bottom:14px;position:relative;overflow:hidden;
}
.gacha-hero::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% -10%, rgba(94,92,230,.25) 0%, transparent 65%);
  pointer-events:none;
}
.gacha-orb{font-size:64px;display:block;line-height:1;margin-bottom:12px;animation:gacha-float 3s ease-in-out infinite}
@keyframes gacha-float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.04)}}
.gacha-tabs{display:flex;background:var(--bg2);border-radius:11px;padding:3px;margin-bottom:14px}
.gacha-tab{
  flex:1;padding:8px;border:none;border-radius:9px;font-size:13px;font-weight:600;
  cursor:pointer;background:none;color:var(--txt2);font-family:var(--font);
  transition:all .15s;
}
.gacha-tab.on{background:var(--bg1);color:var(--txt);box-shadow:0 1px 4px rgba(0,0,0,.4)}
.gacha-rates{background:var(--bg2);border-radius:12px;padding:12px 14px;margin-bottom:14px}
.gacha-rates-row{display:flex;justify-content:center;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.rate-chip{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.06)}
.gacha-note{font-size:11px;color:var(--txt3);text-align:center}
.gacha-btns{display:flex;flex-direction:column;gap:8px}
.gacha-x10{
  display:grid;grid-template-columns:repeat(5,1fr);gap:5px;
  background:var(--bg1);border-radius:var(--r-card);padding:12px;margin-bottom:12px;
}
.mini-pull{background:var(--bg2);border-radius:9px;padding:7px 4px;text-align:center;font-size:18px;line-height:1}
.mini-pull.new{animation:pop-in .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop-in{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}

/* Collection grid */
.coll-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.coll-item{
  background:var(--bg1);border-radius:12px;padding:10px 6px;text-align:center;
  border:1.5px solid transparent;transition:all .12s;position:relative;cursor:pointer;
}
.coll-item.Common{border-color:rgba(142,142,147,.2)}
.coll-item.Rare{border-color:rgba(50,210,243,.25);background:rgba(50,210,243,.04)}
.coll-item.Epic{border-color:rgba(191,90,242,.25);background:rgba(191,90,242,.04)}
.coll-item.Legendary{border-color:rgba(255,159,10,.3);background:rgba(255,159,10,.05)}
.coll-item.Mythic{border-color:rgba(255,69,58,.3);background:rgba(255,69,58,.05)}
.coll-em{font-size:28px;display:block;line-height:1;margin-bottom:4px}
.coll-name{font-size:9px;font-weight:600;color:var(--txt2);line-height:1.3}
.coll-rate{font-size:8px;color:var(--txt3);margin-top:2px}

/* ═══ RAIDS ═══ */
.raid-hero{
  background:linear-gradient(135deg,rgba(255,69,58,.1),rgba(255,159,10,.06));
  border:0.5px solid rgba(255,69,58,.2);border-radius:22px;
  padding:18px 16px;margin-bottom:14px;text-align:center;
}
.raid-power{font-size:13px;color:var(--orange);font-weight:600;margin-top:6px}
.raid-zones-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.raid-zone{
  background:var(--bg1);border-radius:var(--r-card);padding:14px 12px;
  border:0.5px solid var(--sep);cursor:pointer;transition:all .12s;
  position:relative;overflow:hidden;
}
.raid-zone::before{
  content:"";position:absolute;inset:0;
  background:var(--zb,transparent);pointer-events:none;
}
.raid-zone:active{transform:scale(.97)}
.raid-zone.locked{opacity:.4;cursor:default}
.raid-zone.locked:active{transform:none}
.rz-ico{font-size:32px;display:block;margin-bottom:7px;line-height:1}
.rz-name{font-size:13px;font-weight:700;margin-bottom:3px}
.rz-meta{font-size:10px;color:var(--txt3)}
.rz-reward{font-size:10px;color:var(--teal);font-weight:600;margin-top:4px}
.rz-lock{font-size:10px;color:var(--red);margin-top:5px;font-weight:600}
.active-raid{
  background:var(--bg1);border-radius:var(--r-card);padding:14px;
  margin-bottom:8px;border:0.5px solid rgba(255,159,10,.25);
}
.active-raid-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.active-raid-info{display:flex;align-items:center;gap:8px}
.raid-prog-bar{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden}
.raid-prog-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--orange));border-radius:2px;transition:width 2s linear}

/* ═══ PVP ═══ */
.pvp-hero{
  background:linear-gradient(135deg,rgba(94,92,230,.12),rgba(255,45,85,.08));
  border:0.5px solid rgba(94,92,230,.25);border-radius:22px;
  padding:18px 16px;margin-bottom:14px;
}
.pvp-status-row{display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:12px;padding:11px 14px;margin-bottom:12px}
.pvp-dot{width:9px;height:9px;border-radius:50%;background:var(--teal);animation:pvp-pulse 1.6s ease-in-out infinite;flex-shrink:0}
.pvp-dot.searching{background:var(--orange)}
.pvp-dot.idle{background:var(--bg3);animation:none}
@keyframes pvp-pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.6}}
.pvp-queue-anim{text-align:center;padding:24px 0}
.pvp-dots{display:inline-flex;gap:6px;margin-top:10px}
.pvp-dots span{width:7px;height:7px;border-radius:50%;background:var(--indigo);animation:pvp-dot-anim 1s ease-in-out infinite}
.pvp-dots span:nth-child(2){animation-delay:.15s}
.pvp-dots span:nth-child(3){animation-delay:.3s}
@keyframes pvp-dot-anim{0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(-6px);opacity:1}}
.fighter-card{background:var(--bg2);border-radius:14px;padding:12px;text-align:center}
.fighter-em{font-size:40px;display:block;margin-bottom:5px;line-height:1}
.fighter-name{font-size:12px;font-weight:600;opacity:.8}
.fighter-power{font-size:11px;color:var(--txt2);margin-top:3px}

/* ═══ LEADERBOARD ═══ */
.lb-hero{
  background:linear-gradient(135deg,rgba(255,159,10,.12),rgba(255,214,10,.06));
  border:0.5px solid rgba(255,159,10,.25);border-radius:22px;
  padding:18px 16px;margin-bottom:14px;text-align:center;
}
.lb-row{
  display:flex;align-items:center;gap:10px;
  background:var(--bg1);border-radius:var(--r-card);
  padding:12px 14px;margin-bottom:6px;
  border-left:3px solid var(--lc,var(--bg3));
}
.lb-row.me{background:rgba(10,132,255,.07);border-left-color:var(--blue)!important}
.lb-rank{font-size:15px;font-weight:800;width:28px;text-align:center;flex-shrink:0}
.lb-emoji{font-size:24px;flex-shrink:0}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-sub{font-size:11px;color:var(--txt2);margin-top:1px}
.lb-score{font-size:16px;font-weight:700;color:var(--rl);flex-shrink:0}

/* ═══ SHOP ═══ */
.shop-card{background:var(--bg1);border-radius:var(--r-card);padding:14px;margin-bottom:8px}
.shop-cage-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.shop-cage-ico{font-size:28px}
.shop-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.shop-stat{background:var(--bg2);border-radius:9px;padding:8px 6px;text-align:center}
.shop-stat-v{font-size:14px;font-weight:700;display:block}
.shop-stat-l{font-size:9px;color:var(--txt2);margin-top:2px}

/* ═══ INVENTORY ═══ */
.inv-item{
  display:flex;align-items:center;gap:10px;
  background:var(--bg1);border-radius:var(--r-card);
  padding:10px 12px;margin-bottom:6px;
  border-left:3px solid var(--ic,var(--bg3));
  cursor:pointer;transition:background .08s;
}
.inv-item:active{background:var(--bg2)}
.inv-ico{font-size:28px;width:38px;text-align:center;flex-shrink:0}
.inv-info{flex:1;min-width:0}
.inv-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inv-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:3px}
.inv-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.inv-btn-place{background:rgba(10,132,255,.15);border:none;color:var(--blue);padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);transition:transform .1s}
.inv-btn-sell{background:rgba(255,69,58,.1);border:none;color:var(--red);padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);transition:transform .1s}
.inv-btn-place:active,.inv-btn-sell:active{transform:scale(.9)}

/* ═══ PET PAGE (fullscreen) ═══ */
#pet-page{
  display:none;position:fixed;inset:0;z-index:200;
  background:var(--bg);overflow-y:auto;
}
#pet-page.open{display:block;animation:slide-up .22s ease}
@keyframes slide-up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.pp-nav{
  position:sticky;top:0;background:rgba(0,0,0,.8);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:.5px solid var(--sep);z-index:5;
  display:flex;align-items:center;gap:8px;
  padding:12px 14px;padding-top:calc(12px + env(safe-area-inset-top,0));
}
.pp-back{
  background:var(--bg1);border:none;color:var(--blue);
  width:32px;height:32px;border-radius:10px;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:var(--font);
}

let S=null;
const CK="gacha_v9";
const fresh=()=>({coins:300,fish:8,stars:2,gems:0,inventory:[],gearInv:[],cages:[],raids:[],pvpWins:0,pvpLosses:0,pvpScore:0,lastTick:Date.now()});
function ensure(){
  if(!S.cages.length)S.cages.push({...CAGES[0],cats:[]});
  if(!S.inventory.length)S.inventory.push(makePet(CATS[0]));
  if(!S.gearInv)S.gearInv=[];
  if(S.fish==null)S.fish=0;if(S.stars==null)S.stars=0;if(S.gems==null)S.gems=0;
  if(!S.raids)S.raids=[];
  if(S.pvpWins==null){S.pvpWins=0;S.pvpLosses=0;S.pvpScore=0;}
}
function makePet(t){return{uid:Date.now()+Math.random(),baseName:t.name,customName:null,emoji:t.emoji,rarity:t.rarity,baseIncome:t.income,fishRate:t.fishRate||.15,sell:t.sell||10,level:1,xp:0,gear:{collar:null,hat:null,toy:null,armor:null,wing:null,amulet:null},skills:{},favorite:false,power:t.power||10,inRaid:false};}
function petName(p){return p.customName||p.baseName;}
function petSkillMult(p,key){let lv=0;for(const sk of SKILLS){if(sk.applyKey===key)lv=p.skills?.[sk.id]||0;}if(!lv)return 1;if(key==='incomeBonus')return 1+lv*.05;if(key==='fishBonus')return 1+lv*.05;if(key==='powerBonus')return 1+lv*.08;if(key==='xpBonus')return 1+lv*.10;return 1;}
function petPower(p){let gp=0;Object.values(p.gear||{}).forEach(gid=>{if(gid){const g=GEAR.find(x=>x.id===gid);if(g)gp+=g.power||0;}});const lv=p.level||1;return Math.floor((p.power||10)*(1+(lv-1)*.15)*petSkillMult(p,'powerBonus')+gp);}
function petIncome(p,cb=1){const lv=p.level||1;let gb=0;Object.values(p.gear||{}).forEach(gid=>{if(gid){const g=GEAR.find(x=>x.id===gid);if(g)gb+=g.bonus||0;}});return p.baseIncome*(1+(lv-1)*.18)*(1+gb)*cb*petSkillMult(p,'incomeBonus');}
function petFish(p,cb=1){const lv=p.level||1;return(p.fishRate||.15)*(1+(lv-1)*.12)*cb*petSkillMult(p,'fishBonus');}

/* ══ SOCKET ══ */
let socket=null,serverOnline=false,pvpQueueStatus='idle',lbData=[];
let _retries=0;
function initSocket(){
  if(!SERVER_URL||SERVER_URL.includes('YOUR-SERVER')){showConn('','⚪ Офлайн режим');setTimeout(hideConn,3000);return;}
  showConn('','🔌 Подключение...');
  fetch(`${SERVER_URL}/api/leaderboard`,{signal:AbortSignal.timeout(12000)}).then(r=>r.json()).then(d=>{lbData=d;if(cur===4)renderLB();}).catch(()=>{}).finally(()=>_conn());
}
function _conn(){
  try{
    if(socket){socket.disconnect();socket=null;}
    socket=io(SERVER_URL,{transports:['polling','websocket'],timeout:15000,reconnectionAttempts:10,reconnectionDelay:2000,reconnectionDelayMax:10000});
    socket.on('connect',()=>{serverOnline=true;_retries=0;socket.emit('player_join',{uid:MY_UID,name:MY_NAME});const el=document.getElementById('hdr-online');el.innerHTML='<span class="hdr-status-dot"></span> Онлайн';el.className='hdr-status';showConn('online','🟢 Онлайн');setTimeout(hideConn,3000);});
    socket.on('connect_error',()=>{serverOnline=false;_retries++;const el=document.getElementById('hdr-online');el.innerHTML='<span class="hdr-status-dot"></span> Офлайн';el.className='hdr-status off';if(_retries===1)showConn('','⏳ Сервер просыпается...');else if(_retries>=5){showConn('','❌ Недоступен — проверь URL');setTimeout(hideConn,5000);}});
    socket.on('disconnect',()=>{serverOnline=false;const el=document.getElementById('hdr-online');el.innerHTML='<span class="hdr-status-dot"></span> Офлайн';el.className='hdr-status off';if(pvpQueueStatus!=='idle'){pvpQueueStatus='idle';if(cur===3)renderPvP();}});
    socket.on('leaderboard_update',d=>{lbData=d;if(cur===4)renderLB();});
    socket.on('pvp_queue_status',({status})=>{pvpQueueStatus=status;document.getElementById('pvp-dot').classList.toggle('show',status==='searching');if(cur===3)renderPvP();});
    socket.on('pvp_battle_result',data=>{pvpQueueStatus='idle';document.getElementById('pvp-dot').classList.remove('show');processBattleResult(data);socket.emit('battle_ack',{matchId:data.matchId});});
  }catch(e){serverOnline=false;}
}
function showConn(type,msg){const b=document.getElementById('conn-banner');b.textContent=msg;b.className='conn-banner show '+(type||'');}
function hideConn(){document.getElementById('conn-banner').classList.remove('show');}

/* ══ BOOT ══ */
function boot(loaded){
  S=loaded;
  if(!S){try{S=JSON.parse(localStorage.getItem(CK));}catch(e){}}
  if(!S)S=fresh();
  S.inventory=(S.inventory||[]).map(migPet);
  S.cages=(S.cages||[]).map(c=>({...c,cats:(c.cats||[]).map(migPet)}));
  ensure();render();
  setInterval(()=>{tick();updHdr();checkRaids();save();},3000);
  setInterval(()=>{if(!document.getElementById('pet-page').classList.contains('open'))render();},15000);
  initSocket();
}
function migPet(p){
  if(p.uid&&p.gear){if(!p.gear.armor)p.gear={...p.gear,armor:null,wing:null,amulet:null};if(!p.skills)p.skills={};return p;}
  const t=CATS.find(c=>c.name===(p.baseName||p.name))||CATS[0];
  return{...makePet(t),...p,uid:p.uid||(Date.now()+Math.random()),gear:p.gear||{collar:null,hat:null,toy:null,armor:null,wing:null,amulet:null},skills:p.skills||{}};
}

const fmt=n=>{n=Math.floor(n);if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e4)return(n/1e3).toFixed(1)+"K";return n.toLocaleString();};
const fmtT=s=>{if(s<60)return s+"с";if(s<3600)return Math.floor(s/60)+"м";return Math.floor(s/3600)+"ч "+Math.floor((s%3600)/60)+"м";};
const fmtLeft=ms=>fmtT(Math.max(0,Math.floor(ms/1000)));

/* ══ TICK ══ */
function tick(){const now=Date.now();const dt=Math.min((now-(S.lastTick||now))/1000,7200);S.lastTick=now;S.coins+=totalCoins()*dt;S.fish+=totalFish()*dt;}
function totalCoins(){let t=0;S.cages.forEach(c=>c.cats.forEach(p=>t+=petIncome(p,c.bonus||1)));return t;}
function totalFish(){let t=0;S.cages.forEach(c=>c.cats.forEach(p=>t+=petFish(p,c.bonus||1)));return t;}
function updHdr(){
  document.getElementById("coins").textContent=fmt(S.coins);
  document.getElementById("fish-count").textContent=fmt(S.fish);
  document.getElementById("star-count").textContent=fmt(S.stars);
  document.getElementById("gem-count").textContent=fmt(S.gems);
}

/* ══ RAIDS ══ */
function checkRaids(){const now=Date.now();let changed=false;S.raids.forEach(r=>{if(!r.done&&now>=r.endTime){r.done=true;changed=true;}});const done=S.raids.filter(r=>r.done&&!r.claimed);document.getElementById('raid-dot').classList.toggle('show',done.length>0);if(changed){save();if(cur===2)renderRaids();}}
let selRaidId=null,selRaidPetUid=null;
function openRaidModal(raidId){const raid=RAIDS.find(r=>r.id===raidId);if(!raid)return;H();const all=[...S.inventory,...S.cages.flatMap(c=>c.cats)].filter(p=>!p.inRaid&&petPower(p)>=raid.minPow);document.getElementById("raid-m-t").textContent=raid.emoji+" "+raid.name;document.getElementById("raid-m-s").textContent=`Мин. сила: ⚔️${raid.minPow} · ${fmtT(raid.dur)}`;const list=document.getElementById("raid-m-l");list.innerHTML="";selRaidPetUid=null;selRaidId=raidId;document.getElementById("raid-m-go").disabled=true;if(!all.length){list.innerHTML=`<div class="empty-state"><span class="empty-state-ico">😿</span><div>Нет котов с силой ${raid.minPow}+</div></div>`;}else{all.forEach(p=>{const el=document.createElement("div");el.className="modal-item";el.innerHTML=`<div class="modal-item-ico">${p.emoji}</div><div class="modal-item-body"><b>${petName(p)}</b><small>⚔️${petPower(p)} · Ур.${p.level||1}</small></div><span class="pill ${p.rarity}">${p.rarity}</span>`;el.onclick=()=>{list.querySelectorAll(".modal-item").forEach(e=>e.style.background='');el.style.background='rgba(255,159,10,.1)';selRaidPetUid=p.uid;document.getElementById("raid-m-go").disabled=false;};list.appendChild(el);});}document.getElementById("raid-m").classList.add("open");}
function closeRaidM(){H('soft');document.getElementById("raid-m").classList.remove("open");}
function confirmRaid(){if(!selRaidId||!selRaidPetUid)return;const raid=RAIDS.find(r=>r.id===selRaidId);if(!raid)return;let pet=findPet(selRaidPetUid);if(!pet)return;pet.inRaid=true;const now=Date.now();S.raids.push({uid:now+Math.random(),raidId:selRaidId,petUid:selRaidPetUid,petEmoji:pet.emoji,petName:petName(pet),startTime:now,endTime:now+raid.dur*1000,done:false,claimed:false});HN('success');toast(`${pet.emoji} → ${raid.name}!`);closeRaidM();save();renderRaids();}
function claimRaid(raidUid){const r=S.raids.find(x=>x.uid==raidUid);if(!r||!r.done||r.claimed)return;const d=RAIDS.find(x=>x.id===r.raidId);if(!d)return;const luckLv=findPet(r.petUid)?.skills?.s_luck||0;const x2=luckLv>0&&Math.random()<luckLv*.04;const fish=Math.floor((d.fishR[0]+Math.random()*(d.fishR[1]-d.fishR[0]))*(x2?2:1));const coins=Math.floor((d.coinsR[0]+Math.random()*(d.coinsR[1]-d.coinsR[0]))*(x2?2:1));const gems=d.gem*(x2?2:1);S.fish+=fish;S.coins+=coins;S.gems+=gems;let pet=findPet(r.petUid);if(pet){pet.inRaid=false;pet.xp=(pet.xp||0)+Math.floor(d.xp*petSkillMult(pet,'xpBonus'));autoLevelUp(pet);}r.claimed=true;HN('success');toast(`🎉 +${fish}🐟 +${fmt(coins)}💰${gems?` +${gems}💎`:''}${x2?' ✨x2!':''}`);save();updHdr();renderRaids();}
function findPet(uid){return S.inventory.find(p=>p.uid==uid)||S.cages.flatMap(c=>c.cats).find(p=>p.uid==uid)||null;}
function autoLevelUp(pet){const lv=pet.level||1;if(lv>=MAX_LEVEL)return;if((pet.xp||0)>=lv*80){pet.level=lv+1;toast(`🎉 ${petName(pet)} → Ур.${pet.level}!`);}}

/* ══ PVP ══ */
function joinPvPQueue(){const all=[...S.inventory,...S.cages.flatMap(c=>c.cats)].filter(p=>!p.inRaid);if(!all.length){toast("Нет котов!");return;}all.sort((a,b)=>petPower(b)-petPower(a));const best=all[0];H('heavy');if(!serverOnline){offlinePvP(best);return;}pvpQueueStatus='searching';renderPvP();socket.emit('pvp_queue_join',{uid:MY_UID,name:MY_NAME,fighter:{emoji:best.emoji,name:petName(best),power:petPower(best),rarity:best.rarity}});toast("🔍 Ищем соперника...");}
function leavePvPQueue(){pvpQueueStatus='idle';if(socket)socket.emit('pvp_queue_leave',{uid:MY_UID});renderPvP();}
function offlinePvP(myPet){const BOTS=[{name:"КотоБот",emoji:"🤖",power:Math.floor(petPower(myPet)*(0.7+Math.random()*0.6))},{name:"МегаМурка",emoji:"😈",power:Math.floor(petPower(myPet)*(0.8+Math.random()*0.5))},{name:"ЗлойТигр",emoji:"🐯",power:Math.floor(petPower(myPet)*(0.9+Math.random()*0.4))}];const opp=BOTS[Math.floor(Math.random()*BOTS.length)];const botUid='bot_'+Date.now();processBattleResult({isBot:true,matchId:'local_'+Date.now(),result:simBattle(petPower(myPet),MY_UID,opp.power,botUid),you:{uid:MY_UID,fighter:{emoji:myPet.emoji,name:petName(myPet),power:petPower(myPet)},name:MY_NAME},opponent:{uid:botUid,fighter:opp,name:opp.name}});}
function simBattle(p1,u1,p2,u2){let h1=p1*3+50,h2=p2*3+50;const log=[];let r=0;while(h1>0&&h2>0&&r<30){r++;const d1=Math.floor(p1*(0.6+Math.random()*.8)),d2=Math.floor(p2*(0.6+Math.random()*.8));h2-=d1;h1-=d2;if(r<=5)log.push({round:r,atk1:d1,atk2:d2,hp1:Math.max(0,h1),hp2:Math.max(0,h2),crit1:false,crit2:false});}return{winner:h1>0?u1:u2,log,hp1Final:Math.max(0,h1),hp2Final:Math.max(0,h2),rounds:r};}
function processBattleResult(data){
  const{result,you,opponent,isBot}=data;const won=result.winner===you.uid;
  if(won){S.coins+=Math.floor((opponent.fighter?.power||10)*2+10);S.pvpWins++;S.pvpScore+=isBot?8:(15+Math.floor(Math.random()*12));HN('success');}

  pvpQueueStatus='idle';save();syncToServer();updHdr();
  const myHp=won?Math.round(result.hp1Final/((you.fighter?.power||10)*3+50)*100):0;
  const oppHp=won?0:Math.round(result.hp2Final/((opponent.fighter?.power||10)*3+50)*100);
  const logH=result.log.map(r=>`Р${r.round}: ${you.fighter?.emoji||'😺'} −${r.atk1} | ${opponent.fighter?.emoji||'🤖'} −${r.atk2}`).join('\n');
  document.getElementById('bov-content').innerHTML=`
    <div style="text-align:center;margin-bottom:14px">
      <div style="font-size:36px">${won?'🏆':'😿'}</div>
      <div style="font-size:18px;font-weight:700;margin-top:6px">${won?'Победа!':'Поражение'}</div>
      <div style="font-size:12px;color:var(--txt2);margin-top:3px">${won?`+${fmt(Math.floor((opponent.fighter?.power||10)*2+10))}💰 +${isBot?8:15} рейтинга`:'Прокачай кота!'}</div>
    </div>
    <div class="bov-fighters">
      <div class="bov-fighter ${won?'win':'lose'}">
        <span class="bov-em">${you.fighter?.emoji||'😺'}</span>
        <div style="font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${you.name||'Вы'}</div>
        <div style="font-size:10px;color:var(--txt2)">⚔️${you.fighter?.power||0}</div>
        <div class="bov-hp"><div class="bov-hp-fill" style="width:${myHp}%;background:linear-gradient(90deg,var(--teal),var(--blue))"></div></div>
      </div>
      <div style="font-size:15px;font-weight:700;color:var(--txt3)">VS</div>
      <div class="bov-fighter ${won?'lose':'win'}">
        <span class="bov-em">${opponent.fighter?.emoji||'🤖'}</span>
        <div style="font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${opponent.name||'Бот'}</div>
        <div style="font-size:10px;color:var(--txt2)">⚔️${opponent.fighter?.power||0}</div>
        <div class="bov-hp"><div class="bov-hp-fill" style="width:${oppHp}%;background:linear-gradient(90deg,var(--red),var(--pink))"></div></div>
      </div>
    </div>
    <div class="bov-log">${logH||'...'}</div>
    <div style="display:flex;justify-content:center;gap:20px;margin-top:12px;font-size:13px;font-weight:600">
      <span style="color:var(--teal)">🏆 ${S.pvpWins}</span>
      <span style="color:var(--red)">💀 ${S.pvpLosses}</span>
      <span style="color:var(--rl)">⭐ ${S.pvpScore}</span>
    </div>`;
  document.getElementById('bov').classList.add('vis');
  if(cur===3)renderPvP();
}

function weightedRoll(wgt){const total=Object.values(wgt).reduce((a,b)=>a+b,0);let r=Math.random()*total,cum=0;for(const[k,w]of Object.entries(wgt)){cum+=w;if(r<cum)return k;}return Object.keys(wgt)[0];}
function roll(){if(gachaMode==="gear"){rollGear();return;}if(S.coins<50){toast("Нужно 50💰");HN('error');return;}S.coins-=50;H('medium');const rar=weightedRoll(CAT_WGT);const pool=CATS.filter(c=>c.rarity===rar);const pet=makePet(pool[Math.floor(Math.random()*pool.length)]);if(rar==="Mythic"){S.stars+=5;}else if(rar==="Legendary"){S.stars+=3;}else if(rar==="Epic"&&Math.random()<.4){S.stars+=1;}S.inventory.push(pet);save();showGov(pet);}

  for(let i=0;i<10;i++){const rar=weightedRoll(gachaMode==="cat"?CAT_WGT:GEAR_WGT);if(gachaMode==="cat"){const pool=CATS.filter(c=>c.rarity===rar);const pet=makePet(pool[Math.floor(Math.random()*pool.length)]);if(rar==="Mythic")S.stars+=5;else if(rar==="Legendary")S.stars+=3;S.inventory.push(pet);arr.push({emoji:pet.emoji,rarity:rar});}else{const pool=GEAR.filter(g=>g.rarity===rar);const item={...pool[Math.floor(Math.random()*pool.length)],iid:Date.now()+Math.random()};if(rar==="Mythic")S.gems+=2;else if(rar==="Legendary")S.gems+=1;S.gearInv.push(item);arr.push({emoji:item.emoji,rarity:rar});}}
  save();updHdr();

  const grid=document.getElementById("x10-grid");if(!grid)return;grid.style.display="grid";grid.innerHTML=arr.map((x,i)=>`<div class="mini-pull ${x.rarity}" style="animation-delay:${i*.06}s;border:1.5px solid ${RC[x.rarity]}22"><span>${x.emoji}</span></div>`).join("");
  toast(`🎰 Получено ${arr.length} предметов!`);
}

    h+=`<div class="section-title">Коты (${S.inventory.length})</div>`;
    const sorted=[...S.inventory].sort((a,b)=>{if(a.favorite&&!b.favorite)return -1;if(!a.favorite&&b.favorite)return 1;return(ord[a.rarity]||9)-(ord[b.rarity]||9);});
    sorted.forEach(p=>{h+=`<div class="inv-item" style="--ic:${RC3[p.rarity]}" onclick="openPet('inventory',S.inventory.indexOf(p),-1)"><div class="inv-ico">${p.inRaid?'⚔️':p.emoji}</div><div class="inv-info"><div class="inv-name">${p.inRaid?'⚔️ ':p.favorite?'❤️ ':''} ${petName(p)}</div><div class="inv-meta"><span class="pill ${p.rarity}">${p.rarity}</span><span style="font-size:10px;color:var(--txt2)">Ур.${p.level||1} · ⚔️${petPower(p)}</span></div></div><div class="inv-actions" onclick="event.stopPropagation()"><button class="inv-btn-place" data-uid="${p.uid}" onclick="openPM(S.inventory.find(x=>x.uid==this.dataset.uid))">➕</button><button class="inv-btn-sell" data-uid="${p.uid}" onclick="sellPet(this.dataset.uid)">💰${p.sell}</button></div></div>`;});
  }
  if(S.gearInv.length){
    h+=`<div class="section-title">Снаряжение (${S.gearInv.length})</div>`;
    S.gearInv.forEach(g=>{h+=`<div class="inv-item" style="--ic:${RC3[g.rarity]}"><div class="inv-ico">${g.emoji}</div><div class="inv-info"><div class="inv-name">${g.name}</div><div class="inv-meta"><span class="pill ${g.rarity}">${g.rarity}</span><span style="font-size:10px;color:var(--teal)">+${Math.round(g.bonus*100)}%</span><span style="font-size:10px;color:var(--txt2)">⚔️+${g.power||0}</span></div></div><div class="inv-actions" onclick="event.stopPropagation()"><button class="inv-btn-sell" data-iid="${g.iid}" onclick="sellGear(this.dataset.iid)">💰${g.sell}</button></div></div>`;});
  }
  if(!S.inventory.length&&!S.gearInv.length){h=`<div class="empty-state"><span class="empty-state-ico">📦</span><div class="empty-state-txt">Инвентарь пуст<br>Покрути гачу!</div></div>`;}
  document.getElementById("s6").innerHTML=h;
}

/* ══ SWIPE ══ */
let sx=0,sy=0;
document.body.addEventListener("touchstart",e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
document.body.addEventListener("touchend",e=>{if(document.getElementById("pet-page").classList.contains("open"))return;const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>54&&Math.abs(dx)>Math.abs(dy)*1.4){if(dx<0&&cur<6)go(cur+1);if(dx>0&&cur>0)go(cur-1);}},{passive:true});

/* ══ START ══ */
cloudLoad(d=>boot(d));
</script>
